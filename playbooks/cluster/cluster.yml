---
#
# Initializes and joins nodes into a Kubernetes cluster using kubeadm.
#
# This playbook assumes that kubernetes.yml has already been run on all target
# hosts (kubelet, kubeadm, kubectl, cri-dockerd, and Helm are installed and
# configured). It performs the following actions:
#   - Validates that exactly one bootstrap node is defined in inventory.
#   - Initializes the control plane node using kubeadm init (idempotent via
#     a cluster-ready check).
#   - Configures kubectl access for the ansible user on the control plane.
#   - Optionally fetches the kubeconfig to the machine running the playbook.
#   - Retrieves the kubeadm join command from the control plane.
#   - Joins all worker nodes to the cluster using the retrieved join command.
#   - Optionally removes the NoSchedule taint from the control plane node to
#     allow it to also schedule workloads (when `worker_node: true` is set on
#     the control plane host in inventory).
#   - Installs the Kubernetes Gateway API CRDs required by Cilium.
#   - Removes kube-proxy and installs Cilium as the CNI plugin via Helm, with
#     Cilium's eBPF kube-proxy replacement, Gateway API support, and Hubble
#     observability enabled.
#   - Configures a Cilium LoadBalancer IP pool for LAN-accessible services.
#   - Configures L2 announcement so LoadBalancer IPs are reachable on the LAN.
#   - Installs cert-manager and creates a self-signed ClusterIssuer for
#     automatic TLS certificate provisioning.
#   - Exposes the Hubble UI over the LAN via an HTTPRoute attached to the
#     traefik-gateway with self-signed HTTPS support.
#   - Deploys Bind9 as an authoritative DNS server for the homelab zone with
#     its own LoadBalancer IP. Bind9 is configured with a TSIG key for
#     RFC 2136 dynamic updates.
#   - Deploys ExternalDNS (kubernetes-sigs Helm chart) to automatically sync DNS
#     records from Gateway API route resources into Bind9 via RFC 2136.
#   - Installs the Cilium CLI on all nodes for inspecting and troubleshooting.
#
# Node roles are determined by host variables in inventory.yml:
#   - control_plane: true  — node is a Kubernetes control plane node.
#   - bootstrap_node: true — node runs kubeadm init to initialize the cluster.
#                            Exactly one control plane node should have this set.
#   - worker_node: true    — node joins the cluster as a worker. When set on the
#                            bootstrap node, the NoSchedule taint is removed so
#                            it can also schedule workloads.
#
# Variables:
#   - cluster_name:            Name of the Kubernetes cluster, used in kubeconfig
#                              contexts (default: homelab-0).
#   - pod_network_cidr:        CIDR range for pod networking
#                              (default: 10.244.0.0/16).
#   - kubeadm_cri_socket:      CRI socket path set in the kubeadm config
#                              (default: unix:///var/run/cri-dockerd.sock).
#   - kubectl_config_dir:      Directory where the kubectl config is stored for
#                              the ansible user (default: /home/<ansible_user>/.kube).
#   - kubectl_config_path:     Full path to the kubectl config file
#                              (default: /home/<ansible_user>/.kube/config).
#   - fetch_kubeconfig:        When true, fetches the kubeconfig from the control
#                              plane to the machine running the playbook
#                              (default: true).
#   - local_kubeconfig_path:   Destination path for the kubeconfig on the local
#                              machine (default: ~/.kube/config).
#   - bootstrap_control_plane: The host in the homelab group with bootstrap_node:
#                              true. Resolved automatically from inventory — do
#                              not set manually.
#   - cilium_version:          Version of Cilium to install via Helm
#                              (default: 1.19.1).
#   - cilium_namespace:        Kubernetes namespace for the Cilium installation
#                              (default: kube-system).
#   - cilium_cli_version:      Version of the Cilium CLI to install
#                              (default: 0.19.1).
#   - gateway_api_version:     Version of the Gateway API CRDs to install.
#                              Must be compatible with the Cilium version in use
#                              (default: 1.4.1).
#   - dns_zone:                DNS zone served by Bind9 (e.g. homelab.internal).
#                              Read from group_vars.
#   - hubble_hostname:         Fully qualified hostname for the Hubble UI,
#                              derived from dns_zone
#                              (default: hubble.<dns_zone>).
#   - lb_ip_pool_cidr:         CIDR block allocated for Cilium LoadBalancer IP
#                              assignments. Should be a reserved range on the LAN
#                              that does not overlap with DHCP or static addresses.
#                              Read from group_vars.
#   - network_interface:       Primary network interface on each node used for
#                              L2 announcement of LoadBalancer IPs (e.g. eth0).
#                              Read from inventory host vars.
#   - cert_manager_version:    Version of the cert-manager Helm chart
#                              (default: 1.20.0).
#   - cert_manager_namespace:  Kubernetes namespace for cert-manager
#                              (default: cert-manager).
#   - bind9_image:             Container image for the Bind9 DNS server
#                              (default: internetsystemsconsortium/bind9:9.20).
#   - bind9_namespace:         Kubernetes namespace for Bind9 and ExternalDNS
#                              (default: kube-system).
#   - bind9_pvc_size:          Size of the PersistentVolumeClaim used to store
#                              Bind9 zone data across pod restarts
#                              (default: 128Mi).
#   - externaldns_version:     Version of the kubernetes-sigs ExternalDNS
#                              Helm chart (default: 1.19.0).
#   - traefik_version:         Version of the Traefik Helm chart (default: 34.4.1).
#   - traefik_namespace:       Kubernetes namespace where Traefik is deployed
#                              (default: traefik).
#   - traefik_hostname:        Fully qualified hostname for the Traefik dashboard,
#                              derived from dns_zone
#                              (default: traefik.<dns_zone>).
#

- name: Initialize Kubernetes control plane
  hosts: homelab
  become: true
  become_exe: sudo.ws
  vars:
    cluster_name: homelab-0
    pod_network_cidr: 10.244.0.0/16
    kubeadm_cri_socket: 'unix:///var/run/cri-dockerd.sock'
    kubectl_config_dir: '/home/{{ ansible_user }}/.kube'
    kubectl_config_path: '/home/{{ ansible_user }}/.kube/config'
    fetch_kubeconfig: true
    local_kubeconfig_path: ~/.kube/config

  tasks:
    # -------------------------------------------------------------------------
    # Validation
    # Ensures exactly one host in the inventory is designated as the bootstrap
    # node before any cluster initialization begins. This prevents ambiguous or
    # duplicate control plane initialization if multiple hosts are inadvertently
    # configured with `bootstrap_node: true`.
    # -------------------------------------------------------------------------
    - name: Assert exactly one bootstrap node is defined in inventory
      ansible.builtin.assert:
        that:
          - >-
            groups['homelab']
            | map('extract', hostvars)
            | selectattr('bootstrap_node', 'equalto', true)
            | list | length == 1
        fail_msg: "Exactly one host must have bootstrap_node: true in inventory."
      delegate_to: localhost
      run_once: true # noqa: run-once[task]

    # -------------------------------------------------------------------------
    # Control Plane Initialization
    # Initializes the Kubernetes control plane on the host marked with
    # `bootstrap_node: true` in inventory. kubeadm init is skipped if the
    # API server is already running (idempotency check via the presence of
    # /etc/kubernetes/admin.conf). A kubeadm config file is written to a
    # temporary path, used during initialization, and then removed.
    # -------------------------------------------------------------------------
    - name: Check if control plane is already initialized
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_admin_conf
      when: bootstrap_node | default(false)

    - name: Write kubeadm init config file
      ansible.builtin.template:
        src: kubeadm-init.yml.j2
        dest: /tmp/kubeadm-init.yml
        mode: '0600'
      when:
        - bootstrap_node | default(false)
        - not kubeadm_admin_conf.stat.exists

    - name: Initialize Kubernetes control plane with kubeadm
      ansible.builtin.command:
        cmd: kubeadm init --config /tmp/kubeadm-init.yml
      when:
        - bootstrap_node | default(false)
        - not kubeadm_admin_conf.stat.exists
      changed_when: true

    - name: Clean up kubeadm init config file
      ansible.builtin.file:
        path: /tmp/kubeadm-init.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # kubectl Configuration
    # Copies the cluster admin kubeconfig to the ansible user's home directory
    # to enable kubectl access on the control plane. Optionally fetches the
    # kubeconfig to the local machine running the playbook when
    # `fetch_kubeconfig` is true. Also retrieves the kubeadm join command for
    # use by worker nodes in the next play.
    # -------------------------------------------------------------------------
    - name: Ensure kubectl config directory exists for ansible user
      ansible.builtin.file:
        path: "{{ kubectl_config_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0700'
      when: bootstrap_node | default(false)

    - name: Copy admin kubeconfig to ansible user home directory
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: "{{ kubectl_config_path }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'
        remote_src: true
      when: bootstrap_node | default(false)

    - name: Copy kubeconfig to local machine
      ansible.builtin.fetch:
        src: /etc/kubernetes/admin.conf
        dest: "{{ local_kubeconfig_path }}"
        flat: true
      when:
        - bootstrap_node | default(false)
        - fetch_kubeconfig | default(false)

    - name: Retrieve kubeadm join command from control plane
      ansible.builtin.command:
        cmd: kubeadm token create --print-join-command
      register: kubeadm_join_command
      changed_when: false
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Control Plane Taint Removal (Optional)
    # By default, kubeadm applies a NoSchedule taint to the control plane node
    # to prevent workloads from being scheduled on it. When the control plane
    # host also has `worker_node: true` in inventory, this taint is removed so
    # it can also act as a worker node. This is useful in small homelab clusters
    # where resource constraints make it impractical to dedicate a node solely
    # to control plane duties.
    # -------------------------------------------------------------------------
    - name: Remove NoSchedule taint from control plane to enable worker scheduling
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          taint nodes {{ inventory_hostname }}
          node-role.kubernetes.io/control-plane:NoSchedule-
      when:
        - bootstrap_node | default(false)
        - worker_node | default(false)
      register: taint_result
      changed_when: "'untainted' in taint_result.stdout"
      failed_when:
        - taint_result.rc != 0
        - "'not found' not in taint_result.stderr"

- name: Join worker nodes to the Kubernetes cluster
  hosts: homelab
  become: true
  become_exe: sudo.ws
  vars:
    # kubeadm_cri_socket is repeated from play 1 — vars do not carry across plays.
    kubeadm_cri_socket: 'unix:///var/run/cri-dockerd.sock'
    bootstrap_control_plane: >-
      {{ groups['homelab']
         | map('extract', hostvars)
         | selectattr('bootstrap_node', 'equalto', true)
         | map(attribute='inventory_hostname')
         | first }}

  tasks:
    # -------------------------------------------------------------------------
    # Worker Node Join
    # Joins all hosts with `worker_node: true` in inventory (excluding the
    # control plane) to the cluster using the join command retrieved from the
    # control plane. The join is skipped if the node has already joined
    # (detected by the presence of /etc/kubernetes/kubelet.conf).
    # -------------------------------------------------------------------------
    - name: Check if node has already joined the cluster
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf
      when:
        - worker_node | default(false)
        - not (control_plane | default(false))

    - name: Join worker node to the cluster
      ansible.builtin.command:
        cmd: >-
          {{ hostvars[bootstrap_control_plane].kubeadm_join_command.stdout }}
          --cri-socket={{ kubeadm_cri_socket }}
      when:
        - worker_node | default(false)
        - not (control_plane | default(false))
        - not kubelet_conf.stat.exists
      changed_when: true

- name: Install cluster networking and DNS
  hosts: homelab
  become: true
  become_exe: sudo.ws
  vars:
    kubectl_config_path: '/home/{{ ansible_user }}/.kube/config'
    hubble_hostname: 'hubble.{{ dns_zone }}'
    cilium_version: 1.19.1
    cilium_namespace: kube-system
    cilium_cli_version: 0.19.1
    # NOTE: Cilium 1.19.1 requires Gateway API v1.4.1. In v1.5.0, TLSRoute was
    # promoted from v1alpha2 to v1 and v1alpha2 is no longer served. Cilium
    # 1.19.1's operator expects TLSRoute at v1alpha2 and crashes on startup if
    # it is absent or unserved. Use v1.4.1 until Cilium adds v1.5.0 support.
    gateway_api_version: 1.4.1
    traefik_version: 34.4.1
    traefik_namespace: traefik
    traefik_hostname: 'traefik.{{ dns_zone }}'
    cert_manager_version: 1.20.0
    cert_manager_namespace: cert-manager
    bind9_image: 'internetsystemsconsortium/bind9:9.20'
    bind9_namespace: kube-system
    bind9_pvc_size: 128Mi
    externaldns_version: 1.19.0

  tasks:
    # -------------------------------------------------------------------------
    # Gateway API CRDs
    # Installs the Kubernetes Gateway API Custom Resource Definitions required
    # by Cilium's Gateway API implementation. These CRDs define GatewayClass,
    # Gateway, HTTPRoute, GRPCRoute, and ReferenceGrant resources that enable
    # advanced traffic routing. They must be present before Cilium starts, as
    # Cilium validates their existence on startup when Gateway API is enabled.
    # The standard install manifest is downloaded, applied, and then removed.
    # -------------------------------------------------------------------------
    - name: Check if Gateway API CRDs are already installed
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get crd gatewayclasses.gateway.networking.k8s.io
      register: gateway_crd_check
      changed_when: false
      failed_when: false
      when: bootstrap_node | default(false)

    - name: Download Gateway API CRD manifest
      ansible.builtin.get_url:
        url: https://github.com/kubernetes-sigs/gateway-api/releases/download/v{{ gateway_api_version }}/standard-install.yaml # noqa: yaml[line-length]
        dest: /tmp/gateway-api-install.yaml
        mode: '0644'
      when:
        - bootstrap_node | default(false)
        - (gateway_crd_check.rc | default(1)) != 0

    - name: Apply Gateway API CRDs
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/gateway-api-install.yaml
      when:
        - bootstrap_node | default(false)
        - (gateway_crd_check.rc | default(1)) != 0
      changed_when: true

    - name: Clean up Gateway API CRD manifest
      ansible.builtin.file:
        path: /tmp/gateway-api-install.yaml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Cilium Installation
    # Installs Cilium as the cluster CNI plugin via Helm. Cilium provides
    # eBPF-based networking, security, and observability for Kubernetes.
    # kube-proxy is removed and replaced by Cilium's eBPF-based implementation,
    # which handles ClusterIP and NodePort routing without iptables. The following
    # features are enabled: Gateway API controller, Hubble observability (relay
    # and UI), and L2 announcement for LAN-reachable LoadBalancer IPs. The
    # Cilium Helm repository is registered before installation.
    # -------------------------------------------------------------------------
    - name: Remove kube-proxy DaemonSet
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          delete daemonset kube-proxy -n kube-system
      register: kube_proxy_delete
      changed_when: "'deleted' in kube_proxy_delete.stdout"
      failed_when:
        - kube_proxy_delete.rc != 0
        - "'not found' not in kube_proxy_delete.stderr"
      when: bootstrap_node | default(false)

    - name: Add Cilium Helm repository
      ansible.builtin.command:
        cmd: helm repo add cilium https://helm.cilium.io/
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Update Helm repositories
      ansible.builtin.command:
        cmd: helm repo update
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Install or upgrade Cilium via Helm
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install cilium cilium/cilium
          --version {{ cilium_version }}
          --namespace {{ cilium_namespace }}
          --kubeconfig {{ kubectl_config_path }}
          --set kubeProxyReplacement=true
          --set gatewayAPI.enabled=true
          --set hubble.enabled=true
          --set hubble.relay.enabled=true
          --set hubble.ui.enabled=true
          --set hubble.ui.ingress.enabled=false
          --set l2announcements.enabled=true
      when: bootstrap_node | default(false)
      changed_when: true

    # -------------------------------------------------------------------------
    # LoadBalancer IP Pool
    # Configures a CiliumLoadBalancerIPPool, which gives Cilium a reserved CIDR
    # on the LAN to assign external IPs to LoadBalancer services. This enables
    # Gateway resources to receive a stable LAN IP without requiring MetalLB or
    # a cloud provider. The pool CIDR is defined in group_vars and should not
    # overlap with DHCP or statically assigned addresses on the network.
    # -------------------------------------------------------------------------
    - name: Wait for Cilium DaemonSet to be ready
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          rollout status daemonset cilium
          -n {{ cilium_namespace }}
          --timeout=180s
      when: bootstrap_node | default(false)
      changed_when: false

    - name: Write CiliumLoadBalancerIPPool manifest
      ansible.builtin.template:
        src: cilium-lb-pool.yml.j2
        dest: /tmp/cilium-lb-pool.yml
        mode: '0644'
      when: bootstrap_node | default(false)

    - name: Apply CiliumLoadBalancerIPPool
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/cilium-lb-pool.yml
      register: lb_pool_result
      changed_when: >-
        'created' in lb_pool_result.stdout or
        'configured' in lb_pool_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up CiliumLoadBalancerIPPool manifest
      ansible.builtin.file:
        path: /tmp/cilium-lb-pool.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # L2 Announcement Policy
    # Creates a CiliumL2AnnouncementPolicy that instructs Cilium to announce
    # LoadBalancer IPs on the LAN via ARP, making them reachable from other
    # devices on the network without a dedicated load balancer. The policy
    # targets all Linux nodes and announces on the primary network interface.
    # -------------------------------------------------------------------------
    - name: Write CiliumL2AnnouncementPolicy manifest
      ansible.builtin.template:
        src: cilium-l2-announcement.yml.j2
        dest: /tmp/cilium-l2-announcement.yml
        mode: '0644'
      when: bootstrap_node | default(false)

    - name: Apply CiliumL2AnnouncementPolicy
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/cilium-l2-announcement.yml
      register: l2_announcement_result
      changed_when: >-
        'created' in l2_announcement_result.stdout or
        'configured' in l2_announcement_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up CiliumL2AnnouncementPolicy manifest
      ansible.builtin.file:
        path: /tmp/cilium-l2-announcement.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Traefik Installation
    # Installs Traefik via Helm as the L7 Gateway API controller. The Traefik
    # Helm repository is registered and updated before installation. A values
    # file is rendered from the traefik-values.yml.j2 template, which enables
    # the kubernetesGateway and kubernetesCRD providers, disables the legacy
    # kubernetesIngress provider, configures a LoadBalancer service, sets up
    # HTTP-to-HTTPS redirect, disables the default ingressRoute dashboard, and
    # enables access logs. The values file is removed after installation.
    # -------------------------------------------------------------------------
    - name: Add Traefik Helm repository
      ansible.builtin.command:
        cmd: helm repo add traefik https://helm.traefik.io/traefik
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Update Helm repositories
      ansible.builtin.command:
        cmd: helm repo update
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Write Traefik values file
      ansible.builtin.template:
        src: traefik-values.yml.j2
        dest: /tmp/traefik-values.yml
        mode: '0644'
      when: bootstrap_node | default(false)

    - name: Install or upgrade Traefik via Helm
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install traefik traefik/traefik
          --namespace {{ traefik_namespace }}
          --create-namespace
          --kubeconfig {{ kubectl_config_path }}
          --values /tmp/traefik-values.yml
          --version {{ traefik_version }}
      changed_when: true
      when: bootstrap_node | default(false)

    - name: Clean up Traefik values file
      ansible.builtin.file:
        path: /tmp/traefik-values.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Gateway
    # Creates the traefik-gateway Gateway API resource in kube-system. This
    # Gateway uses the traefik GatewayClass and provisions a LoadBalancer
    # service that receives a LAN IP from the Cilium IP pool. It exposes an
    # HTTP listener on port 80 and an HTTPS listener on port 443, both scoped
    # to wildcard hostnames in the configured DNS zone. The HTTPS listener
    # terminates TLS using the wildcard-tls certificate. HTTPRoutes from any
    # namespace may attach to either listener.
    # -------------------------------------------------------------------------
    - name: Write Traefik Gateway manifest
      ansible.builtin.template:
        src: traefik-gateway.yml.j2
        dest: /tmp/traefik-gateway.yml
        mode: '0644'
      when: bootstrap_node | default(false)

    - name: Apply Traefik Gateway
      ansible.builtin.command:
        cmd: kubectl --kubeconfig={{ kubectl_config_path }} apply -f /tmp/traefik-gateway.yml
      register: traefik_gateway_result
      changed_when: >-
        'created' in traefik_gateway_result.stdout or
        'configured' in traefik_gateway_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up Traefik Gateway manifest
      ansible.builtin.file:
        path: /tmp/traefik-gateway.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Dashboard Exposure
    # Exposes the Traefik dashboard over HTTPS via a Gateway API HTTPRoute
    # attached to the traefik-gateway. The HTTPRoute routes traffic matching
    # the Traefik hostname to the dashboard service on port 8080. HTTP traffic
    # is redirected to HTTPS by the Traefik entrypoint redirect configured in
    # traefik-values.yml.j2.
    # -------------------------------------------------------------------------
    - name: Write Traefik dashboard HTTPRoute manifest
      ansible.builtin.template:
        src: traefik-dashboard-httproute.yml.j2
        dest: /tmp/traefik-dashboard-httproute.yml
        mode: '0644'
      when: bootstrap_node | default(false)

    - name: Apply Traefik dashboard HTTPRoute
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/traefik-dashboard-httproute.yml
      register: traefik_dashboard_httproute_result
      changed_when: >-
        'created' in traefik_dashboard_httproute_result.stdout or
        'configured' in traefik_dashboard_httproute_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up Traefik dashboard HTTPRoute manifest
      ansible.builtin.file:
        path: /tmp/traefik-dashboard-httproute.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # cert-manager
    # Installs cert-manager via the Jetstack Helm chart. cert-manager
    # automates TLS certificate management in Kubernetes, providing
    # issuance and renewal. A self-signed ClusterIssuer is created
    # along with a wildcard Certificate for *.{{ dns_zone }}. The
    # wildcard cert is referenced by the Gateway's HTTPS listener so
    # all services exposed via HTTPRoute get TLS automatically without
    # per-resource annotations.
    # -------------------------------------------------------------------------
    - name: Add Jetstack Helm repository
      ansible.builtin.command:
        cmd: helm repo add jetstack https://charts.jetstack.io
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Update Helm repositories for cert-manager
      ansible.builtin.command:
        cmd: helm repo update
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Install or upgrade cert-manager via Helm
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install cert-manager jetstack/cert-manager
          --version v{{ cert_manager_version }}
          --namespace {{ cert_manager_namespace }}
          --create-namespace
          --kubeconfig {{ kubectl_config_path }}
          --set crds.enabled=true
      when: bootstrap_node | default(false)
      changed_when: true

    - name: Wait for cert-manager webhook to be ready
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          rollout status deployment cert-manager-webhook
          -n {{ cert_manager_namespace }}
          --timeout=120s
      when: bootstrap_node | default(false)
      changed_when: false

    - name: Write self-signed ClusterIssuer manifest
      ansible.builtin.template:
        src: cert-manager-clusterissuer.yml.j2
        dest: /tmp/cert-manager-clusterissuer.yml
        mode: '0644'
      when: bootstrap_node | default(false)

    - name: Apply self-signed ClusterIssuer
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/cert-manager-clusterissuer.yml
      register: clusterissuer_result
      changed_when: >-
        'created' in clusterissuer_result.stdout or
        'configured' in clusterissuer_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up ClusterIssuer manifest
      ansible.builtin.file:
        path: /tmp/cert-manager-clusterissuer.yml
        state: absent
      when: bootstrap_node | default(false)

    - name: Write wildcard TLS Certificate manifest
      ansible.builtin.template:
        src: cert-manager-wildcard-cert.yml.j2
        dest: /tmp/cert-manager-wildcard-cert.yml
        mode: '0644'
      when: bootstrap_node | default(false)

    - name: Apply wildcard TLS Certificate
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/cert-manager-wildcard-cert.yml
      register: wildcard_cert_result
      changed_when: >-
        'created' in wildcard_cert_result.stdout or
        'configured' in wildcard_cert_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up wildcard TLS Certificate manifest
      ansible.builtin.file:
        path: /tmp/cert-manager-wildcard-cert.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Hubble UI Exposure
    # Exposes the Hubble UI over the LAN via an HTTPRoute attached to the
    # traefik-gateway. No separate Gateway is needed.
    # -------------------------------------------------------------------------
    - name: Write Hubble HTTPRoute manifest
      ansible.builtin.template:
        src: hubble-httproute.yml.j2
        dest: /tmp/hubble-httproute.yml
        mode: '0644'
      when: bootstrap_node | default(false)

    - name: Apply Hubble HTTPRoute
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/hubble-httproute.yml
      register: hubble_httproute_result
      changed_when: >-
        'created' in hubble_httproute_result.stdout or
        'configured' in hubble_httproute_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up Hubble HTTPRoute manifest
      ansible.builtin.file:
        path: /tmp/hubble-httproute.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Bind9 DNS Server
    # Deploys Bind9 as an authoritative DNS server for the homelab zone using
    # standard Kubernetes manifests (ConfigMap, Deployment, Service). Bind9 is
    # configured with a TSIG key to allow ExternalDNS to dynamically create
    # and update DNS records via RFC 2136. The Service is type LoadBalancer so
    # Bind9 receives its own dedicated LAN IP from the Cilium IP pool.
    #
    # The TSIG secret is auto-generated on first run and stored in a
    # Kubernetes Secret named bind9-tsig. On subsequent runs the existing
    # secret is reused so DNS update credentials remain stable.
    #
    # To find the Bind9 LAN IP after deployment, run:
    #   kubectl get svc -n kube-system bind9
    #
    # To route DNS queries for the zone to Bind9 on client machines:
    #   macOS:
    #     sudo mkdir -p /etc/resolver
    #     echo 'nameserver <BIND9_IP>' | sudo tee /etc/resolver/<dns_zone>
    #   Linux (systemd-resolved):
    #     sudo mkdir -p /etc/systemd/resolved.conf.d
    #     printf '[Resolve]\nDNS=<BIND9_IP>\nDomains=~<dns_zone>\n' \
    #       | sudo tee /etc/systemd/resolved.conf.d/<dns_zone>.conf
    #     sudo systemctl restart systemd-resolved
    # -------------------------------------------------------------------------
    - name: Check if Bind9 TSIG secret already exists
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get secret bind9-tsig -n {{ bind9_namespace }}
          -o jsonpath='{.data.tsig-secret}'
      register: existing_tsig_secret
      changed_when: false
      failed_when: false
      when: bootstrap_node | default(false)

    - name: Generate TSIG secret for Bind9
      ansible.builtin.command:
        cmd: openssl rand -base64 32
      register: generated_tsig_secret
      changed_when: false
      when:
        - bootstrap_node | default(false)
        - existing_tsig_secret.rc != 0

    - name: Create Bind9 TSIG Kubernetes secret
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          create secret generic bind9-tsig
          -n {{ bind9_namespace }}
          --from-literal=tsig-secret={{ generated_tsig_secret.stdout }}
      when:
        - bootstrap_node | default(false)
        - existing_tsig_secret.rc != 0
      changed_when: true

    - name: Set TSIG secret fact from existing or newly generated value
      ansible.builtin.set_fact:
        bind9_tsig_secret: >-
          {{ (existing_tsig_secret.rc == 0)
             | ternary(existing_tsig_secret.stdout | b64decode,
                       generated_tsig_secret.stdout | default('')) }}
      when: bootstrap_node | default(false)

    - name: Write Bind9 manifest
      ansible.builtin.template:
        src: bind9.yml.j2
        dest: /tmp/bind9.yml
        mode: '0644'
      when: bootstrap_node | default(false)

    - name: Apply Bind9 manifest
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/bind9.yml
      register: bind9_apply_result
      changed_when: >-
        'created' in bind9_apply_result.stdout or
        'configured' in bind9_apply_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up Bind9 manifest
      ansible.builtin.file:
        path: /tmp/bind9.yml
        state: absent
      when: bootstrap_node | default(false)

    - name: Wait for Bind9 LoadBalancer IP to be assigned
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get service bind9 -n {{ bind9_namespace }}
          -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
      register: bind9_service_ip_result
      until: bind9_service_ip_result.stdout != ""
      retries: 20
      delay: 5
      when: bootstrap_node | default(false)
      changed_when: false

    # -------------------------------------------------------------------------
    # ExternalDNS
    # Deploys ExternalDNS via the kubernetes-sigs Helm chart to automatically
    # sync DNS records from Gateway API HTTPRoute resources into Bind9 using
    # RFC 2136 dynamic updates. ExternalDNS watches for hostnames on HTTPRoute
    # resources and creates corresponding A records in the Bind9 zone,
    # authenticated with the same TSIG key configured in the Bind9 named.conf.
    # -------------------------------------------------------------------------
    - name: Add ExternalDNS Helm repository
      ansible.builtin.command:
        cmd: helm repo add external-dns https://kubernetes-sigs.github.io/external-dns/
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Update Helm repositories for ExternalDNS
      ansible.builtin.command:
        cmd: helm repo update
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Write ExternalDNS values file
      ansible.builtin.template:
        src: externaldns-values.yml.j2
        dest: /tmp/externaldns-values.yml
        mode: '0644'
      vars:
        bind9_service_ip: "{{ bind9_service_ip_result.stdout }}"
      when: bootstrap_node | default(false)

    - name: Install or upgrade ExternalDNS via Helm
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install external-dns external-dns/external-dns
          --version {{ externaldns_version }}
          --namespace {{ bind9_namespace }}
          --kubeconfig {{ kubectl_config_path }}
          -f /tmp/externaldns-values.yml
      when: bootstrap_node | default(false)
      changed_when: true

    - name: Clean up ExternalDNS values file
      ansible.builtin.file:
        path: /tmp/externaldns-values.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Cilium CLI Installation
    # Installs the Cilium CLI on all nodes. The CLI communicates with Cilium
    # agent pods via the Kubernetes API and provides commands for checking
    # cluster networking status, running connectivity tests, and enabling
    # observability features such as Hubble. The release tarball is fetched
    # from GitHub, the binary is extracted to /usr/local/bin for system-wide
    # access, and the tarball is removed.
    # -------------------------------------------------------------------------
    - name: Get CPU architecture for Cilium CLI download
      ansible.builtin.command:
        cmd: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false

    - name: Download Cilium CLI tarball
      ansible.builtin.get_url:
        url: https://github.com/cilium/cilium-cli/releases/download/v{{ cilium_cli_version }}/cilium-linux-{{ dpkg_arch.stdout }}.tar.gz # noqa: yaml[line-length]
        dest: /tmp/cilium-cli.tar.gz
        mode: '0644'

    - name: Extract Cilium CLI binary to /usr/local/bin
      ansible.builtin.unarchive:
        src: /tmp/cilium-cli.tar.gz
        dest: /usr/local/bin
        remote_src: true

    - name: Clean up temporary Cilium CLI tarball
      ansible.builtin.file:
        path: /tmp/cilium-cli.tar.gz
        state: absent
