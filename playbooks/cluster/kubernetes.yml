---
#
# Installs and configures Kubernetes components (kubelet, kubeadm, kubectl).
#
# This playbook performs the following actions:
#   - Installs prerequisite packages (ca-certificates, curl, gnupg, apt-transport-https).
#   - Adds the official Kubernetes GPG key and APT repository.
#   - Ensures time synchronization is active via chrony.
#   - Loads required kernel modules and sets sysctl networking parameters.
#   - Disables swap (runtime and permanently via /etc/fstab), a requirement for kubelet.
#   - Installs and enables the cri-dockerd bridge for Docker CRI compatibility.
#   - Installs kubelet, kubeadm, and kubectl.
#   - Configures the kubelet cgroup driver to match Docker (systemd).
#   - Places a hold on installed packages to prevent accidental upgrades.
#   - Starts and enables the kubelet service.
#   - Installs Helm via the official APT repository.
#   - Installs k9s, a terminal UI for managing Kubernetes clusters.
#
# Variables:
#   - kube_version:        Kubernetes version to install (default: v1.28).
#   - keyring_path:        Path to store the Kubernetes APT GPG keyring
#                          (default: /etc/apt/keyrings/kubernetes-apt-keyring.gpg).
#   - kube_packages:       List of Kubernetes packages to install
#                          (default: [kubelet, kubeadm, kubectl]).
#   - cri_dockerd_version: Version of cri-dockerd to install (default: 0.3.24).
#   - cri_dockerd_distro:  Ubuntu distro codename for the cri-dockerd package
#                          (default: ubuntu-jammy).
#   - helm_keyring_path:   Path to store the Helm APT GPG keyring
#                          (default: /etc/apt/keyrings/helm.gpg).
#   - helm_packages:       List of Helm packages to install (default: [helm]).
#   - k9s_version:         Version of k9s to install (default: 0.50.18).
#

- name: Install and configure Kubernetes
  hosts: homelab
  become: true
  become_exe: sudo.ws
  vars:
    kube_version: v1.28
    keyring_path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    kube_packages:
      - kubelet
      - kubeadm
      - kubectl
    cri_dockerd_version: 0.3.24
    cri_dockerd_distro: ubuntu-jammy
    helm_keyring_path: /etc/apt/keyrings/helm.gpg
    helm_packages:
      - helm
    k9s_version: 0.50.18

  tasks:
    # -------------------------------------------------------------------------
    # Prerequisites
    # Installs essential packages required to establish secure communication
    # and key validation:
    #   - ca-certificates:     Ensures secure HTTPS connections to external repos.
    #   - curl:                Used to download GPG keys and external resources.
    #   - gnupg:               Necessary to manage and dearmor GPG keys for
    #                          package validation.
    #   - apt-transport-https: Allows APT to securely fetch packages over HTTPS.
    # This section also prepares the standard system keyring directory.
    # -------------------------------------------------------------------------
    - name: Install prerequisite packages for Kubernetes repository
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - apt-transport-https
        state: present
        update_cache: true

    - name: Ensure /etc/apt/keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    # -------------------------------------------------------------------------
    # Repository Configuration
    # Sets up the official Kubernetes APT repository to enable package management.
    # It ensures authenticity by downloading and dearmoring the official
    # Kubernetes GPG key (converting it from ASCII to a binary format readable
    # by APT). The key is placed in the modern /etc/apt/keyrings path.
    # Finally, the repository source list is added, allowing standard APT
    # commands to find and install kubelet, kubeadm, and kubectl.
    # -------------------------------------------------------------------------
    - name: Stat Kubernetes GPG key
      ansible.builtin.stat:
        path: '{{ keyring_path }}'
      register: k8s_keyring_stat

    - name: Download and dearmor Kubernetes GPG key
      when: not k8s_keyring_stat.stat.exists
      block:
        - name: Download Kubernetes GPG key
          ansible.builtin.get_url:
            url: https://pkgs.k8s.io/core:/stable:/{{ kube_version }}/deb/Release.key
            dest: /tmp/k8s-release.key
            mode: '0644'

        - name: Dearmor Kubernetes GPG key
          ansible.builtin.command:
            cmd: gpg --dearmor -o {{ keyring_path }} /tmp/k8s-release.key
          args:
            creates: '{{ keyring_path }}'

        - name: Clean up temporary Kubernetes GPG key file
          ansible.builtin.file:
            path: /tmp/k8s-release.key
            state: absent

    - name: Add Kubernetes APT repository
      ansible.builtin.apt_repository:
        repo: >
          deb [signed-by={{ keyring_path }}]
          https://pkgs.k8s.io/core:/stable:/{{ kube_version }}/deb/ /
        state: present
        filename: kubernetes
        update_cache: true

    # -------------------------------------------------------------------------
    # System Configuration
    # Configures essential kernel modules, networking parameters, and swap
    # settings required by Kubernetes and its container runtime (CRI). These
    # are applied before any Kubernetes components are installed or started:
    #   - chrony:        Ensures time synchronization is active across all nodes.
    #                    Clock skew between nodes can cause certificate validation
    #                    failures and leader election issues in the cluster.
    #   - overlay:       Required by the container runtime for the overlay
    #                    filesystem (managing container image layers).
    #   - br_netfilter:  Enables transparent masquerading and facilitates VxLAN
    #                    traffic for cross-node pod communication.
    #   - sysctl params: Enables dual-stack (IPv4/IPv6) IP forwarding (allowing
    #                    nodes to route pod traffic) and ensures bridged network
    #                    traffic is processed by iptables/ip6tables for filtering.
    #   - swap:          Disabled at runtime and permanently in /etc/fstab, as
    #                    kubelet requires swap to be off for accurate memory
    #                    limit enforcement.
    # -------------------------------------------------------------------------
    - name: Install chrony time synchronization daemon
      ansible.builtin.apt:
        name: chrony
        state: present

    - name: Start and enable chronyd service
      ansible.builtin.systemd:
        name: chronyd
        state: started
        enabled: true

    - name: Force immediate time synchronization via chrony
      ansible.builtin.command: chronyc makestep
      changed_when: false

    - name: Persist required kernel modules
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
        mode: '0644'

    - name: Ensure overlay module is loaded
      ansible.builtin.command: modprobe overlay
      changed_when: false

    - name: Ensure br_netfilter module is loaded
      ansible.builtin.command: modprobe br_netfilter
      changed_when: false

    - name: Set sysctl parameters for Kubernetes networking
      ansible.posix.sysctl:
        name: '{{ item.key }}'
        value: '{{ item.value }}'
        sysctl_file: /etc/sysctl.d/k8s.conf
        sysctl_set: true
        state: present
        reload: true
      loop:
        - {key: 'net.bridge.bridge-nf-call-iptables', value: '1'}
        - {key: 'net.bridge.bridge-nf-call-ip6tables', value: '1'}
        - {key: 'net.ipv4.ip_forward', value: '1'}
        - {key: 'net.ipv6.conf.all.forwarding', value: '1'}

    - name: Disable swap at runtime
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Permanently disable swap in /etc/fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    # -------------------------------------------------------------------------
    # CRI-Dockerd Installation
    # Installs the cri-dockerd bridge, which acts as a compatibility layer
    # between Kubernetes (which requires a CRI-compatible runtime) and Docker
    # Engine (which natively dropped CRI support).
    # This involves determining the current CPU architecture, fetching the
    # specific release deb package from GitHub, installing it, reloading the
    # systemd daemon to register the new service files, and enabling the
    # cri-dockerd systemd socket and service to bridge the connection.
    # -------------------------------------------------------------------------
    - name: Get CPU architecture for package downloads
      ansible.builtin.command: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false

    - name: Download cri-dockerd deb package
      ansible.builtin.get_url:
        url: https://github.com/Mirantis/cri-dockerd/releases/download/v{{ cri_dockerd_version }}/cri-dockerd_{{ cri_dockerd_version }}.3-0.{{ cri_dockerd_distro }}_{{ dpkg_arch.stdout }}.deb  # noqa: yaml[line-length]
        dest: /tmp/cri-dockerd.deb
        mode: '0644'

    - name: Install cri-dockerd package
      ansible.builtin.apt:
        deb: /tmp/cri-dockerd.deb
        state: present

    - name: Clean up temporary cri-dockerd deb file
      ansible.builtin.file:
        path: /tmp/cri-dockerd.deb
        state: absent

    - name: Reload systemd daemon after cri-dockerd installation
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start cri-dockerd services
      ansible.builtin.systemd:
        name: '{{ item }}'
        state: started
        enabled: true
      loop:
        - cri-docker.socket
        - cri-docker.service

    # -------------------------------------------------------------------------
    # Kubernetes Installation and Configuration
    # Handles the core installation and system readiness for Kubernetes:
    #   - Installs the primary Kubernetes components (kubelet, kubeadm, kubectl).
    #   - Applies an 'apt-mark hold' to these packages to prevent unintentional
    #     version upgrades during routine system updates.
    #   - Configures kubelet to use the systemd cgroup driver before the service
    #     starts, which must match the cgroup driver used by Docker to prevent
    #     resource management conflicts.
    #   - Starts and enables the kubelet service.
    # -------------------------------------------------------------------------
    - name: Install Kubernetes components
      ansible.builtin.apt:
        name: '{{ kube_packages }}'
        state: present

    - name: Hold Kubernetes packages from accidental upgrades
      ansible.builtin.dpkg_selections:
        name: '{{ item }}'
        selection: hold
      loop: '{{ kube_packages }}'

    - name: Configure kubelet cgroup driver to use systemd
      ansible.builtin.copy:
        dest: /etc/default/kubelet
        content: 'KUBELET_EXTRA_ARGS=--cgroup-driver=systemd'
        mode: '0644'

    - name: Start and enable kubelet service
      ansible.builtin.systemd:
        name: kubelet
        state: started
        enabled: true

    # -------------------------------------------------------------------------
    # Helm Installation
    # Installs Helm, the package manager for Kubernetes.
    # Similar to the Kubernetes repository setup, this task downloads and
    # dearmors the official Helm GPG key, adds the dedicated Buildkite APT
    # repository, and cleanly installs the helm package to enable efficient
    # deployment of charts and applications to the cluster.
    # -------------------------------------------------------------------------
    - name: Stat Helm GPG key
      ansible.builtin.stat:
        path: '{{ helm_keyring_path }}'
      register: helm_keyring_stat

    - name: Download and dearmor Helm GPG key
      when: not helm_keyring_stat.stat.exists
      block:
        - name: Download Helm GPG key
          ansible.builtin.get_url:
            url: https://packages.buildkite.com/helm-linux/helm-debian/gpgkey
            dest: /tmp/helm-gpgkey
            mode: '0644'

        - name: Dearmor Helm GPG key
          ansible.builtin.command:
            cmd: gpg --dearmor -o {{ helm_keyring_path }} /tmp/helm-gpgkey
          args:
            creates: '{{ helm_keyring_path }}'

        - name: Clean up temporary Helm GPG key file
          ansible.builtin.file:
            path: /tmp/helm-gpgkey
            state: absent

    - name: Add Helm APT repository
      ansible.builtin.apt_repository:
        repo: >
          deb [signed-by={{ helm_keyring_path }}]
          https://packages.buildkite.com/helm-linux/helm-debian/any/ any main
        state: present
        filename: helm-stable-debian
        update_cache: true

    - name: Install Helm components
      ansible.builtin.apt:
        name: '{{ helm_packages }}'
        state: present

    - name: Hold Helm packages from accidental upgrades
      ansible.builtin.dpkg_selections:
        name: '{{ item }}'
        selection: hold
      loop: '{{ helm_packages }}'

    # -------------------------------------------------------------------------
    # k9s Installation
    # Installs k9s, a terminal-based UI for interacting with Kubernetes clusters.
    # k9s provides real-time visibility into cluster resources and simplifies
    # navigation, inspection, and management of workloads directly from the
    # terminal. The release deb package is fetched from GitHub and installed
    # via APT, then the temporary file is removed.
    # -------------------------------------------------------------------------
    - name: Download k9s deb package
      ansible.builtin.get_url:
        url: https://github.com/derailed/k9s/releases/download/v{{ k9s_version }}/k9s_linux_{{ dpkg_arch.stdout }}.deb
        dest: /tmp/k9s.deb
        mode: '0644'

    - name: Install k9s package
      ansible.builtin.apt:
        deb: /tmp/k9s.deb
        state: present

    - name: Clean up temporary k9s deb file
      ansible.builtin.file:
        path: /tmp/k9s.deb
        state: absent
