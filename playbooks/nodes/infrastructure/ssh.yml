---
# ==============================================================================
# Playbook: Configure SSH
# ==============================================================================
# Hardens the SSH daemon on Ubuntu cluster nodes.
#
# Hardening directives are written to a drop-in at
# /etc/ssh/sshd_config.d/99-hardening.conf. The main /etc/ssh/sshd_config
# already contains 'Include /etc/ssh/sshd_config.d/*.conf' so the drop-in
# is layered on top of stock config; the '99-' prefix ensures it loads last
# and wins on overlapping directives.
#
# The drop-in is rendered from sshd_hardening.conf.j2 (encrypted at rest via
# git-crypt) and covers: publickey-only auth via the 'ssh' group, root login
# disabled, brute-force window capped, idle session timeout, modern crypto
# algorithms only, and forwarding features disabled except TCP forwarding.
#
# This playbook performs the following actions:
#   - Creates the 'ssh' group and adds ssh_users to it.
#   - Renders the hardened sshd_config drop-in from the template.
#   - Validates the rendered configuration with 'sshd -t' before reloading.
#   - Reloads sshd to pick up the new configuration.
#
# Variables:
#   ssh_config_dir:    Directory for SSH daemon config snippets
#                      (default: /etc/ssh/sshd_config.d).
#   ssh_users:         List of users to add to the 'ssh' group. Only these
#                      users may log in via SSH. Set in group_vars/nodes.yml.
#   ufw_allowed_ports: Port map read from group_vars/nodes.yml. The SSH
#                      daemon port is sourced from ufw_allowed_ports.ssh.port
#                      and must match ansible_port in inventory.yml.
#
# NOTE: Misconfiguring SSH can block all remote access to the hosts. Review
# all changes carefully before deploying.

- name: Configure SSH
  hosts: nodes
  become: true
  become_exe: sudo.ws
  vars:
    ssh_config_dir: /etc/ssh/sshd_config.d

  tasks:
    # -------------------------------------------------------------------------
    # SSH Group
    # Creates the 'ssh' group and adds the specified users to it. Only members
    # of this group will be permitted to connect via SSH, as enforced by the
    # AllowGroups directive applied in the next section.
    # -------------------------------------------------------------------------
    - name: Create ssh group
      ansible.builtin.group:
        name: ssh
        state: present

    - name: Add users to ssh group
      ansible.builtin.user:
        name: '{{ item }}'
        groups: ssh
        append: true
      loop: '{{ ssh_users }}'

    # -------------------------------------------------------------------------
    # SSH Daemon Configuration
    # Renders the hardening drop-in into sshd_config.d. Using a drop-in keeps
    # changes isolated from the main sshd_config and the '99-' prefix ensures
    # it loads last so its directives override stock defaults.
    # -------------------------------------------------------------------------
    - name: Configure SSH daemon hardening
      ansible.builtin.template:
        src: sshd_hardening.conf.j2
        dest: '{{ ssh_config_dir }}/99-hardening.conf'
        owner: root
        group: root
        mode: '0600'

    # -------------------------------------------------------------------------
    # Validation
    # 'sshd -t' parses every Include'd file and exits non-zero on any syntax
    # or directive error. Catching a bad config here prevents the reload from
    # breaking the running daemon.
    # -------------------------------------------------------------------------
    - name: Validate sshd configuration
      ansible.builtin.command:
        cmd: sshd -t
      changed_when: false

    - name: Reload sshd
      ansible.builtin.service:
        name: sshd
        state: reloaded
