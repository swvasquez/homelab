---
# ==============================================================================
# Playbook: Configure SSH
# ==============================================================================
# Hardens the SSH daemon on Ubuntu cluster nodes.
#
# Hardening directives are written to a drop-in at
# /etc/ssh/sshd_config.d/99-hardening.conf. The main /etc/ssh/sshd_config
# already contains 'Include /etc/ssh/sshd_config.d/*.conf' so the drop-in
# is layered on top of stock config; the '99-' prefix ensures it loads last
# and wins on overlapping directives.
#
# The drop-in is rendered from sshd_hardening.conf.j2 (encrypted at rest via
# git-crypt) and covers: publickey-only auth via the 'ssh' group, root login
# disabled, brute-force window capped, idle session timeout, modern crypto
# algorithms only, and forwarding features disabled except TCP forwarding.
#
# This playbook performs the following actions:
#   - On the Ansible control host (runs first so the operator can SSH to the
#     nodes by inventory hostname even before the daemon-side hardening
#     succeeds): drops a per-group SSH client config snippet into
#     ~/.ssh/config.d/homelab-nodes and ensures the operator's ~/.ssh/config
#     sources the snippet directory via 'Include ~/.ssh/config.d/*'. The
#     snippet contains:
#       - A LAN entry per node (Host = inventory hostname, HostName = LAN IP,
#         IdentityFile-authenticated).
#       - A Tailscale entry per node where 'tailscale' is true in inventory
#         (Host/HostName = '<inventory_hostname>-ts' to match the Tailscale
#         hostname the per-node Tailscale playbook registers; no IdentityFile
#         since Tailscale SSH authenticates via tailnet identity).
#     Inputs come from inventory.yml and group_vars only, so this play does
#     not require remote hosts to be reachable.
#   - On each node: creates the 'ssh' group and adds ssh_users to it; renders
#     the hardened sshd_config drop-in from the template; validates the
#     rendered configuration with 'sshd -t' before reloading; reloads sshd
#     to pick up the new configuration.
#
# Variables:
#   ssh_config_dir:    Directory for SSH daemon config snippets
#                      (default: /etc/ssh/sshd_config.d).
#   ssh_users:         List of users to add to the 'ssh' group. Only these
#                      users may log in via SSH. Set in group_vars/nodes.yml.
#   ufw_allowed_ports: Port map read from group_vars/nodes.yml. The SSH
#                      daemon port is sourced from ufw_allowed_ports.ssh.port
#                      and must match ansible_port in inventory.yml.
#   ssh_identity_file: Filename (under ~/.ssh on the Ansible control host) of
#                      the private key rendered into the IdentityFile
#                      directive of the local SSH client config. Set in
#                      group_vars/all.yml.
#
# NOTE: Misconfiguring SSH can block all remote access to the hosts. Review
# all changes carefully before deploying.

# ==============================================================================
# Local SSH client config
# Drops a per-group snippet into ~/.ssh/config.d/ on the Ansible control host
# so the operator can reach each node by inventory hostname (e.g. 'ssh
# <inventory_hostname>') with the correct user, port, and identity file.
# Also ensures the main ~/.ssh/config sources the snippet directory via
# 'Include ~/.ssh/config.d/*'. Runs first and on localhost only, with
# gather_facts disabled, so the snippet is generated even if the cluster
# nodes are unreachable.
# ==============================================================================
- name: Configure local SSH client config for nodes
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    local_ssh_dir: '{{ lookup("env", "HOME") }}/.ssh'
    local_ssh_config_dir: '{{ lookup("env", "HOME") }}/.ssh/config.d'
    local_ssh_config_file: '{{ lookup("env", "HOME") }}/.ssh/config'
    local_ssh_snippet: '{{ lookup("env", "HOME") }}/.ssh/config.d/homelab-nodes'

  tasks:
    # -------------------------------------------------------------------------
    # Filesystem
    # Ensures the operator's SSH directory and the config.d snippet directory
    # exist with mode 0700. OpenSSH refuses to read either if the permissions
    # are looser than 0700, so the modes are enforced explicitly.
    # -------------------------------------------------------------------------
    - name: Ensure ~/.ssh exists
      ansible.builtin.file:
        path: '{{ local_ssh_dir }}'
        state: directory
        mode: '0700'

    - name: Ensure ~/.ssh/config.d exists
      ansible.builtin.file:
        path: '{{ local_ssh_config_dir }}'
        state: directory
        mode: '0700'

    # -------------------------------------------------------------------------
    # Snippet Render
    # Renders one Host stanza per node from the inventory: a LAN entry for
    # every node, plus a Tailscale entry for nodes where 'tailscale' is true.
    # -------------------------------------------------------------------------
    - name: Render SSH client config snippet for nodes
      ansible.builtin.template:
        src: ssh_client_config.j2
        dest: '{{ local_ssh_snippet }}'
        mode: '0600'

    # -------------------------------------------------------------------------
    # Main Config Include
    # Adds an Ansible-managed block to ~/.ssh/config that sources every
    # snippet under ~/.ssh/config.d/. The conda-style markers make the block
    # discoverable on re-runs so blockinfile can update or remove it without
    # touching the operator's hand-written entries.
    #
    # The block is anchored before the first Host or Match stanza (i.e. after
    # any pre-existing Include directives at the top of ~/.ssh/config). This
    # is required because OpenSSH does not close a Host block explicitly: an
    # Include placed below a Host block inherits that block's match scope and
    # is only evaluated when that host matches, which is never what we want.
    # blockinfile only honors 'insertbefore' when creating a new block, so a
    # short slurp + set_fact + conditional 'state: absent' precedes the
    # blockinfile call to re-anchor a previously misplaced block exactly
    # once. After that the position is stable.
    # -------------------------------------------------------------------------
    - name: Read ~/.ssh/config to detect a misplaced managed Include block
      ansible.builtin.slurp:
        src: '{{ local_ssh_config_file }}'
      register: ssh_config_slurp
      failed_when: false

    - name: Compute whether the managed Include block needs to be re-anchored
      ansible.builtin.set_fact:
        ssh_include_block_misplaced: >-
          {{
            ssh_config_slurp.content is defined
            and (
              ssh_config_slurp.content
              | b64decode
              | regex_search('(?ms)^(Host|Match) .*?\n# >>> homelab initialize >>>')
            ) is not none
          }}

    - name: Remove the managed Include block when it sits below a Host/Match
      ansible.builtin.blockinfile:
        path: '{{ local_ssh_config_file }}'
        marker: '# {mark}'
        marker_begin: '>>> homelab initialize >>>'
        marker_end: '<<< homelab initialize <<<'
        state: absent
      when: ssh_include_block_misplaced | bool

    - name: Ensure ~/.ssh/config sources the config.d snippet directory
      ansible.builtin.blockinfile:
        path: '{{ local_ssh_config_file }}'
        block: |
          # !! Contents within this block are managed by Ansible !!
          Include ~/.ssh/config.d/*
        marker: '# {mark}'
        marker_begin: '>>> homelab initialize >>>'
        marker_end: '<<< homelab initialize <<<'
        insertbefore: '^(Host|Match) '
        prepend_newline: true
        append_newline: true
        create: true
        mode: '0600'

# ==============================================================================
# Remote SSH daemon hardening
# Configures the 'ssh' group on each cluster node, drops the hardened
# sshd_config snippet into /etc/ssh/sshd_config.d/, validates the rendered
# config with 'sshd -t', and reloads the daemon. Requires SSH connectivity
# to the targets.
# ==============================================================================
- name: Configure SSH
  hosts: nodes
  become: true
  become_exe: sudo.ws
  vars:
    ssh_config_dir: /etc/ssh/sshd_config.d

  tasks:
    # -------------------------------------------------------------------------
    # SSH Group
    # Creates the 'ssh' group and adds the specified users to it. Only members
    # of this group will be permitted to connect via SSH, as enforced by the
    # AllowGroups directive applied in the next section.
    # -------------------------------------------------------------------------
    - name: Create ssh group
      ansible.builtin.group:
        name: ssh
        state: present

    - name: Add users to ssh group
      ansible.builtin.user:
        name: '{{ item }}'
        groups: ssh
        append: true
      loop: '{{ ssh_users }}'

    # -------------------------------------------------------------------------
    # SSH Daemon Configuration
    # Renders the hardening drop-in into sshd_config.d. Using a drop-in keeps
    # changes isolated from the main sshd_config and the '99-' prefix ensures
    # it loads last so its directives override stock defaults.
    # -------------------------------------------------------------------------
    - name: Configure SSH daemon hardening
      ansible.builtin.template:
        src: sshd_hardening.conf.j2
        dest: '{{ ssh_config_dir }}/99-hardening.conf'
        owner: root
        group: root
        mode: '0600'

    # -------------------------------------------------------------------------
    # Validation
    # 'sshd -t' parses every Include'd file and exits non-zero on any syntax
    # or directive error. Catching a bad config here prevents the reload from
    # breaking the running daemon.
    # -------------------------------------------------------------------------
    - name: Validate sshd configuration
      ansible.builtin.command:
        cmd: sshd -t
      changed_when: false

    - name: Reload sshd
      ansible.builtin.service:
        name: sshd
        state: reloaded
