---
# ==============================================================================
# Playbook: Install Observability Utilities
# ==============================================================================
# Installs a collection of command-line utilities for system and network
# observability.
#
# This playbook installs the following packages:
#   - bmon:       Bandwidth monitor and rate estimator.
#   - btop:       Modern resource monitor.
#   - lm-sensors: Tools for monitoring hardware sensors.
#   - iftop:      Displays bandwidth usage on an interface.
#   - net-tools:  Classic networking utilities (e.g., ifconfig, netstat).
#   - nmap:       Network scanner and security auditor.
#   - iproute2:   Modern Linux networking utilities (e.g., ip, ss).
#
# Variables:
#   observability_packages:  List of APT packages to install for system and
#                            network observability (default: [bmon, btop, ...]).

- name: Install observability utilities
  hosts: nodes
  become: true
  become_exe: sudo.ws
  vars:
    observability_packages:
      - bmon
      - btop
      - lm-sensors
      - iftop
      - net-tools
      - nmap
      - iproute2

  tasks:
    # -------------------------------------------------------------------------
    # Installation
    # Installs system and network observability utilities from the OS package
    # manager, making them available system-wide to all users.
    # -------------------------------------------------------------------------
    - name: Install observability utility packages
      ansible.builtin.apt:
        name: '{{ observability_packages }}'
        state: present
        update_cache: true
