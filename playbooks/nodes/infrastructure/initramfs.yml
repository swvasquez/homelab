---
# ==============================================================================
# Playbook: Configure Dropbear Initramfs
# ==============================================================================
# Configures remote unlocking of LUKS-encrypted drives using Dropbear SSH
# within the initramfs environment.
#
# This setup involves three parts (the localhost plays run first so the
# operator has a working unlock-<host> SSH config and the unlock key on disk
# even before the cluster nodes are reachable):
#   1. On localhost: Requires the dedicated Dropbear SSH keypair to already
#      exist in the operator's pass store and materializes it to ~/.ssh so
#      ssh has a real key file. Generation is opt-in
#      (-e allow_dropbear_keygen=true) for first bootstrap or rotation.
#   2. On localhost: drops a per-group SSH client config snippet into
#      ~/.ssh/config.d/homelab-unlock and ensures the operator's
#      ~/.ssh/config sources the snippet directory via 'Include
#      ~/.ssh/config.d/*'. The snippet contains:
#        - An 'unlock-<host>' entry per node (HostName = private_ip,
#          User = root, Port = Dropbear port, IdentityFile =
#          ~/.ssh/{{ dropbear_identity_file }}).
#        - An 'unlock-<host>-ts' entry per node where 'tailscale' is true
#          in inventory, sharing the same fields. The Tailscale variant
#          relies on the operator's tailnet routing the homelab LAN CIDR
#          via subnet-route exit nodes (see
#          playbooks/nodes/infrastructure/tailscale.yml) to reach the
#          Dropbear environment, which is on the LAN before tailscaled
#          starts.
#      Inputs come from inventory.yml and group_vars only, so this play
#      does not require remote hosts to be reachable.
#   3. On target hosts:
#      - Installs the 'dropbear-initramfs' and 'ethtool' packages.
#      - Authorizes the keypair's public half, read from the pass store,
#        for initramfs login.
#      - Configures Dropbear server options (port, command).
#      - Sets a static IP address for the initramfs environment.
#      - Bundles the ethtool binary into the initramfs via a hook and
#        installs an init-premount script that arms Wake-on-LAN on the NIC
#        so the host remains recoverable via magic packet after any shutdown
#        from the initramfs environment.
#      - Rebuilds the initramfs to apply all changes.
#
# Variables (set in inventory.yml per host):
#   private_ip:            The static IP address assigned to this host in
#                          the initramfs environment (e.g., 192.168.1.100).
#   network_interface:     The network interface name to configure in
#                          initramfs (e.g., eth0).
#   tailscale:             Whether this host runs Tailscale on the regular
#                          OS. Gates the per-host 'unlock-<host>-ts' entry
#                          in the local SSH client config snippet.
#
# Variables (set in group_vars/nodes.yml):
#   router_private_ip:     The gateway IP address for the initramfs
#                          environment (e.g., 192.168.1.1).
#   ufw_allowed_ports:     Port map. The Dropbear port is sourced from
#                          ufw_allowed_ports.dropbear.port and used both
#                          for the initramfs Dropbear listener and for the
#                          Port directive in the local SSH client config.
#
# Variables (set in group_vars/all.yml):
#   dropbear_identity_file:
#                          Filename (under ~/.ssh on the Ansible control
#                          host) of the keypair used to authenticate to
#                          Dropbear. Rendered into the IdentityFile directive
#                          of the local SSH client config snippet.
#   pass_namespace:        Top-level folder in the operator's pass store. The
#                          Dropbear keypair is stored under
#                          '<pass_namespace>/dropbear/private-key' and
#                          '<pass_namespace>/dropbear/public-key'. The public
#                          half is read into each node's initramfs; the
#                          private half is materialized to ~/.ssh here.
#   dropbear_pass_private / dropbear_pass_public:
#                          Full pass-store entry paths for the keypair,
#                          derived from pass_namespace.
#
# Derived variables:
#   dropbear_port:         The SSH port Dropbear will listen on in
#                          initramfs. Derived from
#                          ufw_allowed_ports.dropbear.port.
#
# Overrides (pass with -e on the command line; default shown):
#   allow_dropbear_keygen (false):
#                          When true, the keypair is generated into pass if it
#                          is missing (adopting an existing local key if one is
#                          present). Left false, a missing keypair is a hard
#                          error, so only a deliberate bootstrap or rotation
#                          creates a key.
#

# ==============================================================================
# Local keypair (pass-backed)
# The operator's pass store is the single source of truth for the Dropbear
# ED25519 keypair; this play materializes it to ~/.ssh on the Ansible control
# host so ssh has a real key file to connect with. The keypair must already
# exist in pass — a machine without the migrated store fails fast rather than
# minting a divergent key. Pass -e allow_dropbear_keygen=true to generate it
# on first bootstrap (or after `pass rm`-ing the entries to rotate); on that
# path an existing local ~/.ssh key is adopted rather than replaced so nodes
# already baked with its public half keep working. The remote play below
# authorizes the public half — read straight from pass — in each node's
# initramfs.
# ==============================================================================
- name: Provision the Dropbear unlock keypair from the pass store
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    local_dropbear_key: '{{ lookup("env", "HOME") }}/.ssh/{{ dropbear_identity_file }}'
    allow_dropbear_keygen: false

  tasks:
    # -------------------------------------------------------------------------
    # Preflight
    # The keypair must already exist in the pass store. This stops a machine
    # that has not had the pass store migrated to it from silently minting a
    # fresh, divergent key. Generation is opt-in via
    # `-e allow_dropbear_keygen=true`, used only on first bootstrap or a
    # deliberate rotation.
    # -------------------------------------------------------------------------
    - name: Check whether the Dropbear keypair exists in the pass store
      ansible.builtin.command:
        cmd: pass show '{{ dropbear_pass_private }}'
      register: dropbear_key_check
      changed_when: false
      failed_when: false
      no_log: true

    - name: Require the Dropbear keypair to pre-exist in the pass store
      ansible.builtin.assert:
        that: dropbear_key_check.rc == 0
        fail_msg: >-
          No Dropbear key found at '{{ dropbear_pass_private }}' in the pass
          store. Migrate your pass store to this machine before running, or
          re-run with -e allow_dropbear_keygen=true to mint a fresh keypair
          and bake it into every node (this creates a new unlock key).
        success_msg: 'Dropbear keypair present in the pass store.'
      when: not (allow_dropbear_keygen | bool)

    # -------------------------------------------------------------------------
    # Generation (opt-in)
    # Runs only when explicitly allowed and the keypair is currently missing.
    # Adopts a pre-existing local key if one is present so bootstrapping off an
    # older bare-file setup does not rotate a key whose public half is already
    # baked into nodes. Temporary key material lives under a private mktemp dir
    # and is removed on exit.
    # -------------------------------------------------------------------------
    - name: Generate the Dropbear keypair into the pass store
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail

          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          if [ -f '{{ local_dropbear_key }}' ]; then
            cp '{{ local_dropbear_key }}' "$tmp/key"
            ssh-keygen -y -f "$tmp/key" > "$tmp/key.pub"
          else
            ssh-keygen -t ed25519 -N '' -C 'dropbear-initramfs-unlock' -f "$tmp/key"
          fi

          pass insert --multiline --force '{{ dropbear_pass_private }}' < "$tmp/key"
          pass insert --multiline --force '{{ dropbear_pass_public }}' < "$tmp/key.pub"
        executable: /bin/sh
      changed_when: true
      no_log: true
      when:
        - allow_dropbear_keygen | bool
        - dropbear_key_check.rc != 0

    # -------------------------------------------------------------------------
    # Materialization
    # Writes the keypair from pass back to ~/.ssh so ssh has a real key file
    # for the unlock-<host> aliases. Idempotent and self-healing: a deleted or
    # corrupted local key is restored from pass on the next run. The pass CLI
    # strips the trailing newline, so one is re-appended to keep the key files
    # byte-identical to what ssh-keygen produced.
    # -------------------------------------------------------------------------
    - name: Install the Dropbear private key on the operator workstation
      ansible.builtin.copy:
        content: "{{ lookup('pipe', 'pass show ' ~ dropbear_pass_private) }}\n"
        dest: '{{ local_dropbear_key }}'
        mode: '0600'
      no_log: true

    - name: Install the Dropbear public key on the operator workstation
      ansible.builtin.copy:
        content: "{{ lookup('pipe', 'pass show ' ~ dropbear_pass_public) }}\n"
        dest: '{{ local_dropbear_key }}.pub'
        mode: '0644'

# ==============================================================================
# Local SSH client config
# Drops a snippet into ~/.ssh/config.d/ on the Ansible control host so the
# operator can reach each node's Dropbear initramfs by short alias (e.g.
# 'ssh unlock-<inventory_hostname>') with the correct user, port, and
# identity file. Also ensures the main ~/.ssh/config sources the snippet
# directory via 'Include ~/.ssh/config.d/*'. Runs on localhost only, with
# gather_facts disabled, so the snippet is generated even if the cluster
# nodes are unreachable.
# ==============================================================================
- name: Configure local SSH client config for Dropbear unlock
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    local_ssh_dir: '{{ lookup("env", "HOME") }}/.ssh'
    local_ssh_config_dir: '{{ lookup("env", "HOME") }}/.ssh/config.d'
    local_ssh_config_file: '{{ lookup("env", "HOME") }}/.ssh/config'
    local_ssh_snippet: '{{ lookup("env", "HOME") }}/.ssh/config.d/homelab-unlock'

  tasks:
    # -------------------------------------------------------------------------
    # Filesystem
    # Ensures the operator's SSH directory and the config.d snippet directory
    # exist with mode 0700. OpenSSH refuses to read either if the permissions
    # are looser than 0700, so the modes are enforced explicitly.
    # -------------------------------------------------------------------------
    - name: Ensure ~/.ssh exists
      ansible.builtin.file:
        path: '{{ local_ssh_dir }}'
        state: directory
        mode: '0700'

    - name: Ensure ~/.ssh/config.d exists
      ansible.builtin.file:
        path: '{{ local_ssh_config_dir }}'
        state: directory
        mode: '0700'

    # -------------------------------------------------------------------------
    # Snippet Render
    # Renders one 'unlock-<host>' stanza per node, plus an 'unlock-<host>-ts'
    # variant per node where 'tailscale' is true. Both share the LAN IP as
    # HostName since the Dropbear environment runs before tailscaled starts;
    # the Tailscale variant is reachable through the tailnet via subnet-route
    # exit nodes.
    # -------------------------------------------------------------------------
    - name: Render Dropbear unlock SSH client config snippet
      ansible.builtin.template:
        src: dropbear_unlock_ssh_config.j2
        dest: '{{ local_ssh_snippet }}'
        mode: '0600'

    # -------------------------------------------------------------------------
    # Main Config Include
    # Adds an Ansible-managed block to ~/.ssh/config that sources every
    # snippet under ~/.ssh/config.d/. The conda-style markers make the block
    # discoverable on re-runs so blockinfile can update or remove it without
    # touching the operator's hand-written entries. The same markers are used
    # by the SSH playbooks so all three plays manage one shared block.
    #
    # The block is anchored before the first Host or Match stanza (i.e. after
    # any pre-existing Include directives at the top of ~/.ssh/config). This
    # is required because OpenSSH does not close a Host block explicitly: an
    # Include placed below a Host block inherits that block's match scope and
    # is only evaluated when that host matches, which is never what we want.
    # blockinfile only honors 'insertbefore' when creating a new block, so a
    # short slurp + set_fact + conditional 'state: absent' precedes the
    # blockinfile call to re-anchor a previously misplaced block exactly
    # once. After that the position is stable.
    # -------------------------------------------------------------------------
    - name: Read ~/.ssh/config to detect a misplaced managed Include block
      ansible.builtin.slurp:
        src: '{{ local_ssh_config_file }}'
      register: ssh_config_slurp
      failed_when: false

    - name: Compute whether the managed Include block needs to be re-anchored
      ansible.builtin.set_fact:
        ssh_include_block_misplaced: >-
          {{
            ssh_config_slurp.content is defined
            and (
              ssh_config_slurp.content
              | b64decode
              | regex_search('(?ms)^(Host|Match) .*?\n# >>> homelab initialize >>>')
            ) is not none
          }}

    - name: Remove the managed Include block when it sits below a Host/Match
      ansible.builtin.blockinfile:
        path: '{{ local_ssh_config_file }}'
        marker: '# {mark}'
        marker_begin: '>>> homelab initialize >>>'
        marker_end: '<<< homelab initialize <<<'
        state: absent
      when: ssh_include_block_misplaced | bool

    - name: Ensure ~/.ssh/config sources the config.d snippet directory
      ansible.builtin.blockinfile:
        path: '{{ local_ssh_config_file }}'
        block: |
          # !! Contents within this block are managed by Ansible !!
          Include ~/.ssh/config.d/*
        marker: '# {mark}'
        marker_begin: '>>> homelab initialize >>>'
        marker_end: '<<< homelab initialize <<<'
        insertbefore: '^(Host|Match) '
        prepend_newline: true
        append_newline: true
        create: true
        mode: '0600'

# ==============================================================================
# Remote initramfs configuration
# Installs Dropbear into the initramfs on each cluster node, authorizes the
# public key read from the pass store, configures the listen port and unlock
# command, sets the static early-boot IP, and rebuilds the initramfs.
# Requires SSH connectivity to the targets.
# ==============================================================================
- name: Install and configure Dropbear for initramfs
  hosts: nodes
  become: true
  become_exe: sudo.ws
  vars:
    dropbear_port: '{{ ufw_allowed_ports.dropbear.port }}'

  tasks:
    # -------------------------------------------------------------------------
    # Installation
    # Installs the dropbear-initramfs package, which embeds a minimal SSH server
    # into the initramfs so the host can be unlocked remotely before the root
    # filesystem mounts.
    # -------------------------------------------------------------------------
    - name: Install dropbear-initramfs and ethtool packages
      ansible.builtin.apt:
        name:
          - dropbear-initramfs
          - ethtool
        state: present
        update_cache: true

    # -------------------------------------------------------------------------
    # Configuration
    # Authorizes the Dropbear public key (read from the pass store on the
    # control host), configures Dropbear server options, and sets a static IP
    # so the host is reachable during early boot. The initramfs is then
    # rebuilt to apply all changes.
    # -------------------------------------------------------------------------
    - name: Authorize Dropbear public key for initramfs
      ansible.builtin.lineinfile:
        path: /etc/dropbear/initramfs/authorized_keys
        line: >-
          no-port-forwarding,no-agent-forwarding,no-X11-forwarding,no-pty
          {{ lookup('pipe', 'pass show ' ~ dropbear_pass_public) }}
        create: true
        mode: '0600'

    - name: Configure Dropbear server options for initramfs
      ansible.builtin.lineinfile:
        path: /etc/dropbear/initramfs/dropbear.conf
        line: 'DROPBEAR_OPTIONS="-I 180 -j -k -p {{ dropbear_port }} -s -c cryptroot-unlock"'
        state: present
        create: true
        mode: '0644'

    - name: Configure static IP for initramfs
      ansible.builtin.lineinfile:
        path: /etc/initramfs-tools/initramfs.conf
        regexp: '^IP='
        line: >-
          IP={{ private_ip }}::{{ router_private_ip }}:255.255.255.0:{{ ansible_host }}:{{ network_interface }}
        state: present
        create: true
        mode: '0644'

    # -------------------------------------------------------------------------
    # Wake-on-LAN
    # Linux NIC drivers reset the Wake-on-LAN enable bit to off on every boot.
    # Netplan re-arms it when the interface comes up in the real OS, but a
    # shutdown issued from inside the initramfs (operator power button, manual
    # poweroff from the dropbear SSH session, etc.) happens before the real OS
    # boots, leaving WoL disabled and the host unreachable via magic packet.
    # The ethtool hook bundles the ethtool binary into the initramfs so the
    # init-premount script can arm WoL immediately at boot, before any shutdown
    # path can fire.
    # -------------------------------------------------------------------------
    - name: Install ethtool initramfs hook to bundle ethtool in initramfs
      ansible.builtin.template:
        src: ethtool_initramfs_hook.sh.j2
        dest: /etc/initramfs-tools/hooks/ethtool
        mode: '0755'

    - name: Remove old LUKS unlock timeout init-premount script if present
      ansible.builtin.file:
        path: /etc/initramfs-tools/scripts/init-premount/zz-luks-unlock-timeout
        state: absent

    - name: Install Wake-on-LAN init-premount script into initramfs
      ansible.builtin.template:
        src: wol_initramfs.sh.j2
        dest: /etc/initramfs-tools/scripts/init-premount/zz-wol
        mode: '0755'

    - name: Rebuild initramfs to apply changes
      ansible.builtin.command:
        cmd: update-initramfs -u -k all
      register: update_initramfs_result
      changed_when: update_initramfs_result.stdout != ''
