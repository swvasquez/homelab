---
# ==============================================================================
# Playbook: Install and Configure SLURM Cluster
# ==============================================================================
# Installs and configures a SLURM workload manager cluster.
#
# This playbook performs the following actions:
#
#   All nodes:
#     - Installs munge (authentication) and SLURM packages.
#     - Ensures /etc/slurm, log, and spool directories exist with correct ownership.
#     - Copies the munge key from the Ansible control machine.
#     - Deploys slurm.conf from a Jinja2 template.
#     - Deploys cgroup.conf from a Jinja2 template.
#     - Deploys job_container.conf when job containers are enabled.
#     - Starts and enables munge.
#
#   Controller node (host where slurm_controller: true in inventory):
#     - Generates a munge key if one does not already exist.
#     - Fetches the munge key to the Ansible control machine for distribution.
#     - Creates the local state directory for slurmctld.
#     - Creates the shared NFS directory for job outputs.
#     - Starts and enables slurmctld.
#
#   Compute nodes (hosts where slurm_compute_node: true in inventory):
#     - Optionally creates and formats a Logical Volume for the scratch filesystem.
#     - Mounts the scratch LV and creates the scratch base directory.
#     - Starts and enables slurmd.
#
# Inventory variables:
#   slurm_controller:            Boolean, set to true on the node that should run slurmctld.
#   slurm_compute_node:          Boolean, set to true on any node that should run slurmd
#                                and accept jobs. Can be combined with slurm_controller
#                                on the same host to make the controller also a compute node.
#
# Playbook variables:
#   slurm_ctld_port:             Port slurmctld listens on. Derived from
#                                ufw_allowed_ports.slurm_ctld.port.
#   slurm_d_port:                Port slurmd listens on. Derived from
#                                ufw_allowed_ports.slurm_d.port.
#   slurm_cluster_name:          SLURM cluster name (default: homelab).
#   slurm_partition_name:        Default partition name (default: homelab).
#   slurm_state_dir:             Local directory on the controller for slurmctld state.
#                                Stores the job queue and node states so the controller
#                                can recover after a restart without depending on NFS.
#                                Must NOT be on NFS (default: /var/lib/slurm/state).
#   slurm_nfs_path:              Base path under the NFS mount for SLURM data
#                                (default: /mnt/nfs/slurm). The 'jobs' subdirectory
#                                is created here. Job scripts should use
#                                {{ slurm_nfs_path }}/jobs as their working directory.
#   slurm_nfs_server_path:       Server-side export path for SLURM NFS directories.
#                                Must point to the actual export directory on the NFS
#                                server host (not the client mount point) so that
#                                directory creation runs outside of root_squash.
#                                Should be nfs_export_path + /slurm
#                                (default: /srv/nfs/data/slurm).
#   slurm_log_dir:               Directory for slurmctld and slurmd log files
#                                (default: /var/log/slurm).
#   slurm_spool_dir:             Local per-node spool directory for slurmd; must NOT
#                                be on NFS (default: /var/spool/slurmd).
#   slurm_max_time:              Maximum job run time for the default partition
#                                (default: INFINITE). Use d-hh:mm:ss format to cap.
#   slurm_def_mem_per_cpu:       Default memory per CPU in MB. Set to 0 to disable the
#                                constraint (default: 0).
#   slurm_enable_job_container:  Enable per-job /scratch isolation via job_container/tmpfs.
#                                Each job gets a private bind-mount so /scratch appears
#                                as an isolated local directory (default: false).
#   slurm_scratch_dir:           Base path for per-job scratch directories. Only used
#                                when slurm_enable_job_container is true
#                                (default: /scratch).
#   slurm_scratch_lvm_vg_name:   LVM Volume Group to use for the scratch filesystem
#                                (default: ubuntu-vg).
#   slurm_scratch_lvm_lv_name:   LVM Logical Volume name for scratch (default: scratch_lv).
#   slurm_create_scratch_lv:     Boolean, whether to create and format a new scratch LV
#                                (default: false). Set to false when the LV already exists
#                                and only needs to be mounted.
#   slurm_scratch_lvm_lv_size:   Size of the scratch LV, required when slurm_create_scratch_lv
#                                is true (e.g., 100g).
#   slurm_cgroup_constrain_cores:    Restrict jobs to their allocated CPU cores
#                                    (default: true).
#   slurm_cgroup_constrain_ram:      Kill jobs that exceed their memory allocation
#                                    (default: true).
#   slurm_cgroup_constrain_devices:  Restrict device access to allocated devices only;
#                                    required for GPU isolation (default: false).
#
# NOTE: The slurm and munge system users must have identical UIDs and GIDs across
#       all nodes when NFS shared storage is in use. Verify this before running the
#       playbook, or pre-create the users/groups with explicit IDs beforehand.
#

- name: Install and configure SLURM cluster
  hosts: nodes
  become: true
  become_exe: sudo.ws
  gather_facts: true
  gather_subset:
    - min
    - hardware
  gather_timeout: 30
  vars:
    slurm_ctld_port: '{{ ufw_allowed_ports.slurm_ctld.port }}'
    slurm_d_port: '{{ ufw_allowed_ports.slurm_d.port }}'
    slurm_cluster_name: homelab
    slurm_partition_name: homelab
    slurm_nfs_path: /mnt/nfs/slurm
    slurm_nfs_server_path: /srv/nfs/data/slurm
    slurm_state_dir: /var/lib/slurm/state
    slurm_log_dir: /var/log/slurm
    slurm_spool_dir: /var/spool/slurmd
    slurm_max_time: INFINITE
    slurm_def_mem_per_cpu: 0
    slurm_enable_job_container: false
    slurm_scratch_dir: /scratch
    slurm_scratch_lvm_vg_name: ubuntu-vg
    slurm_scratch_lvm_lv_name: scratch_lv
    slurm_create_scratch_lv: false
    slurm_scratch_lvm_lv_size: 50g
    slurm_cgroup_constrain_cores: true
    slurm_cgroup_constrain_ram: true
    slurm_cgroup_constrain_devices: false
    _slurm_controller_hostname: >-
      {{ hostvars | dict2items
         | selectattr('value.slurm_controller', 'defined')
         | selectattr('value.slurm_controller', 'equalto', true)
         | map(attribute='value.ansible_hostname')
         | first }}
    _slurm_controller_ip: >-
      {{ hostvars | dict2items
         | selectattr('value.slurm_controller', 'defined')
         | selectattr('value.slurm_controller', 'equalto', true)
         | map(attribute='value.private_ip')
         | first }}
    _nfs_server_host: >-
      {{ hostvars | dict2items
         | selectattr('value.nfs_server', 'defined')
         | selectattr('value.nfs_server', 'equalto', true)
         | map(attribute='key')
         | first }}
  tasks:
    # -------------------------------------------------------------------------
    # Package Installation
    # Installs three packages on every node:
    #   - munge:        authentication daemon; all SLURM daemons and commands
    #                   use munge tokens to verify that messages originate from
    #                   a trusted node in the cluster.
    #   - libmunge-dev: development headers required by slurm-wlm at runtime
    #                   for munge credential verification.
    #   - slurm-wlm:    the full SLURM workload manager suite, which includes
    #                   both slurmctld (controller) and slurmd (compute) daemons.
    # -------------------------------------------------------------------------
    - name: Install munge and SLURM packages
      ansible.builtin.apt:
        name:
          - munge
          - libmunge-dev
          - slurm-wlm
        state: present
        update_cache: true

    # -------------------------------------------------------------------------
    # Directory Setup
    # Creates the local directories that SLURM daemons require on every node:
    #   - /etc/slurm:          configuration files (slurm.conf, cgroup.conf, etc.)
    #   - slurm_log_dir:       daemon log output for both slurmctld and slurmd.
    #   - slurm_spool_dir:     per-node working directory for slurmd; stores job
    #                          step state and batch scripts while jobs are running.
    #                          Must be local (not NFS) so each node has independent
    #                          state and so slurmd can recover after a restart even
    #                          if NFS is unavailable.
    # -------------------------------------------------------------------------
    - name: Ensure /etc/slurm directory exists
      ansible.builtin.file:
        path: /etc/slurm
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure SLURM log directory exists
      ansible.builtin.file:
        path: "{{ slurm_log_dir }}"
        state: directory
        owner: slurm
        group: slurm
        mode: '0755'

    - name: Ensure SLURM spool directory exists
      ansible.builtin.file:
        path: "{{ slurm_spool_dir }}"
        state: directory
        owner: slurm
        group: slurm
        mode: '0755'

    - name: Ensure SLURM state directory exists on controller
      ansible.builtin.file:
        path: "{{ slurm_state_dir }}"
        state: directory
        owner: slurm
        group: slurm
        mode: '0700'
      when: slurm_controller | default(false) | bool

    # -------------------------------------------------------------------------
    # Scratch Filesystem Setup (compute nodes only)
    # The scratch filesystem must be backed by a local LV — not NFS — to
    # provide the per-node isolation and I/O performance that job containers
    # require. XFS is used for better performance with large files and
    # parallel writes typical of HPC scratch workloads.
    # -------------------------------------------------------------------------
    - name: Ensure LVM packages are installed for scratch
      ansible.builtin.apt:
        name: lvm2
        state: present
        update_cache: true
      when:
        - slurm_enable_job_container | bool
        - slurm_compute_node | default(false) | bool
        - slurm_create_scratch_lv | bool

    - name: Check if scratch Logical Volume already exists
      ansible.builtin.command:
        cmd: "lvs /dev/{{ slurm_scratch_lvm_vg_name }}/{{ slurm_scratch_lvm_lv_name }}"
      register: scratch_lv_check
      failed_when: false
      changed_when: false
      when:
        - slurm_enable_job_container | bool
        - slurm_compute_node | default(false) | bool
        - slurm_create_scratch_lv | bool

    - name: Assert enough unallocated space in Volume Group for scratch
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail &&
          vgs "{{ slurm_scratch_lvm_vg_name }}" -o vg_free --units g --noheadings --nosuffix |
          awk -v need="{{ slurm_scratch_lvm_lv_size | regex_replace('[^0-9.]', '') }}"
              '{ if ($1 < need) { print "Need "need"g, only "$1"g free in VG
          {{ slurm_scratch_lvm_vg_name }}"; exit 1 } }'
        executable: /bin/bash
      changed_when: false
      when:
        - slurm_enable_job_container | bool
        - slurm_compute_node | default(false) | bool
        - slurm_create_scratch_lv | bool
        - scratch_lv_check.rc != 0

    - name: Create scratch Logical Volume
      community.general.lvol:
        vg: "{{ slurm_scratch_lvm_vg_name }}"
        lv: "{{ slurm_scratch_lvm_lv_name }}"
        size: "{{ slurm_scratch_lvm_lv_size }}"
        state: present
      when:
        - slurm_enable_job_container | bool
        - slurm_compute_node | default(false) | bool
        - slurm_create_scratch_lv | bool
        - scratch_lv_check.rc != 0

    - name: Format scratch Logical Volume with XFS
      community.general.filesystem:
        fstype: xfs
        dev: "/dev/{{ slurm_scratch_lvm_vg_name }}/{{ slurm_scratch_lvm_lv_name }}"
      when:
        - slurm_enable_job_container | bool
        - slurm_compute_node | default(false) | bool
        - slurm_create_scratch_lv | bool
        - scratch_lv_check.rc != 0

    - name: Mount scratch Logical Volume
      ansible.posix.mount:
        path: "{{ slurm_scratch_dir }}"
        src: "/dev/{{ slurm_scratch_lvm_vg_name }}/{{ slurm_scratch_lvm_lv_name }}"
        fstype: xfs
        opts: noatime
        state: mounted
      when:
        - slurm_enable_job_container | bool
        - slurm_compute_node | default(false) | bool

    - name: Ensure scratch directory has correct permissions
      ansible.builtin.file:
        path: "{{ slurm_scratch_dir }}"
        state: directory
        owner: root
        group: root
        mode: '1755'
      when:
        - slurm_enable_job_container | bool
        - slurm_compute_node | default(false) | bool

    # -------------------------------------------------------------------------
    # Munge Key Generation
    # Munge uses a shared secret key to sign and verify authentication tokens.
    # Every node in the cluster must have the same key — a message signed on
    # one node can only be verified on another if the keys match. The key is
    # generated once on the controller and then fetched to the Ansible control
    # machine so the distribution task can copy it to all nodes. The linear
    # execution strategy (default for a single play) ensures the fetch
    # completes on the controller before the copy task runs on any other node.
    # -------------------------------------------------------------------------
    - name: Check if munge key already exists
      ansible.builtin.stat:
        path: /etc/munge/munge.key
      register: munge_key_stat
      when: slurm_controller | default(false) | bool

    - name: Generate munge key
      ansible.builtin.command:
        cmd: mungekey --create --keyfile=/etc/munge/munge.key --bits=4096
      when:
        - slurm_controller | default(false) | bool
        - "not (munge_key_stat.stat | default({'exists': false})).exists"
      changed_when: true

    - name: Set munge key permissions
      ansible.builtin.file:
        path: /etc/munge/munge.key
        owner: munge
        group: munge
        mode: '0400'
      when: slurm_controller | default(false) | bool

    - name: Fetch munge key to Ansible control machine
      ansible.builtin.fetch:
        src: /etc/munge/munge.key
        dest: /tmp/slurm_munge.key
        flat: true
      when: slurm_controller | default(false) | bool
      no_log: true

    # -------------------------------------------------------------------------
    # NFS Shared Directories
    # Creates the shared job output directory that all nodes access over NFS.
    # Mode 1777 (world-writable + sticky bit) allows any user to create output
    # files while preventing users from deleting each other's files.
    # Controller state is kept on local disk (slurm_state_dir) rather than NFS
    # so that slurmctld can recover after a restart without depending on NFS
    # being available.
    # Tasks are delegated to the NFS server host so they write directly to the
    # server-side export path, bypassing root_squash which would otherwise map
    # root to nobody and block directory creation.
    # -------------------------------------------------------------------------
    - name: Create SLURM base directory on NFS  # noqa: run-once[task]
      ansible.builtin.file:
        path: "{{ slurm_nfs_server_path }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      delegate_to: "{{ _nfs_server_host }}"
      run_once: true

    - name: Create SLURM jobs directory on NFS  # noqa: run-once[task]
      ansible.builtin.file:
        path: "{{ slurm_nfs_server_path }}/jobs"
        state: directory
        owner: root
        group: root
        mode: '1777'
      delegate_to: "{{ _nfs_server_host }}"
      run_once: true

    # -------------------------------------------------------------------------
    # Munge Key Distribution
    # Copies the key fetched from the controller to every node, including the
    # controller itself. The copy is idempotent — munge is only restarted if
    # the key content changes. no_log suppresses the key material from the
    # Ansible output.
    # -------------------------------------------------------------------------
    - name: Copy munge key to all nodes
      ansible.builtin.copy:
        src: /tmp/slurm_munge.key
        dest: /etc/munge/munge.key
        owner: munge
        group: munge
        mode: '0400'
      notify: Restart munge
      no_log: true

    # -------------------------------------------------------------------------
    # SLURM Configuration
    # Deploys configuration files rendered from Jinja2 templates:
    #
    #   slurm.conf:          Main cluster configuration. Defines the controller
    #                        address, partitions, nodes, resource limits, and
    #                        references the StateSaveLocation (local state dir
    #                        on the controller) and SlurmdSpoolDir (local spool
    #                        on each compute node). Any change restarts both
    #                        slurmctld and slurmd.
    #
    #   cgroup.conf:         Configures the cgroup resource enforcement plugin.
    #                        cgroups are Linux kernel features that let SLURM
    #                        place each job in an isolated control group, then
    #                        enforce hard limits on what resources it can use:
    #                          - ConstrainCores: pins the job to its allocated
    #                            CPUs so it cannot steal cycles from other jobs.
    #                          - ConstrainRAMSpace: sets a memory hard limit on
    #                            the cgroup; the kernel OOM-kills the job if it
    #                            exceeds its allocation rather than letting it
    #                            impact other jobs or the OS.
    #                          - ConstrainDevices: restricts which block/char
    #                            devices the job can open; required for GPU
    #                            isolation so a job can only see the GPUs it was
    #                            allocated.
    #                        Any change restarts slurmd.
    #
    #   job_container.conf:  Configures the job_container/tmpfs plugin, which
    #                        creates a private tmpfs bind-mount over /scratch for
    #                        each job step. The job sees an isolated /scratch that
    #                        is automatically cleaned up when the job exits.
    #                        Only deployed when slurm_enable_job_container is true.
    # -------------------------------------------------------------------------
    - name: Deploy slurm.conf
      ansible.builtin.template:
        src: slurm.conf.j2
        dest: /etc/slurm/slurm.conf
        owner: slurm
        group: slurm
        mode: '0644'
      notify:
        - Restart slurmctld
        - Restart slurmd

    - name: Deploy cgroup.conf
      ansible.builtin.template:
        src: cgroup.conf.j2
        dest: /etc/slurm/cgroup.conf
        owner: slurm
        group: slurm
        mode: '0644'
      notify: Restart slurmd

    - name: Deploy job_container.conf
      ansible.builtin.template:
        src: job_container.conf.j2
        dest: /etc/slurm/job_container.conf
        owner: slurm
        group: slurm
        mode: '0644'
      when: slurm_enable_job_container | bool
      notify: Restart slurmd

    # -------------------------------------------------------------------------
    # NFS Boot Ordering
    # Slurm job working directories live on the NFS mount. Drop-ins order
    # slurmctld and slurmd after the NFS mount unit so daemons do not start
    # before the share is available. Uses Wants= (not Requires=) so daemons
    # still start after the 15 s mount timeout if NFS is unavailable, and
    # recover via the automount unit once the server comes online.
    # -------------------------------------------------------------------------
    - name: Create systemd drop-in directory for slurmctld NFS ordering
      ansible.builtin.file:
        path: /etc/systemd/system/slurmctld.service.d
        state: directory
        mode: '0755'
      when: slurm_controller | default(false) | bool

    - name: Write systemd drop-in to order slurmctld after NFS mount
      ansible.builtin.copy:
        dest: /etc/systemd/system/slurmctld.service.d/after-nfs-mount.conf
        mode: '0644'
        content: |
          [Unit]
          After={{ nfs_mount_point | regex_replace("^/", "") | replace("/", "-") }}.mount
          Wants={{ nfs_mount_point | regex_replace("^/", "") | replace("/", "-") }}.mount
      notify: Reload systemd daemon
      when: slurm_controller | default(false) | bool

    - name: Create systemd drop-in directory for slurmd NFS ordering
      ansible.builtin.file:
        path: /etc/systemd/system/slurmd.service.d
        state: directory
        mode: '0755'
      when: slurm_compute_node | default(false) | bool

    - name: Write systemd drop-in to order slurmd after NFS mount
      ansible.builtin.copy:
        dest: /etc/systemd/system/slurmd.service.d/after-nfs-mount.conf
        mode: '0644'
        content: |
          [Unit]
          After={{ nfs_mount_point | regex_replace("^/", "") | replace("/", "-") }}.mount
          Wants={{ nfs_mount_point | regex_replace("^/", "") | replace("/", "-") }}.mount
      notify: Reload systemd daemon
      when: slurm_compute_node | default(false) | bool

    # -------------------------------------------------------------------------
    # Service Startup
    # Starts and enables the three daemons that make up the cluster:
    #   - munge:      must be running on all nodes before any SLURM daemon
    #                 starts, as slurmctld and slurmd both use munge to
    #                 authenticate inter-node communication.
    #   - slurmctld:  the controller daemon; manages the job queue, schedules
    #                 jobs to compute nodes, and persists cluster state.
    #                 Runs only on the controller node.
    #   - slurmd:     the compute daemon; receives job steps from slurmctld,
    #                 launches job processes, and enforces resource limits via
    #                 cgroups. Runs only on compute nodes.
    # -------------------------------------------------------------------------
    - name: Start and enable munge
      ansible.builtin.systemd:
        name: munge
        state: started
        enabled: true

    - name: Start and enable slurmctld
      ansible.builtin.systemd:
        name: slurmctld
        state: started
        enabled: true
        masked: false
      when: slurm_controller | default(false) | bool

    - name: Mask slurmctld on non-controller nodes
      ansible.builtin.systemd:
        name: slurmctld
        state: stopped
        enabled: false
        masked: true
      when: not (slurm_controller | default(false) | bool)

    - name: Start and enable slurmd
      ansible.builtin.systemd:
        name: slurmd
        state: started
        enabled: true
        masked: false
      when: slurm_compute_node | default(false) | bool

    - name: Mask slurmd on non-compute nodes
      ansible.builtin.systemd:
        name: slurmd
        state: stopped
        enabled: false
        masked: true
      when: not (slurm_compute_node | default(false) | bool)

  handlers:
    # -------------------------------------------------------------------------
    # Handlers
    # -------------------------------------------------------------------------
    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart munge
      ansible.builtin.systemd:
        name: munge
        state: restarted

    - name: Restart slurmctld
      ansible.builtin.systemd:
        name: slurmctld
        state: restarted
      when: slurm_controller | default(false) | bool

    - name: Restart slurmd
      ansible.builtin.systemd:
        name: slurmd
        state: restarted
      when: slurm_compute_node | default(false) | bool
