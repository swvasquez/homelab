---
# ==============================================================================
# Playbook: Configure Network Resolver on IP KVM
# ==============================================================================
# Configures the host network resolver on Arch Linux-based IP KVM devices
# (e.g., PiKVM) so the homelab DNS zone is forwarded to Bind9 in the cluster.
# Without this configuration the IP KVM cannot resolve any *.<dns_zone>
# hostname, which prevents addressing cluster services (the Kubernetes API,
# Traefik-fronted UIs, gitea-ssh, etc.) by name.
#
# This playbook performs the following actions:
#   - Remounts the root filesystem as read-write (PiKVM is read-only by default).
#   - Writes a systemd-resolved drop-in that routes queries for the homelab
#     DNS zone to the Bind9 LoadBalancer IP using split-DNS routing-domain
#     syntax (Domains=~<dns_zone>), so a Bind9 outage cannot strand the
#     host's general DNS resolution.
#   - Reloads systemd-resolved when the drop-in changes.
#   - Remounts the root filesystem as read-only regardless of task outcome.
#
# Variables (read from group_vars unless noted):
#   bind9_lb_ip:    LoadBalancer IP that Bind9 listens on inside the LAN.
#                   Set in group_vars/all.yml.
#   dns_zone:       DNS zone served by Bind9. Set in group_vars/all.yml.
#   resolved_drop_in_dir:
#                   Directory holding systemd-resolved drop-in configuration
#                   files (default: /etc/systemd/resolved.conf.d).
#   resolved_drop_in_path:
#                   Full path of the drop-in file written for the homelab
#                   zone. Derived from dns_zone (default:
#                   /etc/systemd/resolved.conf.d/<dns_zone>.conf).

- name: Configure homelab DNS resolver on IP KVM
  hosts: ipkvm
  become: true
  become_exe: sudo
  vars:
    resolved_drop_in_dir: /etc/systemd/resolved.conf.d
    resolved_drop_in_path: '{{ resolved_drop_in_dir }}/{{ dns_zone }}.conf'

  tasks:
    # -------------------------------------------------------------------------
    # Filesystem
    # PiKVM mounts the root filesystem read-only by default. All write
    # operations are wrapped in a block so the filesystem is always restored
    # to read-only, even if a task fails.
    # -------------------------------------------------------------------------
    - name: Remount root filesystem as read-write
      ansible.builtin.command: # noqa: command-instead-of-module
        cmd: mount -o remount,rw /
      changed_when: false

    - name: Configure systemd-resolved to forward homelab zone to Bind9
      block:
        # ---------------------------------------------------------------------
        # systemd-resolved Drop-in
        # Writes a routing-domain configuration that sends queries for the
        # homelab zone to the Bind9 LoadBalancer IP while leaving all other
        # DNS queries on the host's existing upstream resolvers.
        # ---------------------------------------------------------------------
        - name: Ensure systemd-resolved drop-in directory exists
          ansible.builtin.file:
            path: '{{ resolved_drop_in_dir }}'
            state: directory
            owner: root
            group: root
            mode: '0755'

        - name: Write systemd-resolved drop-in for the homelab zone
          ansible.builtin.copy:
            content: |
              [Resolve]
              DNS={{ bind9_lb_ip }}
              Domains=~{{ dns_zone }}
            dest: '{{ resolved_drop_in_path }}'
            owner: root
            group: root
            mode: '0644'
          notify: Restart systemd-resolved

        - name: Flush handlers before remounting read-only
          ansible.builtin.meta: flush_handlers

      always:
        - name: Remount root filesystem as read-only
          ansible.builtin.command: # noqa: command-instead-of-module
            cmd: mount -o remount,ro /
          changed_when: false
          failed_when: false

  handlers:
    - name: Restart systemd-resolved
      ansible.builtin.service:
        name: systemd-resolved
        state: restarted

# ==============================================================================
# Playbook: Configure Host Firewall on IP KVM
# ==============================================================================
# Renders an nftables ruleset that enforces a default-deny ingress policy.
# Each port in firewall_allowed_ports is opened only to the LAN CIDR and the
# tailnet CIDR — nothing in this homelab needs world-accessible ingress.
# Outbound traffic is allowed by default and conntrack accepts established
# return traffic so outbound flows (NAT traversal, package fetches, etc.)
# get their replies.
#
# Why nftables instead of UFW: the Arch Linux ARM UFW package is a Python
# script whose modules live under /usr/lib/python3.X/site-packages/ufw.
# Whenever Arch's Python jumps a minor version, UFW silently breaks until
# the package is rebuilt against the new Python — a common partial-upgrade
# state on PiKVM where the aarch64 mirror lags behind x86. nftables has no
# language-runtime dependency and is the native Linux firewall, so it
# survives Python upgrades cleanly.
#
# Variables:
#   nftables_packages:       List of packages to install (default: [nftables]).
#   firewall_allowed_ports:  Dictionary mapping service name to port and
#                            protocol. Each entry is opened to lan_cidr and
#                            tailscale_cidr. Set in group_vars/ipkvm.yml.
#   lan_cidr:                CIDR of the homelab LAN. Set in
#                            group_vars/ipkvm.yml.
#   tailscale_cidr:          CIDR of the Tailscale CGNAT range. Defined as a
#                            play var since it is fixed by RFC 6598.

- name: Configure host firewall on IP KVM
  hosts: ipkvm
  become: true
  become_exe: sudo
  vars:
    nftables_packages:
      - nftables
    # CGNAT range reserved by RFC 6598 and used for all Tailscale tailnet IPs.
    # Fixed by IANA — Tailscale would have to migrate to a different reserved
    # range to change it.
    tailscale_cidr: 100.64.0.0/10

  tasks:
    # -------------------------------------------------------------------------
    # Filesystem
    # PiKVM mounts the root filesystem read-only by default. All write
    # operations are wrapped in a block so the filesystem is always restored
    # to read-only, even if a task fails.
    # -------------------------------------------------------------------------
    - name: Remount root filesystem as read-write
      ansible.builtin.command: # noqa: command-instead-of-module
        cmd: mount -o remount,rw /
      changed_when: false

    - name: Install and configure nftables
      block:
        # ---------------------------------------------------------------------
        # Installation
        # Installs nftables from the official Arch Linux repository.
        # ---------------------------------------------------------------------
        - name: Install nftables package
          community.general.pacman:
            name: '{{ nftables_packages }}'
            state: present
            update_cache: true

        # ---------------------------------------------------------------------
        # Ruleset
        # Renders /etc/nftables.conf from the inventory of allowed ports and
        # applies it directly via 'nft -f' rather than notifying a handler
        # that runs 'systemctl restart nftables'. Two reasons:
        #
        #   - 'nft -f' fails the task on a syntax or load error, so a
        #     broken ruleset is loud rather than silently leaving the
        #     kernel with whatever it had before.
        #   - Arch's nftables.service is 'Type=oneshot' without
        #     'RemainAfterExit=yes' or an 'ExecStop=' (Debian's unit has
        #     both), and 'systemctl restart' on that combination has been
        #     reported to keep stale rules in the kernel without surfacing
        #     an error. See https://bbs.archlinux.org/viewtopic.php?id=272145.
        #     Going through 'nft -f' avoids that class of failure.
        #
        # 'changed_when' is bound to the template-render result so the
        # task always runs (correcting any drift between file and kernel)
        # but only reports 'changed' when the rendered content differs
        # from what was on disk.
        # ---------------------------------------------------------------------
        - name: Render nftables ruleset
          ansible.builtin.template:
            src: nftables.conf.j2
            dest: /etc/nftables.conf
            owner: root
            group: root
            mode: '0644'
          register: nftables_render

        - name: Apply nftables ruleset
          ansible.builtin.command:
            cmd: nft -f /etc/nftables.conf
          changed_when: nftables_render.changed

        # ---------------------------------------------------------------------
        # Service
        # Enables and starts nftables so the systemd unit reapplies
        # /etc/nftables.conf at boot. Live reloads during a playbook run are
        # handled by the 'Apply nftables ruleset' task above rather than this
        # unit.
        # ---------------------------------------------------------------------
        - name: Enable and start nftables service
          ansible.builtin.service:
            name: nftables
            enabled: true
            state: started

      always:
        - name: Remount root filesystem as read-only
          ansible.builtin.command: # noqa: command-instead-of-module
            cmd: mount -o remount,ro /
          changed_when: false
          failed_when: false
