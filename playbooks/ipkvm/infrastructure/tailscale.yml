---
# ==============================================================================
# Playbook: Install and Configure Tailscale on IP KVM
# ==============================================================================
# Installs and configures the Tailscale mesh VPN client on Arch Linux-based
# IP KVM devices (e.g., PiKVM). When tailscale_exit_node is true the host is
# advertised as a Tailscale exit node so a tailnet member that selects it
# routes all traffic through the IP KVM and out the home WAN; LAN services
# are reached by IP via the same tunnel. When false the host is a plain
# tailnet member (still useful for Tailscale SSH-based access).
#
# Exit-node operation is the only routing mode this playbook supports.
# Subnet routing and 4via6 advertising were considered and rejected: they
# add DNS-record bookkeeping (AAAA seeding, stale-record cleanup) that has
# to stay in sync with mode changes, and a drift while remote turns into
# "kubectl falls back to a stale A record and times out." Sticking to a
# single optional mode keeps remote recovery limited to one client toggle.
#
# The tailnet ACL (tagOwners and exit-node auto-approver) is owned by
# playbooks/shared/infrastructure/tailscale.yml and must be applied first
# so the tags set via the API are recognized.
#
# This playbook performs the following actions:
#   - Reads the Tailscale auth and API keys from the pass store on the
#     Ansible control node.
#   - Remounts the root filesystem as read-write (PiKVM is read-only by default).
#   - Enables IP forwarding so the host can route exit-node traffic.
#   - Installs the Tailscale package from the official Arch Linux repository.
#   - Enables and starts the tailscaled service.
#   - Connects the host to the Tailscale network, advertising it as an exit
#     node when tailscale_exit_node is true.
#   - Sets the correct tag via the REST API (admin authority required to
#     change tags; tailscale up alone cannot reassign a tagged node's tag).
#   - Polls for exit-node auto-approval, which fires once the tag is set.
#   - Configures Tailscale Split DNS via the REST API to point the homelab
#     zone at Bind9 and pushes Cloudflare as the global resolvers (with
#     useWithExitNode set to work around the macOS exit-node DNS bug).
#   - Remounts the root filesystem as read-only regardless of task outcome.
#
# Before running, store the Tailscale auth and API keys in pass:
#   just tailscale-set-keys
#
# Variables (set in group_vars/ipkvm.yml unless noted):
#   tailscale_port:               UDP port the tailscaled daemon binds for
#                                 WireGuard peer connections.
#   tailscale_hostname:           Hostname to register in the Tailscale admin
#                                 console.
#   tailscale_exit_node:          Whether to advertise this host as a Tailscale
#                                 exit node. When false, the host is a plain
#                                 tailnet member (still reachable for SSH if
#                                 tailscale_ssh is true).
#   tailscale_key_expiry_disabled:
#                                 Whether to disable node-key expiry on this
#                                 host via the Tailscale API. When true
#                                 (recommended for an unattended exit node) the
#                                 node never auto-expires and lock-outs while
#                                 remote are avoided. When false the tailnet's
#                                 default expiry policy applies.
#   tailscale_ssh:                Whether to enable Tailscale SSH on this host,
#                                 allowing SSH access via the tailnet without a
#                                 separate SSH key.
#   pass_namespace:               Top-level folder in the pass store. The auth
#                                 and API keys are read from
#                                 '<pass_namespace>/tailscale/auth-key' and
#                                 '<pass_namespace>/tailscale/api-key'. Set in
#                                 group_vars/all.yml.
#   tailscale_tailnet:            Tailnet name targeted by the API. Use '-' for
#                                 the default tailnet. Set in group_vars/all.yml.
#   tailscale_exit_node_tag:      Tag assigned to exit-node hosts via the API.
#                                 Set in group_vars/all.yml.
#   tailscale_client_tag:         Tag assigned to non-exit-node hosts via the
#                                 API. Set in group_vars/all.yml.
#   tailscale_ssh_server_tag:     Tag assigned to all hosts to permit Tailscale
#                                 SSH from homelab-client devices. Set in
#                                 group_vars/all.yml.
#   bind9_lb_ip:                  Bind9 LoadBalancer IP, registered as the Split
#                                 DNS nameserver for the homelab zone. Set in
#                                 group_vars/all.yml.
#   dns_zone:                     DNS zone served by Bind9. Set in
#                                 group_vars/all.yml.

- name: Install and configure Tailscale on IP KVM
  hosts: ipkvm
  become: true
  become_exe: sudo
  vars:
    # Cloudflare public DNS pushed as the tailnet's global resolvers. Keep
    # useWithExitNode true so clients keep using these resolvers when routing
    # through a Tailscale exit node (works around the macOS exit-node DNS bug).
    tailscale_global_nameservers:
      - address: 1.1.1.1
        useWithExitNode: true
      - address: 1.0.0.1
        useWithExitNode: true
      - address: 2606:4700:4700::1111
        useWithExitNode: true
      - address: 2606:4700:4700::1001
        useWithExitNode: true
    tailscale_up_args: >-
      --reset
      --accept-dns=false
      --hostname={{ tailscale_hostname }}
      {{ '--advertise-exit-node' if tailscale_exit_node else '' }}
      {{ '--ssh' if tailscale_ssh else '' }}
      --authkey={{ tailscale_auth_key }}

  tasks:
    # -------------------------------------------------------------------------
    # Auth Key
    # Reads the Tailscale auth and API keys from the pass store on the
    # Ansible control node so they can be passed non-interactively to
    # 'tailscale up' and the Tailscale REST API.
    # -------------------------------------------------------------------------
    - name: Read Tailscale auth key from pass store
      ansible.builtin.command:
        cmd: pass show '{{ pass_namespace }}/tailscale/auth-key'
      delegate_to: localhost
      become: false
      register: tailscale_auth_key_result
      changed_when: false
      no_log: true

    - name: Set Tailscale auth key fact
      ansible.builtin.set_fact:
        tailscale_auth_key: '{{ tailscale_auth_key_result.stdout | trim }}'
      no_log: true

    - name: Read Tailscale API key from pass store
      ansible.builtin.command:
        cmd: pass show '{{ pass_namespace }}/tailscale/api-key'
      delegate_to: localhost
      become: false
      register: tailscale_api_key_result
      changed_when: false
      no_log: true

    - name: Set Tailscale API key fact
      ansible.builtin.set_fact:
        tailscale_api_key: '{{ tailscale_api_key_result.stdout | trim }}'
      no_log: true

    # -------------------------------------------------------------------------
    # Filesystem
    # PiKVM mounts the root filesystem read-only by default. All write
    # operations are wrapped in a block so the filesystem is always restored
    # to read-only, even if a task fails.
    # -------------------------------------------------------------------------
    - name: Remount root filesystem as read-write
      ansible.builtin.command: # noqa: command-instead-of-module
        cmd: mount -o remount,rw /
      changed_when: false

    - name: Install and configure Tailscale
      block:
        # ---------------------------------------------------------------------
        # System Configuration
        # Enables IPv4 and IPv6 forwarding so this host can route exit-node
        # traffic between the tunnel and the local network.
        # ---------------------------------------------------------------------
        - name: Enable IP forwarding for exit node
          ansible.posix.sysctl:
            name: '{{ item }}'
            value: '1'
            state: present
            sysctl_set: true
            reload: true
          loop:
            - net.ipv4.ip_forward
            - net.ipv6.conf.all.forwarding

        # ---------------------------------------------------------------------
        # Installation
        # Installs Tailscale from the official Arch Linux ARM repository.
        # Removes leftover state from a prior upstream-tarball install path
        # (a tailscaled.service drop-in under /etc/systemd/system and
        # binaries under /usr/local/bin) so the package-manager unit at
        # /usr/lib/systemd/system/tailscaled.service is what systemd
        # actually loads.
        # ---------------------------------------------------------------------
        - name: Remove leftover upstream-tarball Tailscale binaries
          ansible.builtin.file:
            path: '/usr/local/bin/{{ item }}'
            state: absent
          loop:
            - tailscale
            - tailscaled

        - name: Remove leftover upstream tailscaled systemd unit override
          ansible.builtin.file:
            path: /etc/systemd/system/tailscaled.service
            state: absent
          notify:
            - Reload systemd
            - Restart tailscaled

        - name: Install Tailscale package
          community.general.pacman:
            name: tailscale
            state: latest
            update_cache: true
          notify: Restart tailscaled

        # ---------------------------------------------------------------------
        # Service Configuration and Network Connection
        # Configures the tailscaled daemon port, enables the service, and
        # connects the host to the Tailscale network as an exit node.
        # ---------------------------------------------------------------------
        - name: Set Tailscale WireGuard listen port in daemon configuration
          ansible.builtin.lineinfile:
            path: /etc/default/tailscaled
            regexp: '^FLAGS='
            line: 'FLAGS="--port={{ tailscale_port }}"'
            create: true
            mode: '0644'
          notify: Restart tailscaled

        - name: Enable and start tailscaled service
          ansible.builtin.service:
            name: tailscaled
            enabled: true
            state: started

        # Flush so any pending Restart tailscaled fires before 'tailscale up'.
        # Otherwise the package upgrade leaves the new binary on disk while
        # the running daemon stays the old version, and 'tailscale up' talks
        # to a stale tailscaled (caught us with the 1.92.3 routing regression).
        - name: Flush handlers so tailscaled restart precedes tailscale up
          ansible.builtin.meta: flush_handlers

        - name: Connect to Tailscale network
          ansible.builtin.command:
            cmd: 'tailscale up {{ tailscale_up_args }}'
          changed_when: false
          no_log: true

        # ---------------------------------------------------------------------
        # Device Configuration
        # Resolves the device ID by hostname, then uses the API key (which has
        # admin authority satisfying tagOwners) to set the correct tag and
        # configure key expiry. A tagged node cannot reassign its own tag via
        # tailscale up, but the API can. Setting the tag triggers the
        # autoApprovers exit-node rule so no manual console approval is needed.
        # Split DNS is tailnet-wide and is configured here since the API key
        # is already available.
        # ---------------------------------------------------------------------
        - name: List Tailscale devices in the tailnet
          ansible.builtin.uri:
            url: 'https://api.tailscale.com/api/v2/tailnet/{{ tailscale_tailnet }}/devices'
            method: GET
            headers:
              Authorization: 'Bearer {{ tailscale_api_key }}'
            return_content: true
          register: tailscale_devices_result
          delegate_to: localhost
          become: false
          no_log: true

        - name: Resolve this host's Tailscale device ID by hostname
          ansible.builtin.set_fact:
            tailscale_device_id: >-
              {{ (tailscale_devices_result.json.devices
                  | selectattr('hostname', 'equalto', tailscale_hostname)
                  | first).id }}

        - name: Build device tags list
          ansible.builtin.set_fact:
            tailscale_device_tags: >-
              {{ [tailscale_exit_node_tag if tailscale_exit_node
                  else tailscale_client_tag,
                  tailscale_ssh_server_tag] }}

        - name: Set device tags via API
          ansible.builtin.uri:
            url: 'https://api.tailscale.com/api/v2/device/{{ tailscale_device_id }}/tags'
            method: POST
            headers:
              Authorization: 'Bearer {{ tailscale_api_key }}'
              Content-Type: application/json
            body: '{"tags": {{ tailscale_device_tags | to_json }}}'
            status_code: 200
          delegate_to: localhost
          become: false

        - name: Wait for exit-node auto-approval
          ansible.builtin.command:
            cmd: tailscale status --json
          register: tailscale_status_wait
          changed_when: false
          until: >-
            (tailscale_status_wait.stdout | from_json).Self.ExitNodeOption
            | default(false)
          retries: 12
          delay: 5
          when: tailscale_exit_node

        - name: Configure node-key expiry for this host
          ansible.builtin.uri:
            url: 'https://api.tailscale.com/api/v2/device/{{ tailscale_device_id }}/key'
            method: POST
            headers:
              Authorization: 'Bearer {{ tailscale_api_key }}'
              Content-Type: application/json
            body: '{"keyExpiryDisabled": {{ tailscale_key_expiry_disabled | bool | to_json }}}'
            status_code: 200
          delegate_to: localhost
          become: false

        - name: Build Tailscale DNS configuration body
          ansible.builtin.set_fact:
            tailscale_dns_body:
              nameservers: '{{ tailscale_global_nameservers }}'
              splitDNS:
                '{{ dns_zone }}':
                  - address: '{{ bind9_lb_ip }}'
                    useWithExitNode: true
              preferences:
                overrideLocalDNS: true
                magicDNS: true

        - name: Configure Tailscale DNS for the tailnet
          ansible.builtin.uri:
            url: 'https://api.tailscale.com/api/v2/tailnet/{{ tailscale_tailnet }}/dns/configuration'
            method: POST
            headers:
              Authorization: 'Bearer {{ tailscale_api_key }}'
              Content-Type: application/json
            body: '{{ tailscale_dns_body | to_json }}'
            status_code: 200
          delegate_to: localhost
          become: false
          no_log: true

        - name: Flush handlers before remounting read-only
          ansible.builtin.meta: flush_handlers

      always:
        - name: Remount root filesystem as read-only
          ansible.builtin.command: # noqa: command-instead-of-module
            cmd: mount -o remount,ro /
          changed_when: false
          failed_when: false

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart tailscaled
      ansible.builtin.service:
        name: tailscaled
        state: restarted
