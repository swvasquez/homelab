---
# ==============================================================================
# Playbook: Bootstrap Kubernetes Cluster
# ==============================================================================
# Initializes and joins nodes into a Kubernetes cluster using kubeadm.
#
# This playbook assumes that kubernetes.yml has already been run on all target
# hosts (kubelet, kubeadm, kubectl, cri-dockerd, and Helm are installed and
# configured). It performs the following actions:
#   - Validates that exactly one bootstrap node is defined in inventory.
#   - Initializes the control plane node using kubeadm init (idempotent via
#     a cluster-ready check).
#   - Configures kubectl access for the ansible user on every cluster node
#     by distributing the admin kubeconfig from the bootstrap node.
#   - Optionally fetches the kubeconfig to the machine running the playbook.
#   - Retrieves the kubeadm join command from the control plane.
#   - Joins all worker nodes to the cluster using the retrieved join command.
#   - Optionally removes the NoSchedule taint from the control plane node to
#     allow it to also schedule workloads (when `worker_node: true` is set on
#     the control plane host in inventory).
#   - Configures etcd encryption-at-rest for Kubernetes Secrets. On first
#     install the play generates a 32-byte AES key, stores it in the pass
#     store under '<pass_namespace>/kubernetes/etcd-encryption-key', then
#     renders an EncryptionConfiguration file under
#     /etc/kubernetes/encryption on the control plane and patches the
#     kube-apiserver static pod manifest to consume it via
#     --encryption-provider-config. After the apiserver picks the config
#     up, every existing Secret is re-encrypted with a 'kubectl get | kubectl
#     replace' pass so no cleartext copies survive in etcd. The pass store
#     is the canonical home for the key (same store the OpenBao unseal
#     keys + root token end up in via cluster/secrets.yml), and the
#     control-plane file is regeneratable from it.
#   - Installs Metrics Server via Helm on the bootstrap node to enable resource
#     monitoring.
#
# Run network.yml after this playbook to install CNI, ingress, TLS, and DNS.
# Playbook order: bootstrap.yml → network.yml → storage.yml → observability.yml → authentication.yml
#
# Node roles are determined by host variables in inventory.yml:
#   control_plane: true  — node is a Kubernetes control plane node.
#   bootstrap_node: true — node runs kubeadm init to initialize the cluster.
#                          Exactly one control plane node should have this set.
#   worker_node: true    — node joins the cluster as a worker. When set on the
#                          bootstrap node, the NoSchedule taint is removed so
#                          it can also schedule workloads.
#
# Variables:
#   cluster_name:            Name of the Kubernetes cluster, used in kubeconfig
#                            contexts (default: homelab-0).
#   pod_network_cidr:        CIDR range for pod networking
#                            (default: 10.244.0.0/16).
#   kubeadm_cri_socket:      CRI socket path set in the kubeadm config
#                            (default: unix:///var/run/cri-dockerd.sock).
#   kubectl_config_dir:      Directory where the kubectl config is stored for
#                            the ansible user (default: /home/<ansible_user>/.kube).
#   kubectl_config_path:     Full path to the kubectl config file
#                            (default: /home/<ansible_user>/.kube/config).
#   fetch_kubeconfig:        When true, fetches the kubeconfig from the control
#                            plane to the machine running the playbook
#                            (default: true).
#   local_kubeconfig_path:   Destination path for the kubeconfig on the local
#                            machine (default: ~/.kube/config).
#   bootstrap_control_plane: The host in the homelab group with bootstrap_node:
#                            true. Resolved automatically from inventory — do
#                            not set manually.
#   metrics_server_chart_version:  Version of the metrics-server Helm chart to install
#                            (default: 3.13.0).
#   metrics_server_ns:       Kubernetes namespace for metrics-server
#                            (default: kube-system).
#   encryption_config_dir:   Directory on the control plane node where the
#                            EncryptionConfiguration file lives. Mounted
#                            read-only into the kube-apiserver pod
#                            (default: /etc/kubernetes/encryption).
#   encryption_config_path:  Full path to the EncryptionConfiguration file
#                            (default:
#                            /etc/kubernetes/encryption/encryption-config.yaml).
#   apiserver_manifest_path: Full path to the kube-apiserver static pod
#                            manifest the kubelet watches
#                            (default:
#                            /etc/kubernetes/manifests/kube-apiserver.yaml).
#   apiserver_manifest_staging_path:
#                            Temporary path used to stage manifest edits
#                            atomically. Must be on the same filesystem as
#                            apiserver_manifest_path so the final copy is a
#                            rename(2) and the kubelet never sees a
#                            partially-edited manifest (default:
#                            /etc/kubernetes/kube-apiserver.yaml.encryption-staging).
#   apiserver_health_url:    URL polled to confirm the apiserver is healthy
#                            after the manifest edit lands (default:
#                            https://127.0.0.1:6443/livez).
#   apiserver_reload_wait_seconds:
#                            Seconds to pause after manifest promotion
#                            before polling apiserver health, giving the
#                            kubelet time to detect the change and recreate
#                            the pod (default: 30).
#   apiserver_health_retries:
#                            Maximum apiserver health polls before failing
#                            (default: 60).
#   apiserver_health_delay:  Seconds between apiserver health polls
#                            (default: 2).
#   apiserver_cert_path:     Full path to the kube-apiserver serving
#                            certificate on the control plane node
#                            (default: /etc/kubernetes/pki/apiserver.crt).
#   apiserver_key_path:      Full path to the kube-apiserver serving
#                            certificate private key on the control plane
#                            node (default: /etc/kubernetes/pki/apiserver.key).
#   kubernetes_api_hostname: DNS hostname registered as a Subject Alternative
#                            Name on the kube-apiserver serving certificate.
#                            Derived from dns_zone (default: k8s.<dns_zone>).
#   dns_zone:                DNS zone served by Bind9. Read from group_vars.
#   pass_namespace:          Top-level folder in the pass store under which
#                            all cluster credentials are stored. The etcd
#                            key lives at
#                            '<pass_namespace>/kubernetes/etcd-encryption-key'.
#                            Read from group_vars.

- name: Initialize Kubernetes control plane
  hosts: homelab
  become: true
  become_exe: sudo.ws
  vars:
    cluster_name: homelab-0
    pod_network_cidr: 10.244.0.0/16
    kubeadm_cri_socket: "unix:///var/run/cri-dockerd.sock"
    kubectl_config_dir: "/home/{{ ansible_user }}/.kube"
    kubectl_config_path: "/home/{{ ansible_user }}/.kube/config"
    fetch_kubeconfig: true
    local_kubeconfig_path: "{{ lookup('env', 'HOME') }}/.kube/config"
    encryption_config_dir: /etc/kubernetes/encryption
    encryption_config_path: /etc/kubernetes/encryption/encryption-config.yaml
    apiserver_manifest_path: /etc/kubernetes/manifests/kube-apiserver.yaml
    apiserver_manifest_staging_path: /etc/kubernetes/kube-apiserver.yaml.encryption-staging
    apiserver_health_url: 'https://127.0.0.1:6443/livez'
    apiserver_reload_wait_seconds: 30
    apiserver_health_retries: 60
    apiserver_health_delay: 2
    apiserver_cert_path: /etc/kubernetes/pki/apiserver.crt
    apiserver_key_path: /etc/kubernetes/pki/apiserver.key
    kubernetes_api_hostname: 'k8s.{{ dns_zone }}'
    bootstrap_control_plane: >-
      {{ groups['homelab']
         | map('extract', hostvars)
         | selectattr('bootstrap_node', 'equalto', true)
         | map(attribute='inventory_hostname')
         | first }}

  tasks:
    # -------------------------------------------------------------------------
    # Validation
    # Ensures exactly one host in the inventory is designated as the bootstrap
    # node before any cluster initialization begins. This prevents ambiguous or
    # duplicate control plane initialization if multiple hosts are inadvertently
    # configured with `bootstrap_node: true`.
    # -------------------------------------------------------------------------
    - name: Assert exactly one bootstrap node is defined in inventory
      ansible.builtin.assert:
        that:
          - >-
            groups['homelab']
            | map('extract', hostvars)
            | selectattr('bootstrap_node', 'equalto', true)
            | list | length == 1
        fail_msg: "Exactly one host must have bootstrap_node: true in inventory."
      delegate_to: localhost
      run_once: true # noqa: run-once[task]

    # -------------------------------------------------------------------------
    # Control Plane Initialization
    # Initializes the Kubernetes control plane on the host marked with
    # `bootstrap_node: true` in inventory. kubeadm init is skipped if the
    # API server is already running (idempotency check via the presence of
    # /etc/kubernetes/admin.conf). A kubeadm config file is written to a
    # temporary path, used during initialization, and then removed.
    # -------------------------------------------------------------------------
    - name: Check if control plane is already initialized
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_admin_conf
      when: bootstrap_node | default(false)

    - name: Write kubeadm init config file
      ansible.builtin.template:
        src: kubeadm-init.yml.j2
        dest: /tmp/kubeadm-init.yml
        mode: "0600"
      when:
        - bootstrap_node | default(false)
        - not kubeadm_admin_conf.stat.exists

    - name: Initialize Kubernetes control plane with kubeadm
      ansible.builtin.command:
        cmd: kubeadm init --config /tmp/kubeadm-init.yml
      when:
        - bootstrap_node | default(false)
        - not kubeadm_admin_conf.stat.exists
      changed_when: true

    - name: Clean up kubeadm init config file
      ansible.builtin.file:
        path: /tmp/kubeadm-init.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # kubectl Configuration
    # Distributes the cluster admin kubeconfig to the ansible user's home
    # directory on every cluster node so kubectl works uniformly across the
    # fleet. The file is read once from /etc/kubernetes/admin.conf on the
    # bootstrap node (the only node where kubeadm init places it) and then
    # written to each host. Optionally fetches the kubeconfig to the local
    # machine running the playbook when `fetch_kubeconfig` is true. Also
    # retrieves the kubeadm join command for use by worker nodes in the next
    # play. The distributed kubeconfig keeps the API server URL as the
    # control plane IP so that kubectl on a node works without depending on
    # in-cluster DNS or Bind9 reachability; the local kubeconfig is rewritten
    # separately by network.yml to use the API hostname.
    # -------------------------------------------------------------------------
    - name: Ensure kubectl config directory exists for ansible user
      ansible.builtin.file:
        path: "{{ kubectl_config_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0700"

    - name: Read admin kubeconfig from the bootstrap control plane node
      ansible.builtin.slurp:
        src: /etc/kubernetes/admin.conf
      register: admin_kubeconfig_slurp
      delegate_to: '{{ bootstrap_control_plane }}'
      run_once: true # noqa: run-once[task]
      no_log: true

    - name: Install admin kubeconfig for ansible user on every cluster node
      ansible.builtin.copy:
        content: '{{ admin_kubeconfig_slurp.content | b64decode }}'
        dest: "{{ kubectl_config_path }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
      no_log: true

    - name: Copy kubeconfig to local machine
      ansible.builtin.fetch:
        src: /etc/kubernetes/admin.conf
        dest: "{{ local_kubeconfig_path }}"
        flat: true
      when:
        - bootstrap_node | default(false)
        - fetch_kubeconfig | default(false)

    - name: Retrieve kubeadm join command from control plane
      ansible.builtin.command:
        cmd: kubeadm token create --print-join-command
      register: kubeadm_join_command
      changed_when: false
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # etcd Encryption-at-Rest for Secrets
    # -------------------------------------------------------------------------
    # Configures the kube-apiserver to encrypt every Secret resource at
    # rest in etcd via --encryption-provider-config. The cipher is AES-CBC
    # with a single 32-byte key; the 'identity' provider is listed second
    # so reads of pre-encryption Secrets continue to work while the
    # re-encryption pass at the end of this section rewrites them through
    # the apiserver.
    #
    # The pass store on the Ansible host (which also holds the OpenBao
    # unseal keys + root token after cluster/secrets.yml runs) is the
    # canonical home for the AES key at 'kubernetes/etcd-encryption-key'.
    #
    # On first install, this section generates a 32-byte AES key from
    # /dev/urandom, stores it in the pass store, then renders the
    # EncryptionConfiguration file on the control plane with the key
    # inlined. On every subsequent run this section is skipped entirely as
    # long as the EncryptionConfiguration file exists on disk — no re-render,
    # no apiserver restart. If the control-plane file is ever lost (e.g.
    # node reprovisioned), re-running this playbook reads the existing key
    # from the pass store and restores the file without rotating ciphertext.
    #
    # To rotate, edit the file on the control plane by hand: add a new
    # entry as the FIRST item under 'keys:', leave the old one as the
    # second, then update the pass store entry ('pass edit
    # kubernetes/etcd-encryption-key') so the values stay in sync.
    # Re-run the playbook to push the apiserver restart and the
    # re-encryption pass.
    #
    # Manifest patching follows the same staged-and-atomically-promoted
    # pattern as cluster/security.yml's PSA hardening: the working copy of
    # /etc/kubernetes/manifests/kube-apiserver.yaml is built up under
    # apiserver_manifest_staging_path, then promoted with a single
    # rename-on-the-same-filesystem so the kubelet never observes a
    # partial edit. A SHA-256 checksum of the EncryptionConfiguration file
    # is stamped into a pod annotation, which forces kubelet to recreate
    # the apiserver pod whenever the file content changes (e.g. on a key
    # rotation). Without that stamp, an in-place edit of the config file
    # leaves the running apiserver on its stale in-memory copy until the
    # manifest itself changes for some other reason.
    #
    # After the new manifest lands, the play waits for the apiserver to
    # report /livez OK on 6443, then re-keys every existing Secret with a
    # 'kubectl get | kubectl replace' loop. On a fresh cluster this
    # encrypts the system Secrets that kubeadm created during 'kubeadm
    # init' before we patched the manifest. On an already-running cluster
    # this re-encrypts every Secret accumulated by every other playbook
    # (a no-op when nothing actually changed).
    # -------------------------------------------------------------------------
    - name: Create encryption configuration directory on control plane
      ansible.builtin.file:
        path: '{{ encryption_config_dir }}'
        state: directory
        owner: root
        group: root
        mode: '0700'
      when: bootstrap_node | default(false)

    - name: Stat encryption-config.yaml on control plane
      ansible.builtin.stat:
        path: '{{ encryption_config_path }}'
      register: encryption_config_existing
      when: bootstrap_node | default(false)

    - name: Ensure pass store holds etcd-encryption-key and emit it
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail

          if ! pass show '{{ pass_namespace }}/kubernetes/etcd-encryption-key' >/dev/null 2>&1; then
            KEY="$(head -c 32 /dev/urandom | base64)"
            printf '%s\n' "$KEY" | pass insert --echo --force '{{ pass_namespace }}/kubernetes/etcd-encryption-key' \
              >/dev/null
            unset KEY
          fi

          pass show '{{ pass_namespace }}/kubernetes/etcd-encryption-key'
        executable: /bin/sh
      delegate_to: localhost
      become: false
      register: encryption_key_result
      changed_when: true
      no_log: true
      when:
        - bootstrap_node | default(false)
        - not encryption_config_existing.stat.exists

    - name: Render encryption-config.yaml on control plane from pass store key
      ansible.builtin.template:
        src: encryption-config.yml.j2
        dest: '{{ encryption_config_path }}'
        owner: root
        group: root
        mode: '0600'
      vars:
        encryption_key: "{{ encryption_key_result.stdout | trim }}"
      register: encryption_config_create
      no_log: true
      when:
        - bootstrap_node | default(false)
        - not encryption_config_existing.stat.exists

    - name: Read EncryptionConfiguration checksum for manifest annotation
      ansible.builtin.stat:
        path: '{{ encryption_config_path }}'
        checksum_algorithm: sha256
      register: encryption_config_stat
      when: bootstrap_node | default(false)

    - name: Stage a working copy of the kube-apiserver manifest for encryption
      ansible.builtin.copy:
        src: '{{ apiserver_manifest_path }}'
        dest: '{{ apiserver_manifest_staging_path }}'
        remote_src: true
        owner: root
        group: root
        mode: '0600'
      when: bootstrap_node | default(false)
      changed_when: false

    - name: Ensure encryption-provider-config flag is present in staged manifest
      ansible.builtin.lineinfile:
        path: '{{ apiserver_manifest_staging_path }}'
        regexp: '^    - --encryption-provider-config='
        line: '    - --encryption-provider-config={{ encryption_config_path }}'
        insertafter: '^    - --allow-privileged=true$'
        state: present
      when: bootstrap_node | default(false)

    - name: Ensure encryption-config volumeMount is present in staged manifest
      ansible.builtin.blockinfile:
        path: '{{ apiserver_manifest_staging_path }}'
        marker: '    # {mark} ANSIBLE MANAGED: encryption-config volumeMount'
        insertafter: '^    volumeMounts:$'
        block: |2
              - mountPath: {{ encryption_config_dir }}
                name: encryption-config
                readOnly: true
      when: bootstrap_node | default(false)

    - name: Ensure encryption-config hostPath volume is present in staged manifest
      ansible.builtin.blockinfile:
        path: '{{ apiserver_manifest_staging_path }}'
        marker: '  # {mark} ANSIBLE MANAGED: encryption-config volume'
        insertafter: '^  volumes:$'
        block: |2
            - hostPath:
                path: {{ encryption_config_dir }}
                type: DirectoryOrCreate
              name: encryption-config
      when: bootstrap_node | default(false)

    - name: Stamp encryption-config SHA-256 annotation into staged manifest
      ansible.builtin.lineinfile:
        path: '{{ apiserver_manifest_staging_path }}'
        regexp: '^    homelab\.internal/encryption-config-sha256: '
        line: '    homelab.internal/encryption-config-sha256: "{{ encryption_config_stat.stat.checksum }}"'
        insertafter: '^  annotations:$'
        state: present
      when: bootstrap_node | default(false)

    - name: Promote staged manifest atomically into the kubelet manifests directory
      ansible.builtin.copy:
        src: '{{ apiserver_manifest_staging_path }}'
        dest: '{{ apiserver_manifest_path }}'
        remote_src: true
        owner: root
        group: root
        mode: '0600'
      register: encryption_apiserver_manifest_promote
      when: bootstrap_node | default(false)

    - name: Remove staged encryption manifest
      ansible.builtin.file:
        path: '{{ apiserver_manifest_staging_path }}'
        state: absent
      when: bootstrap_node | default(false)
      changed_when: false

    - name: Pause to allow kubelet to detect the updated kube-apiserver manifest
      ansible.builtin.pause:
        seconds: '{{ apiserver_reload_wait_seconds }}'
      when:
        - bootstrap_node | default(false)
        - encryption_apiserver_manifest_promote.changed

    - name: Wait for kube-apiserver /livez to report healthy after encryption patch
      ansible.builtin.uri:
        url: '{{ apiserver_health_url }}'
        validate_certs: false
        status_code: 200
      register: encryption_apiserver_livez
      until: encryption_apiserver_livez.status == 200
      retries: '{{ apiserver_health_retries }}'
      delay: '{{ apiserver_health_delay }}'
      when: bootstrap_node | default(false)

    - name: Re-encrypt all existing Secrets with the current encryption key
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          kubectl --kubeconfig={{ kubectl_config_path }} \
            get secrets -A -o json \
          | kubectl --kubeconfig={{ kubectl_config_path }} replace -f -
      register: encryption_reencrypt_result
      changed_when: true
      when:
        - bootstrap_node | default(false)
        - (encryption_config_create.changed | default(false))
            or (encryption_apiserver_manifest_promote.changed | default(false))

    # -------------------------------------------------------------------------
    # API Server Certificate SANs
    # Ensures the kube-apiserver serving certificate carries the cluster's
    # DNS hostname (kubernetes_api_hostname) as a Subject Alternative Name so
    # kubectl clients can address the API by name in addition to the node IP
    # and pass TLS verification. On a fresh cluster the hostname is included
    # via the kubeadm InitConfiguration and no extra work is needed. On an
    # existing cluster whose certificate predates this change, the kubeadm
    # ClusterConfiguration is uploaded to the cluster, the apiserver cert and
    # key are removed, kubeadm regenerates them with the new SAN list, and
    # the static pod is recreated so the apiserver loads the new cert. The
    # block is fully idempotent — it short-circuits when the cert already
    # contains kubernetes_api_hostname.
    # -------------------------------------------------------------------------
    - name: Read existing kube-apiserver certificate SANs
      ansible.builtin.command:
        cmd: openssl x509 -in {{ apiserver_cert_path }} -noout -ext subjectAltName
      register: apiserver_cert_sans
      changed_when: false
      failed_when: false
      when: bootstrap_node | default(false)

    - name: Set apiserver cert SAN regeneration requirement
      ansible.builtin.set_fact:
        apiserver_cert_san_regen_needed: >-
          {{ (apiserver_cert_sans.rc | default(1)) == 0
             and kubernetes_api_hostname not in (apiserver_cert_sans.stdout | default('')) }}
      when: bootstrap_node | default(false)

    - name: Render kubeadm config for cert SAN regeneration
      ansible.builtin.template:
        src: kubeadm-init.yml.j2
        dest: /tmp/kubeadm-init.yml
        mode: '0600'
      when:
        - bootstrap_node | default(false)
        - apiserver_cert_san_regen_needed | default(false)

    - name: Upload kubeadm ClusterConfiguration to the cluster
      ansible.builtin.command:
        cmd: kubeadm init phase upload-config kubeadm --config /tmp/kubeadm-init.yml
      when:
        - bootstrap_node | default(false)
        - apiserver_cert_san_regen_needed | default(false)
      changed_when: true

    - name: Remove existing kube-apiserver certificate to force regeneration
      ansible.builtin.file:
        path: '{{ item }}'
        state: absent
      loop:
        - '{{ apiserver_cert_path }}'
        - '{{ apiserver_key_path }}'
      when:
        - bootstrap_node | default(false)
        - apiserver_cert_san_regen_needed | default(false)

    - name: Regenerate kube-apiserver certificate with updated SAN list
      ansible.builtin.command:
        cmd: kubeadm init phase certs apiserver --config /tmp/kubeadm-init.yml
      when:
        - bootstrap_node | default(false)
        - apiserver_cert_san_regen_needed | default(false)
      changed_when: true

    - name: Clean up rendered kubeadm config used for cert regeneration
      ansible.builtin.file:
        path: /tmp/kubeadm-init.yml
        state: absent
      when:
        - bootstrap_node | default(false)
        - apiserver_cert_san_regen_needed | default(false)

    - name: Restart kube-apiserver static pod to load regenerated certificate
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          delete pods -n kube-system -l component=kube-apiserver
      when:
        - bootstrap_node | default(false)
        - apiserver_cert_san_regen_needed | default(false)
      changed_when: true

    - name: Wait for kube-apiserver /livez to report healthy after SAN cert regen
      ansible.builtin.uri:
        url: '{{ apiserver_health_url }}'
        validate_certs: false
        status_code: 200
      register: apiserver_san_livez
      until: apiserver_san_livez.status == 200
      retries: '{{ apiserver_health_retries }}'
      delay: '{{ apiserver_health_delay }}'
      when:
        - bootstrap_node | default(false)
        - apiserver_cert_san_regen_needed | default(false)

    # -------------------------------------------------------------------------
    # Control Plane Taint Removal (Optional)
    # By default, kubeadm applies a NoSchedule taint to the control plane node
    # to prevent workloads from being scheduled on it. When the control plane
    # host also has `worker_node: true` in inventory, this taint is removed so
    # it can also act as a worker node. This is useful in small homelab clusters
    # where resource constraints make it impractical to dedicate a node solely
    # to control plane duties.
    # -------------------------------------------------------------------------
    - name: Remove NoSchedule taint from control plane to enable worker scheduling
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          taint nodes {{ inventory_hostname }}
          node-role.kubernetes.io/control-plane:NoSchedule-
      when:
        - bootstrap_node | default(false)
        - worker_node | default(false)
      register: taint_result
      changed_when: "'untainted' in taint_result.stdout"
      failed_when:
        - taint_result.rc != 0
        - "'not found' not in taint_result.stderr"

- name: Join worker nodes to the Kubernetes cluster
  hosts: homelab
  become: true
  become_exe: sudo.ws
  vars:
    # kubeadm_cri_socket is repeated from play 1 — vars do not carry across plays.
    kubeadm_cri_socket: "unix:///var/run/cri-dockerd.sock"
    bootstrap_control_plane: >-
      {{ groups['homelab']
         | map('extract', hostvars)
         | selectattr('bootstrap_node', 'equalto', true)
         | map(attribute='inventory_hostname')
         | first }}

  tasks:
    # -------------------------------------------------------------------------
    # Worker Node Join
    # Joins all hosts with `worker_node: true` in inventory (excluding the
    # control plane) to the cluster using the join command retrieved from the
    # control plane. The join is skipped if the node has already joined
    # (detected by the presence of /etc/kubernetes/kubelet.conf).
    # -------------------------------------------------------------------------
    - name: Check if node has already joined the cluster
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf
      when:
        - worker_node | default(false)
        - not (control_plane | default(false))

    - name: Join worker node to the cluster
      ansible.builtin.command:
        cmd: >-
          {{ hostvars[bootstrap_control_plane].kubeadm_join_command.stdout }}
          --cri-socket={{ kubeadm_cri_socket }}
      when:
        - worker_node | default(false)
        - not (control_plane | default(false))
        - not kubelet_conf.stat.exists
      changed_when: true

- name: Install cluster resource add-ons
  hosts: homelab
  become: true
  become_exe: sudo.ws
  vars:
    kubectl_config_path: "/home/{{ ansible_user }}/.kube/config"
    metrics_server_chart_version: 3.13.0
    metrics_server_ns: kube-system

  tasks:
    # -------------------------------------------------------------------------
    # Metrics Server Installation
    # Installs Metrics Server via Helm. Metrics Server collects resource metrics
    # from Kubelets and exposes them via the Kubernetes Resource Metrics API
    # for use by Horizontal Pod Autoscaler and kubectl top. The
    # kubelet-insecure-tls argument is typically required in homelab environments
    # because kubelet serving certificates are usually self-signed.
    # -------------------------------------------------------------------------
    - name: Add Metrics Server Helm repository
      ansible.builtin.command:
        cmd: helm repo add metrics-server https://kubernetes-sigs.github.io/metrics-server/
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Update Helm repositories
      ansible.builtin.command:
        cmd: helm repo update
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Install or upgrade Metrics Server via Helm
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install metrics-server metrics-server/metrics-server
          --version {{ metrics_server_chart_version }}
          --namespace {{ metrics_server_ns }}
          --kubeconfig {{ kubectl_config_path }}
          --set "args={--kubelet-insecure-tls}"
      when: bootstrap_node | default(false)
      changed_when: true
