---
# ==============================================================================
# Playbook: Install OpenBao, External Secrets Operator, and Stakater Reloader
# ==============================================================================
# Installs OpenBao as a single-replica StatefulSet, initializes it on first
# run, persists the five unseal keys plus the initial root token to the
# pass store on the Ansible host, and configures everything a
# Kubernetes-native client needs to read secrets from it: the KV v2 secrets
# engine at secret/, the Kubernetes auth method, the
# 'system:auth-delegator' ClusterRoleBinding so OpenBao can call TokenReview,
# the External Secrets Operator (ESO) Helm release, an 'eso' policy +
# Kubernetes auth role, and a cluster-scoped 'openbao' SecretStore. Also
# installs Stakater Reloader so any workload annotated with
# 'reloader.stakater.com/auto: "true"' rolls automatically when an
# ESO-materialized Secret changes — this completes the OpenBao -> ESO ->
# K8s Secret -> running pod rotation pipeline end-to-end.
#
# After this playbook completes, any service playbook can declare an
# 'ExternalSecret' that pulls a value out of OpenBao's KV store and
# materialize it as a regular Kubernetes Secret in its own namespace —
# without any plaintext credentials in group_vars or rendered Helm values.
# cluster/authentication.yml uses this pattern as its proof case to source
# the Authentik bootstrap password from OpenBao; service/vaultwarden.yml
# exercises the rotation pipeline end-to-end (admin token, DB password via
# CNPG managed.roles, OIDC client_id and client_secret via the OpenBao ->
# Authentik reconciler CronJob).
#
# Bootstrap chain established by this playbook:
#
#   pass store (~/.password-store/, GPG-encrypted)
#          |  pass CLI on the Ansible host
#   bao CLI on the Ansible host
#          |  HTTPS via Traefik LoadBalancer (homelab wildcard cert)
#   OpenBao /v1/* (sealed by default; unsealed once 3 of 5 keys are
#   submitted; KV v2 mounted at secret/, kubernetes auth method enabled)
#          |  ClusterIP openbao.openbao.svc:8200, kubernetes auth method
#   ESO controller (consumes ClusterSecretStore 'openbao', pulls per-app
#   secrets, materializes K8s Secrets in service namespaces)
#
# The unseal keys and root token live in the pass store under
# '<pass_namespace>/openbao/', GPG-encrypted at rest. Reading them
# requires the GPG passphrase, which the GPG agent caches for the
# duration of the session.
#
# OpenBao is exposed on the LAN through a Gateway API HTTPRoute attached
# to the existing traefik-gateway. The HTTPRoute applied here matches
# /v1/* only — the /ui/* and bare / paths are intentionally NOT exposed by
# this playbook because exposing the UI requires Authentik ForwardAuth,
# which cluster/authentication.yml owns. Until that playbook runs, /ui/*
# returns 404 from Traefik even though the UI process is up inside the
# pod. Traefik terminates TLS using the homelab wildcard cert; the openbao
# container itself listens on plain HTTP (tls_disable = 1) so Traefik
# speaks plaintext to the backend.
#
# State machine — the playbook is idempotent across all three states
# OpenBao can be in when it runs, and re-running after a cluster reboot is
# the canonical unseal procedure (no separate unseal playbook):
#
#   1. unreachable / initialized=false  -> run init flow, write 5 unseal
#                                          keys + root token to the pass
#                                          store, then unseal, then run the
#                                          KV/auth/ESO/CSS configuration.
#   2. initialized=true,  sealed=true   -> read 3 unseal keys from the pass
#                                          store and submit them, then
#                                          re-apply KV/auth/ESO/CSS
#                                          (idempotent).
#   3. initialized=true,  sealed=false  -> a pre-flight probe detects this
#                                          state and skips every pass-using
#                                          shell task. The Helm/namespace/
#                                          HTTPRoute/CSS tasks still re-run
#                                          (idempotent).
#
# A failure mid-init (init succeeded but only some pass writes landed)
# is fatal and surfaces a manual recovery path: re-running the playbook is
# unsafe in that case because the init step is skipped on the second pass.
# The operator must consult 'bao status' inside the cluster and, if the
# keys are unrecoverable, re-bootstrap by deleting the openbao PVC and
# starting over. The shell block carries 'no_log: true' so unseal keys
# and the root token never appear in Ansible stdout, logs, or callbacks.
#
# Local tooling required on the Ansible host:
#   - bao        (matching the in-cluster OpenBao version)
#   - kubectl    (with a kubeconfig that targets the homelab cluster)
#   - helm       (only used by the bootstrap_node tasks, not localhost)
#   - jq
#   - curl
#   - pass       (password-store)
#   - openssl    (used elsewhere; not strictly needed here)
#
# DNS prerequisite:
#   The Ansible host's DNS resolver must be configured to use the cluster's
#   bind9 LoadBalancer IP for the homelab DNS zone so openbao.<dns_zone>
#   resolves to the Traefik LoadBalancer IP. See README.md
#   ('Local DNS Resolution') for the macOS /etc/resolver setup.
#
# Run order (cluster install):
#   bootstrap.yml -> network.yml -> storage.yml -> database.yml ->
#   observability.yml -> secrets.yml (this playbook) -> authentication.yml
#   -> git.yml -> gitops.yml -> security.yml
#
# Reboot lifecycle:
#   After every cluster reboot OpenBao comes up sealed. Re-running
#   'just install homelab cluster secrets' is the canonical post-reboot
#   command — the helm/namespace/HTTPRoute/CSS tasks are no-ops, the
#   pre-flight probe sees sealed=true, the shell block reads 3 unseal keys
#   from the pass store and unseals.
#
# Pod Security Admission:
#   The 'openbao' and 'external-secrets' namespaces are both labeled with
#   the cluster's restricted profile. The Helm values templates configure
#   runAsNonRoot, drop all capabilities, set seccompProfile=RuntimeDefault,
#   and 'disable_mlock = true' in the OpenBao server config so OpenBao does
#   not require IPC_LOCK. Neither namespace needs to be added to
#   psa_exempt_namespaces in cluster/security.yml.
#
# Validation (after the playbook completes):
#
#   # OpenBao itself
#   kubectl get pods -n openbao
#   # Expected: openbao-0 Running, READY 1/1
#
#   curl -k https://openbao.<dns_zone>/v1/sys/health
#   # Expected: HTTP 200 with initialized=true, sealed=false JSON body
#
#   # pass store entries
#   pass show <pass_namespace>/openbao/unseal-key-1
#   pass show <pass_namespace>/openbao/root-token
#
#   # KV v2 mounted, kubernetes auth method enabled, eso role bound
#   just bao-shell
#   bao secrets list      # expect: secret/   kv ... Type: kv  Version: 2
#   bao auth list         # expect: kubernetes/   kubernetes
#   bao read auth/kubernetes/role/eso
#   exit
#
#   # ESO + ClusterSecretStore
#   kubectl get pods -n external-secrets
#   # Expected: external-secrets, cert-controller, webhook all Ready
#   kubectl get clustersecretstore openbao
#   # Expected: status.conditions[?(@.type=="Ready")].status == True
#
#   # Reloader (rolls workloads when ESO-managed Secrets change)
#   kubectl get pods -n reloader
#   # Expected: reloader-reloader pod Running and Ready
#
# Variables:
#   bootstrap_node:            Boolean indicating if the host is the control
#                              plane bootstrap node where helm and kubectl
#                              commands run. Read from inventory host vars.
#   nonroot_uid:               Shared non-root UID for OpenBao server pods
#                              and the longhorn data volume. Read from
#                              group_vars.
#   openbao_namespace:         Kubernetes namespace for OpenBao
#                              (default: openbao).
#   openbao_release_name:      Helm release name for the OpenBao chart
#                              (default: openbao).
#   openbao_chart_version:     Helm chart version of openbao/openbao to
#                              install (default: 0.27.2). Tracks the
#                              upstream openbao/openbao-helm release tag of
#                              the same name; bundles OpenBao server 2.5.3.
#   openbao_pod_name:          Name of the StatefulSet pod that runs OpenBao
#                              (default: openbao-0).
#   openbao_service_name:      ClusterIP service exposed by the chart and
#                              referenced as the HTTPRoute backend
#                              (default: openbao).
#   openbao_sa_name:           Name of OpenBao's ServiceAccount, created by
#                              the Helm chart with serviceAccount.create:
#                              true. Bound to system:auth-delegator so the
#                              kubernetes auth method can call TokenReview
#                              (default: openbao).
#   openbao_hostname:          FQDN under which OpenBao is reachable on the
#                              LAN through Traefik. Derived from dns_zone
#                              (default: openbao.<dns_zone>).
#   openbao_storage_class:     Kubernetes StorageClass for the data volume
#                              (default: longhorn).
#   openbao_storage_size:      Size of the data volume PVC (default: 4Gi).
#   openbao_unseal_threshold:  Number of unseal keys required to bring an
#                              initialized OpenBao cluster out of the sealed
#                              state. Must match the Shamir threshold the
#                              cluster was initialized with (default: 3).
#   openbao_unseal_shares:     Total number of unseal keys produced at init
#                              time. Must match the Shamir share count the
#                              cluster was initialized with (default: 5).
#   openbao_force_reconfigure: When true, overrides the seal-state probe and
#                              forces every pass-using shell task to run even
#                              on a cluster that is already initialized and
#                              unsealed. Use after editing the playbook's KV
#                              engine, kubernetes auth method, eso policy,
#                              or eso role to push the changes without
#                              sealing the cluster first. Must be passed at
#                              the command line via -e (default: false).
#   eso_namespace:             Namespace where the External Secrets Operator
#                              is installed (default: external-secrets).
#   eso_release_name:          Helm release name for the ESO chart
#                              (default: external-secrets).
#   eso_chart_version:         Helm chart version of
#                              external-secrets/external-secrets to install
#                              (default: 2.4.1).
#   eso_sa_name:               Name of ESO's controller ServiceAccount.
#                              Matched by the auth/kubernetes/role/eso bound
#                              service account names (default:
#                              external-secrets).
#   eso_role:                  OpenBao kubernetes auth-method role name that
#                              ESO presents at login. Bound to the eso
#                              policy (default: eso).
#   eso_policy:                OpenBao policy attached to ESO's tokens.
#                              Grants read on secret/data/* and list on
#                              secret/metadata/* (default: eso).
#   eso_token_ttl:             TTL for the OpenBao client token issued to
#                              ESO at login. ESO renews automatically before
#                              expiry (default: 1h).
#   reloader_namespace:        Namespace where Stakater Reloader is
#                              installed (default: reloader).
#   reloader_release_name:     Helm release name for the Reloader chart
#                              (default: reloader).
#   reloader_chart_version:    Helm chart version of stakater/reloader to
#                              install (default: 2.2.11).
#   pass_namespace:            Top-level folder in the pass store under which
#                              all cluster credentials are stored. Unseal keys
#                              live at '<pass_namespace>/openbao/unseal-key-N'
#                              and the root token at
#                              '<pass_namespace>/openbao/root-token'. Read from
#                              group_vars.
#   api_ready_retries:         Maximum poll attempts when waiting for
#                              OpenBao to become reachable on the LAN
#                              hostname after the HTTPRoute is applied
#                              (default: 60).
#   api_ready_delay:           Seconds between API readiness polls
#                              (default: 2).
#   pod_ready_retries:         Maximum poll attempts when waiting for the
#                              openbao-0 pod to enter the Running phase
#                              after the Helm install (default: 60).
#   pod_ready_delay:           Seconds between pod-readiness polls
#                              (default: 5).
#   kubectl_config_path:       Full path to the kubectl config file on the
#                              control plane bootstrap node
#                              (default: /home/<ansible_user>/.kube/config).

- name: Install OpenBao, External Secrets Operator, and Stakater Reloader
  hosts: homelab
  become: true
  become_exe: sudo.ws
  vars:
    openbao_namespace: openbao
    openbao_release_name: openbao
    openbao_chart_version: 0.27.2
    openbao_pod_name: openbao-0
    openbao_service_name: openbao
    openbao_sa_name: openbao
    eso_namespace: external-secrets
    eso_release_name: external-secrets
    eso_chart_version: 2.4.1
    eso_sa_name: external-secrets
    eso_role: eso
    eso_policy: eso
    eso_token_ttl: 1h
    reloader_namespace: reloader
    reloader_release_name: reloader
    reloader_chart_version: 2.2.11
    openbao_hostname: 'openbao.{{ dns_zone }}'
    openbao_storage_class: longhorn
    openbao_storage_size: 4Gi
    openbao_unseal_threshold: 3
    openbao_unseal_shares: 5
    api_ready_retries: 60
    api_ready_delay: 2
    pod_ready_retries: 60
    pod_ready_delay: 5
    # Override at the command line to force re-running all OpenBao-side
    # configuration tasks (KV v2 enable, k8s auth method
    # config, eso policy / role, etc.) on a cluster that is already
    # initialized + unsealed. Use this after editing the playbook's policy,
    # role, or auth-method config — without it, those tasks are skipped on
    # healthy re-runs because the seal-status probe says the cluster is
    # already running. Requires extending the 'just install' recipe with a
    # variadic trailing arg (see justfile), then:
    #   just install homelab cluster secrets \
    #     --extra-vars openbao_force_reconfigure=true
    openbao_force_reconfigure: false
    kubectl_config_path: '/home/{{ ansible_user }}/.kube/config'

  tasks:
    # -------------------------------------------------------------------------
    # Namespace and Pod Security Admission Hardening
    # -------------------------------------------------------------------------
    # Creates the openbao namespace, labels it with the cluster's restricted
    # PSA profile so the API server enforces the same policy here that
    # applies everywhere else, and disables the default ServiceAccount token
    # automount so any ad-hoc debug pod scheduled into this namespace does
    # not pick up a usable bearer token. The OpenBao server pod uses its own
    # named ServiceAccount created by the Helm chart and is unaffected.
    # -------------------------------------------------------------------------
    - name: Create openbao namespace
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          create namespace {{ openbao_namespace }}
      register: openbao_ns_result
      changed_when: "'created' in openbao_ns_result.stdout"
      failed_when:
        - openbao_ns_result.rc != 0
        - "'already exists' not in openbao_ns_result.stderr"
      when: bootstrap_node | default(false)

    - name: Apply restricted Pod Security Admission labels to openbao namespace
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          label namespace {{ openbao_namespace }}
          pod-security.kubernetes.io/enforce=restricted
          pod-security.kubernetes.io/warn=restricted
          pod-security.kubernetes.io/audit=restricted
          --overwrite
      register: openbao_psa_label_result
      changed_when: "'labeled' in openbao_psa_label_result.stdout"
      when: bootstrap_node | default(false)

    - name: Disable default ServiceAccount token automount in openbao namespace
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          patch serviceaccount default
          -n {{ openbao_namespace }}
          --type=merge
          -p '{"automountServiceAccountToken": false}'
      register: openbao_sa_automount_result
      changed_when: "'patched' in openbao_sa_automount_result.stdout"
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Helm Repository
    # -------------------------------------------------------------------------
    # Registers the upstream OpenBao Helm repository so that the chart can be
    # resolved by name during install and upgrade operations.
    # -------------------------------------------------------------------------
    - name: Add OpenBao Helm repository
      ansible.builtin.command:
        cmd: helm repo add openbao https://openbao.github.io/openbao-helm
      register: openbao_repo_result
      changed_when: "'has been added' in openbao_repo_result.stdout"
      failed_when:
        - openbao_repo_result.rc != 0
        - "'already exists' not in openbao_repo_result.stderr"
      when: bootstrap_node | default(false)

    - name: Update Helm repositories
      ansible.builtin.command:
        cmd: helm repo update
      changed_when: false
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Helm Install
    # -------------------------------------------------------------------------
    # Renders the values template into /tmp on the bootstrap node, runs
    # 'helm upgrade --install', and removes the values file. The chart is
    # run without --wait because OpenBao is sealed on first install and its
    # readinessProbe does not pass until the unseal step further down. The
    # subsequent 'wait for Running phase' task handles synchronization.
    # -------------------------------------------------------------------------
    - name: Write OpenBao values file
      ansible.builtin.template:
        src: openbao-values.yml.j2
        dest: /tmp/openbao-values.yml
        mode: '0600'
      when: bootstrap_node | default(false)

    - name: Install or upgrade OpenBao via Helm
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install {{ openbao_release_name }}
          openbao/openbao
          --namespace {{ openbao_namespace }}
          --kubeconfig {{ kubectl_config_path }}
          --values /tmp/openbao-values.yml
          --version {{ openbao_chart_version }}
          --timeout 10m
      register: openbao_helm_result
      changed_when: >-
        'has been upgraded' in openbao_helm_result.stdout or
        'has been deployed' in openbao_helm_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up OpenBao values file
      ansible.builtin.file:
        path: /tmp/openbao-values.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Service appProtocol Normalization
    # -------------------------------------------------------------------------
    # The openbao Helm chart hard-codes the service port's appProtocol to the
    # uppercase string 'HTTP', which Traefik's Gateway API controller rejects
    # as a non-IANA value with 'unsupported application protocol' on every
    # HTTPRoute that references the service. The chart exposes no values
    # override for this field, so we patch the service down to lowercase
    # 'http' (the IANA registered value Traefik accepts) right after install.
    # The patch is a json-replace and so is idempotent on subsequent runs.
    # -------------------------------------------------------------------------
    - name: Normalize openbao service appProtocol to IANA lowercase 'http'
      ansible.builtin.command:
        argv:
          - kubectl
          - '--kubeconfig={{ kubectl_config_path }}'
          - patch
          - svc
          - '{{ openbao_service_name }}'
          - '-n'
          - '{{ openbao_namespace }}'
          - '--type=json'
          - '-p'
          - '[{"op":"replace","path":"/spec/ports/0/appProtocol","value":"http"}]'
      register: openbao_svc_patch_result
      changed_when: "'patched' in openbao_svc_patch_result.stdout and 'no change' not in openbao_svc_patch_result.stdout"
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Wait for OpenBao Pod to Reach Running Phase
    # -------------------------------------------------------------------------
    # A freshly installed (uninitialized) OpenBao pod will be Running but
    # NotReady because its readinessProbe checks for the unsealed state. We
    # therefore wait for status.phase=Running rather than condition=Ready —
    # being Ready is what the unseal flow at the end of this playbook is
    # responsible for producing.
    # -------------------------------------------------------------------------
    - name: Wait for openbao-0 pod to reach Running phase
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get pod {{ openbao_pod_name }}
          -n {{ openbao_namespace }}
          -o jsonpath={.status.phase}
      register: openbao_pod_phase
      changed_when: false
      retries: '{{ pod_ready_retries }}'
      delay: '{{ pod_ready_delay }}'
      until: openbao_pod_phase.stdout == 'Running'
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # LAN Exposure via Traefik HTTPRoute
    # -------------------------------------------------------------------------
    # Renders and applies a Gateway API HTTPRoute that attaches the OpenBao
    # ClusterIP service to the existing traefik-gateway. ExternalDNS picks
    # up the route within seconds and registers
    # '{{ openbao_hostname }}' in bind9 pointing at the Traefik LoadBalancer
    # IP. Traefik terminates TLS using the homelab wildcard certificate
    # (selfsigned-issuer) and forwards plain HTTP to OpenBao on port 8200,
    # which matches the openbao-values.yml.j2 listener configuration
    # (tls_disable = 1).
    #
    # ForwardAuth is intentionally disabled on this route: ESO and human
    # operators authenticate to OpenBao directly with bearer tokens, so
    # layering Authentik in front of the API would only add friction. The
    # API still returns 503 for anything but /sys/health, /sys/init, and
    # /sys/unseal while the cluster is sealed, so a LAN-reachable but
    # sealed OpenBao discloses nothing of value.
    # -------------------------------------------------------------------------
    - name: Write OpenBao HTTPRoute manifest (/v1 only)
      ansible.builtin.template:
        src: httproute.yml.j2
        dest: /tmp/openbao-httproute.yml
        mode: '0644'
      vars:
        # Match only /v1/* — the API. The UI lives at /ui/* and is not
        # exposed by this playbook because exposing it requires Authentik
        # ForwardAuth, which authentication.yml owns. Until that playbook
        # runs, /ui/* returns 404 from Traefik even though the UI process
        # is up inside the OpenBao pod.
        httproute_name: openbao
        httproute_namespace: '{{ openbao_namespace }}'
        httproute_hostname: '{{ openbao_hostname }}'
        httproute_backend_name: '{{ openbao_service_name }}'
        httproute_backend_namespace: '{{ openbao_namespace }}'
        httproute_backend_port: 8200
        httproute_path_prefix: /v1
        with_forward_auth: false
      when: bootstrap_node | default(false)

    - name: Apply OpenBao HTTPRoute
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/openbao-httproute.yml
      register: openbao_httproute_result
      changed_when: >-
        'created' in openbao_httproute_result.stdout or
        'configured' in openbao_httproute_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up OpenBao HTTPRoute manifest
      ansible.builtin.file:
        path: /tmp/openbao-httproute.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Pre-flight Probe
    # -------------------------------------------------------------------------
    # The init / seed / unseal flow plus every post-unseal configuration
    # task (KV v2 enable, kubernetes auth method config, eso policy/role)
    # all need the OpenBao root token, which lives in the pass store on the
    # Ansible host.
    #
    # The probe below hits the unauthenticated /v1/sys/seal-status endpoint
    # so we can decide whether the pass-using tasks are necessary.
    # If OpenBao is already initialized and unsealed AND
    # openbao_force_reconfigure is false, every pass-using task is
    # skipped — the playbook becomes a fast no-op covering helm/PSA/HTTPRoute/
    # CSS reconciliation only. On a fresh install the LAN endpoint does not
    # yet resolve, curl fails, and we treat that as "not unsealed" — the
    # full init flow runs.
    #
    # 'openbao_force_reconfigure=true' (passed via -e on the
    # ansible-playbook command) overrides the probe and forces the full
    # flow on an already-running cluster. Use this when you have edited
    # the OpenBao policy / auth role / KV engine in the playbook and want
    # the changes applied without sealing the cluster first.
    #
    # Neither the probe nor the set_fact carries 'no_log: true' — the probe
    # endpoint is unauthenticated and the resulting fact is a boolean.
    # Putting no_log on the set_fact has been observed to leave the fact
    # undefined in subsequent tasks under some Ansible versions, which
    # silently flips openbao_running_unsealed back on.
    # -------------------------------------------------------------------------
    - name: Probe OpenBao seal-status endpoint
      ansible.builtin.command:
        argv:
          - curl
          - '-fsSk'
          - 'https://{{ openbao_hostname }}/v1/sys/seal-status'
      register: openbao_seal_probe
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
      when: bootstrap_node | default(false)

    - name: Determine whether OpenBao is already running and unsealed
      ansible.builtin.set_fact:
        openbao_running_unsealed: >-
          {{
            openbao_seal_probe.rc == 0
            and (openbao_seal_probe.stdout | from_json).initialized | default(false)
            and not (openbao_seal_probe.stdout | from_json).sealed | default(true)
          }}
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Init / Seed / Unseal (executed on the Ansible host)
    # -------------------------------------------------------------------------
    # One shell block on the Ansible host. It waits for OpenBao to be
    # reachable on the LAN hostname (Traefik must be programmed, ExternalDNS
    # must have published the bind9 record, and the local resolver must have
    # picked it up). Then it reads the cluster's seal state via the local
    # 'bao' CLI and branches:
    #
    #   - initialized=false     -> bao operator init, write 5 unseal keys
    #                              and the root token to the pass store.
    #   - initialized,  sealed  -> read 3 keys from the pass store,
    #                              bao operator unseal them in order.
    #   - initialized, unsealed -> no-op verification.
    #
    # 'set -euo pipefail' aborts on the first failure so a partial init
    # surfaces immediately. The script never echoes secret material, but
    # 'no_log: true' is layered on top defensively in case bao or pass
    # write to stderr.
    #
    # 'become: false' on the delegate disables sudo on the operator
    # workstation — pass does not require it and a sudo prompt here would
    # be redundant with the existing --ask-become-pass at the play level
    # (which targets the homelab nodes).
    #
    # BAO_SKIP_VERIFY=true accepts the homelab wildcard cert without
    # importing the self-signed CA into the operator's system trust store.
    # The same applies to the curl readiness probe (-k). The threat the
    # check would defend against is on-path tampering on the LAN, which is
    # out of scope for this homelab.
    # -------------------------------------------------------------------------
    - name: Bootstrap OpenBao seal state via local bao CLI and pass store
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail

          for _ in $(seq 1 {{ api_ready_retries }}); do
            if curl -fsSk \
                "https://{{ openbao_hostname }}/v1/sys/health?sealedcode=204&uninitcode=204" \
                >/dev/null 2>&1; then
              break
            fi
            sleep {{ api_ready_delay }}
          done

          export BAO_ADDR="https://{{ openbao_hostname }}"
          export BAO_SKIP_VERIFY=true

          STATUS="$(bao status -format=json 2>/dev/null || true)"
          INITIALIZED="$(printf '%s' "$STATUS" | jq -r .initialized)"

          if [ "$INITIALIZED" = "false" ]; then
            INIT="$(bao operator init \
              -format=json \
              -key-shares={{ openbao_unseal_shares }} \
              -key-threshold={{ openbao_unseal_threshold }})"
            for i in $(seq 1 {{ openbao_unseal_shares }}); do
              KEY="$(printf '%s' "$INIT" | jq -r ".unseal_keys_b64[$((i-1))]")"
              printf '%s\n' "$KEY" | pass insert --echo --force "{{ pass_namespace }}/openbao/unseal-key-$i" \
                >/dev/null
            done
            ROOT="$(printf '%s' "$INIT" | jq -r .root_token)"
            printf '%s\n' "$ROOT" | pass insert --echo --force '{{ pass_namespace }}/openbao/root-token' \
              >/dev/null
            unset INIT KEY ROOT
          fi

          STATUS="$(bao status -format=json 2>/dev/null || true)"
          SEALED="$(printf '%s' "$STATUS" | jq -r .sealed)"

          if [ "$SEALED" = "true" ]; then
            for i in $(seq 1 {{ openbao_unseal_threshold }}); do
              KEY="$(pass show "{{ pass_namespace }}/openbao/unseal-key-$i")"
              bao operator unseal -format=json "$KEY" >/dev/null
            done
            unset KEY
          fi

          STATUS="$(bao status -format=json)"
          FINAL_INIT="$(printf '%s' "$STATUS" | jq -r .initialized)"
          FINAL_SEAL="$(printf '%s' "$STATUS" | jq -r .sealed)"
          if [ "$FINAL_INIT" != "true" ] || [ "$FINAL_SEAL" != "false" ]; then
            echo "openbao reached unexpected state: initialized=$FINAL_INIT sealed=$FINAL_SEAL" >&2
            exit 1
          fi
          echo "openbao initialized=true sealed=false"
        executable: /bin/sh
      delegate_to: localhost
      become: false
      changed_when: true
      no_log: true
      when:
        - bootstrap_node | default(false)
        - not openbao_running_unsealed | default(false) or openbao_force_reconfigure

    # -------------------------------------------------------------------------
    # Enable KV v2 Secrets Engine at secret/
    # -------------------------------------------------------------------------
    # OpenBao on its own provides authentication, policies, and audit but no
    # built-in storage layer. A 'secrets engine' must be mounted at a path
    # before any read or write at that path becomes meaningful. KV v2 is the
    # versioned key-value engine: every write keeps history, deletes are
    # soft, prior versions can be retrieved with '-version=N'. Mounting it
    # at the conventional path 'secret/' is what every downstream tool
    # (ESO, the bao CLI, internal references) assumes by default.
    #
    # Mounting an engine is a privileged operation that ESO's scoped token
    # (created later, bound to the eso policy) will not be allowed to
    # perform. The root token from the pass store is used for this
    # one-time setup operation.
    #
    # Idempotency: 'bao secrets list' is consulted before enabling. If the
    # path is already mounted as KV v2 the task is a no-op. If the path
    # exists but is mounted as a different engine (or KV v1) the task
    # fails loudly so the operator can resolve the conflict explicitly
    # rather than overwrite an unexpected mount.
    # -------------------------------------------------------------------------
    - name: Enable KV v2 secrets engine at secret/
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail

          BAO_TOKEN="$(pass show '{{ pass_namespace }}/openbao/root-token')"
          export BAO_TOKEN
          export BAO_ADDR='https://{{ openbao_hostname }}'
          export BAO_SKIP_VERIFY=true

          MOUNTS="$(bao secrets list -format=json)"
          if printf '%s' "$MOUNTS" | jq -e '."secret/"' >/dev/null 2>&1; then
            TYPE="$(printf '%s' "$MOUNTS" | jq -r '."secret/".type')"
            VERSION="$(printf '%s' "$MOUNTS" \
              | jq -r '."secret/".options.version // empty')"
            if [ "$TYPE" != "kv" ] || [ "$VERSION" != "2" ]; then
              echo "secret/ exists but is not kv-v2 (type=$TYPE version=$VERSION)" >&2
              exit 1
            fi
            echo "secret/ already mounted as kv-v2"
          else
            bao secrets enable -path=secret -version=2 kv
            echo "secret/ enabled as kv-v2"
          fi

          unset BAO_TOKEN
        executable: /bin/sh
      delegate_to: localhost
      become: false
      changed_when: true
      no_log: true
      when:
        - bootstrap_node | default(false)
        - not openbao_running_unsealed | default(false) or openbao_force_reconfigure

    # -------------------------------------------------------------------------
    # Grant OpenBao's ServiceAccount Permission to Call TokenReview
    # -------------------------------------------------------------------------
    # Renders and applies a ClusterRoleBinding that ties OpenBao's named
    # ServiceAccount to the cluster's built-in 'system:auth-delegator' role.
    # That role grants exactly two permissions: create TokenReviews and
    # create SubjectAccessReviews. Binding it lets OpenBao's auth-method
    # backend call the kube-apiserver to validate incoming SA tokens
    # without granting OpenBao any other cluster permissions. Without this
    # binding, the apiserver returns 403 the first time ESO tries to log
    # in via auth/kubernetes/login.
    # -------------------------------------------------------------------------
    - name: Write OpenBao auth-delegator ClusterRoleBinding manifest
      ansible.builtin.template:
        src: openbao-auth-delegator-binding.yml.j2
        dest: /tmp/openbao-auth-delegator-binding.yml
        mode: '0644'
      when: bootstrap_node | default(false)

    - name: Apply OpenBao auth-delegator ClusterRoleBinding
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/openbao-auth-delegator-binding.yml
      register: openbao_auth_delegator_result
      changed_when: >-
        'created' in openbao_auth_delegator_result.stdout or
        'configured' in openbao_auth_delegator_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up OpenBao auth-delegator ClusterRoleBinding manifest
      ansible.builtin.file:
        path: /tmp/openbao-auth-delegator-binding.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Enable and Configure the Kubernetes Auth Method
    # -------------------------------------------------------------------------
    # Mounts OpenBao's Kubernetes auth backend at auth/kubernetes/ so future
    # clients (ESO, ad-hoc operator scripts) can log in by presenting a
    # cluster-issued ServiceAccount token. The backend:
    #   1. accepts a JWT (the caller's SA token) at auth/kubernetes/login,
    #   2. asks the kube-apiserver to validate it via TokenReview,
    #   3. matches the verified SA against any auth/kubernetes/role/<name>
    #      defined here,
    #   4. returns a short-lived OpenBao client token bound to the role's
    #      policies.
    #
    # The configure step writes the kube-apiserver address and the CA cert
    # the backend should trust when calling TokenReview. Modern OpenBao
    # autodetects both when running inside a pod, but writing them
    # explicitly makes the configuration idempotent and visible.
    #
    # No 'role' is created here on purpose. Roles tie a specific SA to a
    # specific OpenBao policy and are added by the playbook (or service
    # playbook) that owns the SA — for example, the upcoming ESO
    # ClusterSecretStore step adds an 'eso' role pointing at the
    # external-secrets ServiceAccount with the 'eso' policy. After this
    # step OpenBao can authenticate K8s tokens but no SA is mapped to any
    # policy yet, which is fine — login attempts simply fail with 'role
    # not found' until a role is created.
    # -------------------------------------------------------------------------
    - name: Enable and configure the Kubernetes auth method
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail

          BAO_TOKEN="$(pass show '{{ pass_namespace }}/openbao/root-token')"
          export BAO_TOKEN
          export BAO_ADDR='https://{{ openbao_hostname }}'
          export BAO_SKIP_VERIFY=true

          AUTH_LIST="$(bao auth list -format=json)"
          if printf '%s' "$AUTH_LIST" | jq -e '."kubernetes/"' >/dev/null 2>&1; then
            TYPE="$(printf '%s' "$AUTH_LIST" | jq -r '."kubernetes/".type')"
            if [ "$TYPE" != "kubernetes" ]; then
              echo "auth/kubernetes/ exists but is not the kubernetes auth backend (type=$TYPE)" >&2
              exit 1
            fi
            echo "auth/kubernetes/ already enabled"
          else
            bao auth enable kubernetes
            echo "auth/kubernetes/ enabled"
          fi

          # kubernetes_host is set explicitly; the CA cert is intentionally
          # left to the backend's in-pod autodetection (the bao client runs
          # on the operator's Mac and does not have the cluster CA on disk,
          # so passing @<path> would read the wrong file). With
          # disable_local_ca_jwt=false the auth backend uses the SA CA
          # mounted into the OpenBao pod at
          # /var/run/secrets/kubernetes.io/serviceaccount/ca.crt — server
          # side, never touched by the client.
          bao write auth/kubernetes/config \
            kubernetes_host="https://kubernetes.default.svc" \
            disable_local_ca_jwt=false >/dev/null
          echo "auth/kubernetes/config applied"

          unset BAO_TOKEN
        executable: /bin/sh
      delegate_to: localhost
      become: false
      changed_when: true
      no_log: true
      when:
        - bootstrap_node | default(false)
        - not openbao_running_unsealed | default(false) or openbao_force_reconfigure

    # -------------------------------------------------------------------------
    # External Secrets Operator
    # -------------------------------------------------------------------------
    # Installs ESO into its own namespace with the cluster's restricted PSA
    # profile. ESO runs three deployments — controller, cert-controller,
    # and webhook — all stateless, all reconciling against the K8s API
    # only. Once installed, the cluster has the ExternalSecret and
    # ClusterSecretStore CRDs and the controller is watching for them.
    # The 'openbao' ClusterSecretStore that ESO needs to actually fetch
    # secrets from OpenBao is applied later in this same playbook (after
    # the eso policy/role are written so login works on the first sync).
    # -------------------------------------------------------------------------
    - name: Create external-secrets namespace
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          create namespace {{ eso_namespace }}
      register: eso_ns_result
      changed_when: "'created' in eso_ns_result.stdout"
      failed_when:
        - eso_ns_result.rc != 0
        - "'already exists' not in eso_ns_result.stderr"
      when: bootstrap_node | default(false)

    - name: Apply restricted Pod Security Admission labels to external-secrets namespace
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          label namespace {{ eso_namespace }}
          pod-security.kubernetes.io/enforce=restricted
          pod-security.kubernetes.io/warn=restricted
          pod-security.kubernetes.io/audit=restricted
          --overwrite
      register: eso_psa_label_result
      changed_when: "'labeled' in eso_psa_label_result.stdout"
      when: bootstrap_node | default(false)

    - name: Disable default ServiceAccount token automount in external-secrets namespace
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          patch serviceaccount default
          -n {{ eso_namespace }}
          --type=merge
          -p '{"automountServiceAccountToken": false}'
      register: eso_sa_automount_result
      changed_when: "'patched' in eso_sa_automount_result.stdout"
      when: bootstrap_node | default(false)

    - name: Add External Secrets Helm repository
      ansible.builtin.command:
        cmd: helm repo add external-secrets https://charts.external-secrets.io
      register: eso_repo_result
      changed_when: "'has been added' in eso_repo_result.stdout"
      failed_when:
        - eso_repo_result.rc != 0
        - "'already exists' not in eso_repo_result.stderr"
      when: bootstrap_node | default(false)

    - name: Update Helm repositories
      ansible.builtin.command:
        cmd: helm repo update
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Write ESO values file
      ansible.builtin.template:
        src: eso-values.yml.j2
        dest: /tmp/eso-values.yml
        mode: '0600'
      when: bootstrap_node | default(false)

    - name: Install or upgrade ESO via Helm
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install {{ eso_release_name }}
          external-secrets/external-secrets
          --namespace {{ eso_namespace }}
          --kubeconfig {{ kubectl_config_path }}
          --values /tmp/eso-values.yml
          --version {{ eso_chart_version }}
          --wait
          --timeout 10m
      register: eso_helm_result
      changed_when: >-
        'has been upgraded' in eso_helm_result.stdout or
        'has been deployed' in eso_helm_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up ESO values file
      ansible.builtin.file:
        path: /tmp/eso-values.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Stakater Reloader
    # -------------------------------------------------------------------------
    # Watches Secrets and ConfigMaps cluster-wide and rolls any
    # Deployment/StatefulSet/DaemonSet annotated with
    # 'reloader.stakater.com/auto: "true"' (or one of its targeted
    # variants) whenever a watched resource changes. Pairs with
    # ExternalSecret rotations: when ESO updates a K8s Secret from a
    # rotated OpenBao value, Reloader sees the change and rolls the
    # consumer pod so the new env reaches the container.
    #
    # Stateless, no PVC needed. The 'reloader' namespace is labeled with
    # the cluster's restricted PSA profile.
    # -------------------------------------------------------------------------
    - name: Create reloader namespace
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          create namespace {{ reloader_namespace }}
      register: reloader_ns_result
      changed_when: "'created' in reloader_ns_result.stdout"
      failed_when:
        - reloader_ns_result.rc != 0
        - "'already exists' not in reloader_ns_result.stderr"
      when: bootstrap_node | default(false)

    - name: Apply restricted Pod Security Admission labels to reloader namespace
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          label namespace {{ reloader_namespace }}
          pod-security.kubernetes.io/enforce=restricted
          pod-security.kubernetes.io/warn=restricted
          pod-security.kubernetes.io/audit=restricted
          --overwrite
      register: reloader_psa_label_result
      changed_when: "'labeled' in reloader_psa_label_result.stdout"
      when: bootstrap_node | default(false)

    - name: Disable default ServiceAccount token automount in reloader namespace
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          patch serviceaccount default
          -n {{ reloader_namespace }}
          --type=merge
          -p '{"automountServiceAccountToken": false}'
      register: reloader_sa_automount_result
      changed_when: "'patched' in reloader_sa_automount_result.stdout"
      when: bootstrap_node | default(false)

    - name: Add Stakater Helm repository
      ansible.builtin.command:
        cmd: helm repo add stakater https://stakater.github.io/stakater-charts
      register: reloader_repo_result
      changed_when: "'has been added' in reloader_repo_result.stdout"
      failed_when:
        - reloader_repo_result.rc != 0
        - "'already exists' not in reloader_repo_result.stderr"
      when: bootstrap_node | default(false)

    - name: Update Helm repositories
      ansible.builtin.command:
        cmd: helm repo update
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Write Reloader values file
      ansible.builtin.template:
        src: reloader-values.yml.j2
        dest: /tmp/reloader-values.yml
        mode: '0600'
      when: bootstrap_node | default(false)

    - name: Install or upgrade Reloader via Helm
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install {{ reloader_release_name }}
          stakater/reloader
          --namespace {{ reloader_namespace }}
          --kubeconfig {{ kubectl_config_path }}
          --values /tmp/reloader-values.yml
          --version {{ reloader_chart_version }}
          --wait
          --timeout 10m
      register: reloader_helm_result
      changed_when: >-
        'has been upgraded' in reloader_helm_result.stdout or
        'has been deployed' in reloader_helm_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up Reloader values file
      ansible.builtin.file:
        path: /tmp/reloader-values.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # OpenBao Policy and Auth Role for ESO
    # -------------------------------------------------------------------------
    # Writes a policy that grants read access to everything under
    # secret/data/* and list access to secret/metadata/*, then binds it to
    # an auth/kubernetes role that matches ESO's ServiceAccount. The role
    # is what makes the kubernetes auth method actually issue useful
    # tokens to ESO — without it, login succeeds but the returned token
    # carries no policies. Both writes are idempotent: 'bao policy write'
    # and 'bao write auth/kubernetes/role/...' upsert in place.
    #
    # Token TTL is 1h; ESO renews automatically before expiry. The policy
    # scope is broad on purpose for the homelab — every service path
    # under secret/ is readable by ESO. We can split this into per-app
    # policies later if isolation between services becomes load-bearing.
    # -------------------------------------------------------------------------
    - name: Configure OpenBao 'eso' policy and auth/kubernetes/role/eso
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail

          BAO_TOKEN="$(pass show '{{ pass_namespace }}/openbao/root-token')"
          export BAO_TOKEN
          export BAO_ADDR='https://{{ openbao_hostname }}'
          export BAO_SKIP_VERIFY=true

          bao policy write {{ eso_policy }} - <<'POLICY' >/dev/null
          path "secret/data/*" {
            capabilities = ["read"]
          }
          path "secret/metadata/*" {
            capabilities = ["read", "list"]
          }
          POLICY
          echo "policy {{ eso_policy }} written"

          bao write auth/kubernetes/role/{{ eso_role }} \
            bound_service_account_names={{ eso_sa_name }} \
            bound_service_account_namespaces={{ eso_namespace }} \
            policies={{ eso_policy }} \
            ttl={{ eso_token_ttl }} >/dev/null
          echo "auth/kubernetes/role/{{ eso_role }} written"

          unset BAO_TOKEN
        executable: /bin/sh
      delegate_to: localhost
      become: false
      changed_when: true
      no_log: true
      when:
        - bootstrap_node | default(false)
        - not openbao_running_unsealed | default(false) or openbao_force_reconfigure

    # -------------------------------------------------------------------------
    # ClusterSecretStore
    # -------------------------------------------------------------------------
    # Renders the cluster-scoped SecretStore that points ESO at the
    # in-cluster OpenBao ClusterIP and tells it to authenticate via the
    # kubernetes method using the 'eso' role. Cluster-scoped so any
    # namespace's ExternalSecret can reference it without a per-namespace
    # SecretStore. Uses the vault provider (OpenBao is wire-compatible
    # with Vault and ESO has no dedicated openbao provider as of chart
    # 2.4.1).
    # -------------------------------------------------------------------------
    - name: Write ESO ClusterSecretStore manifest
      ansible.builtin.template:
        src: eso-cluster-secret-store.yml.j2
        dest: /tmp/eso-cluster-secret-store.yml
        mode: '0644'
      when: bootstrap_node | default(false)

    - name: Apply ESO ClusterSecretStore
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/eso-cluster-secret-store.yml
      register: eso_css_apply_result
      changed_when: >-
        'created' in eso_css_apply_result.stdout or
        'configured' in eso_css_apply_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up ESO ClusterSecretStore manifest
      ansible.builtin.file:
        path: /tmp/eso-cluster-secret-store.yml
        state: absent
      when: bootstrap_node | default(false)

    # Restart the ESO controller after the unseal flow ran. The CSS
    # reconciler caches its last "Vault is sealed" failure with an
    # exponential backoff; if OpenBao was sealed during ESO's last reconcile
    # (likely after the helm upgrade rolled the openbao-0 pod earlier in
    # this play) it can take several minutes for the next attempt, which
    # exceeds the 'CSS Ready=True' wait below. A fresh controller pod
    # reconciles immediately and clears the stale state. Skipped on
    # already-unsealed runs (probe gates everything) so steady-state
    # re-runs don't churn the deployment.
    - name: Restart ESO controller after OpenBao unseal so CSS reconciles immediately
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          rollout restart deploy {{ eso_release_name }}
          -n {{ eso_namespace }}
      register: eso_rollout_restart_result
      changed_when: "'restarted' in eso_rollout_restart_result.stdout"
      when:
        - bootstrap_node | default(false)
        - not openbao_running_unsealed | default(false) or openbao_force_reconfigure

    - name: Wait for ClusterSecretStore openbao to report Ready=True
      ansible.builtin.command:
        argv:
          - kubectl
          - '--kubeconfig={{ kubectl_config_path }}'
          - get
          - clustersecretstore
          - openbao
          - '-o'
          - 'jsonpath={.status.conditions[?(@.type=="Ready")].status}'
      register: eso_css_ready
      changed_when: false
      retries: 30
      delay: 2
      until: eso_css_ready.stdout == 'True'
      when: bootstrap_node | default(false)
