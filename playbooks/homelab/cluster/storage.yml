---
# ==============================================================================
# Playbook: Install Longhorn Storage
# ==============================================================================
# This playbook installs the dependencies required for Longhorn distributed
# block storage across all nodes, and then deploys Longhorn via Helm on the
# bootstrap node. It provides cluster-persistent storage for Kubernetes.
#
# Multipath is configured to blacklist sd* devices on all nodes to prevent
# multipathd from claiming Longhorn iSCSI volumes, which causes mount failures
# particularly after S3 suspend/resume.
#
# Variables:
#   bootstrap_node:         Boolean indicating if the host is the control plane
#                           bootstrap node where Helm commands should execute.
#                           Read from inventory host vars.
#   dns_zone:               DNS zone served by Bind9 (e.g. homelab.internal).
#                           Read from group_vars.
#   longhorn_namespace:     Kubernetes namespace for Longhorn
#                           (default: longhorn-system).
#   longhorn_chart_version:       Helm chart version of Longhorn to install
#                           (default: 1.8.0).
#   longhorn_replica_count: Number of volume replicas. Overridden at runtime
#                           to match the actual cluster node count
#                           (default: 3).
#   longhorn_hostname:      Fully qualified hostname for the Longhorn UI,
#                           derived from dns_zone
#                           (default: longhorn.<dns_zone>).
#   kubectl_config_path:    Full path to the kubectl config file
#                           (default: /home/<ansible_user>/.kube/config).
#   longhorn_iscsi_set_manual_script_path:
#                           Full path to the helper that rewrites Longhorn-owned
#                           iSCSI node records from node.startup=automatic to
#                           manual
#                           (default: /usr/local/bin/longhorn-iscsi-set-manual.sh).

- name: Install Longhorn storage
  hosts: homelab
  become: true
  become_exe: sudo.ws
  vars:
    longhorn_namespace: longhorn-system
    longhorn_chart_version: 1.8.0
    longhorn_replica_count: 3
    longhorn_hostname: "longhorn.{{ dns_zone }}"
    kubectl_config_path: "/home/{{ ansible_user }}/.kube/config"
    longhorn_iscsi_set_manual_script_path: /usr/local/bin/longhorn-iscsi-set-manual.sh
    authentik_namespace: authentik

  tasks:
    # -------------------------------------------------------------------------
    # Dependencies
    # Installs the packages required by Longhorn on every node in the cluster.
    # open-iscsi provides the iSCSI initiator used for block storage transport
    # between Longhorn components. nfs-common enables NFS mounts, which
    # Longhorn uses for ReadWriteMany volume access mode support.
    #
    # NOTE: Longhorn manages its own iSCSI sessions via iscsid directly.
    # On older distros, iscsi.service should be disabled to prevent stale session
    # reconnection on boot conflicting with Longhorn. On Ubuntu 25.10, iscsi.service
    # does not exist — only iscsid.service is present, which Longhorn requires.
    # See: https://longhorn.io/kb/troubleshooting-orphan-iscsi-session-error/
    # -------------------------------------------------------------------------
    - name: Install Longhorn dependencies via package manager
      ansible.builtin.apt:
        name:
          - open-iscsi
          - nfs-common
        state: present
        update_cache: true

    # -------------------------------------------------------------------------
    # iSCSI Node Record Normalization
    # Longhorn's CSI plugin issues explicit iscsiadm --login calls whenever a
    # volume is attached. If iscsid also auto-reconnects to the same targets on
    # startup (the open-iscsi default of node.startup=automatic), the two paths
    # race on boot and especially on resume: iscsid can reconnect to a target
    # before Longhorn's engine for that volume is back up, so the kernel sees a
    # dead target for the freshly assigned /dev/sdX and aborts its ext4
    # filesystem with "shut down requested (2)" / "device offline error"
    # messages.
    #
    # The fix rewrites Longhorn-owned node records from automatic to manual
    # before iscsid reads the node database. Scoped to the IQN prefix
    # iqn.2019-10.io.longhorn so external iSCSI providers (NAS, backup
    # appliance, etc.) keep their default auto-login behavior. A systemd
    # oneshot wired Before=iscsid.service / WantedBy=iscsid.service runs the
    # script transparently on every iscsid start. A one-off play run normalizes
    # any records already written by a previously-running iscsid at deploy
    # time.
    # -------------------------------------------------------------------------
    - name: Install Longhorn iSCSI node record fixup script
      ansible.builtin.template:
        src: longhorn-iscsi-set-manual.sh.j2
        dest: '{{ longhorn_iscsi_set_manual_script_path }}'
        mode: '0755'
        owner: root
        group: root

    - name: Install Longhorn iSCSI node record fixup service
      ansible.builtin.template:
        src: longhorn-iscsi-set-manual.service.j2
        dest: /etc/systemd/system/longhorn-iscsi-set-manual.service
        mode: '0644'
        owner: root
        group: root
      notify: Reload systemd daemon

    - name: Enable Longhorn iSCSI node record fixup service
      ansible.builtin.systemd:
        name: longhorn-iscsi-set-manual.service
        enabled: true
        daemon_reload: true

    - name: Normalize existing Longhorn iSCSI node records to manual startup
      ansible.builtin.command:
        cmd: '{{ longhorn_iscsi_set_manual_script_path }}'
      register: longhorn_iscsi_set_manual_result
      changed_when: "'changed=0' not in longhorn_iscsi_set_manual_result.stdout"

    # -------------------------------------------------------------------------
    # Multipath Configuration
    # Blacklists all sd* block devices from multipath management. Longhorn uses
    # iSCSI to expose volumes, which appear as sd* devices. Without this
    # blacklist, multipathd claims those devices before Longhorn can map them
    # correctly, causing mount failures — especially after S3 suspend/resume
    # when the iSCSI session reconnects and multipathd grabs the raw device
    # before Longhorn's device management runs.
    # -------------------------------------------------------------------------
    - name: Configure multipath to blacklist Longhorn iSCSI devices
      ansible.builtin.copy:
        dest: /etc/multipath.conf
        mode: '0644'
        content: |
          blacklist {
              devnode "^sd[a-z0-9]+"
          }

    - name: Restart multipathd to apply blacklist
      ansible.builtin.systemd:
        name: multipathd
        state: restarted

    # -------------------------------------------------------------------------
    # Longhorn Installation
    # Installs Longhorn via Helm on the bootstrap node. The replica count is
    # determined dynamically from the current cluster node count so the default
    # replication factor matches available capacity. The Longhorn Helm
    # repository is registered before installation.
    # -------------------------------------------------------------------------
    - name: Add Longhorn Helm repository
      ansible.builtin.command:
        cmd: helm repo add longhorn https://charts.longhorn.io
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Update Helm repositories
      ansible.builtin.command:
        cmd: helm repo update
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Determine number of nodes in the cluster
      ansible.builtin.command:
        cmd: kubectl --kubeconfig={{ kubectl_config_path }} get nodes --no-headers
      register: kubectl_get_nodes_result
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Set longhorn replica count fact based on cluster node count
      ansible.builtin.set_fact:
        longhorn_replica_count: "{{ kubectl_get_nodes_result.stdout_lines | length }}"
      when: bootstrap_node | default(false)

    - name: Write Longhorn values file
      ansible.builtin.template:
        src: longhorn-values.yml.j2
        dest: /tmp/longhorn-values.yml
        mode: "0644"
      when: bootstrap_node | default(false)

    - name: Install or upgrade Longhorn via Helm
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install longhorn longhorn/longhorn
          --namespace {{ longhorn_namespace }}
          --create-namespace
          --kubeconfig {{ kubectl_config_path }}
          --values /tmp/longhorn-values.yml
          --version {{ longhorn_chart_version }}
      changed_when: true
      when: bootstrap_node | default(false)

    - name: Clean up Longhorn values file
      ansible.builtin.file:
        path: /tmp/longhorn-values.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # ForwardAuth Middleware (longhorn-system)
    # Deploys the Traefik ForwardAuth Middleware in the longhorn-system
    # namespace so that the Longhorn UI HTTPRoute can reference it. The
    # Middleware itself just declares an outbound URL — it can be created
    # before Authentik is installed; it only becomes functional once
    # cluster/authentication.yml has run and the Authentik service is
    # reachable in the cluster.
    # -------------------------------------------------------------------------
    - name: Write ForwardAuth Middleware manifest for longhorn-system
      ansible.builtin.template:
        src: traefik-forward-auth-middleware.yml.j2
        dest: /tmp/traefik-forward-auth-middleware-longhorn-system.yml
        mode: '0644'
      vars:
        middleware_namespace: '{{ longhorn_namespace }}'
      when: bootstrap_node | default(false)

    - name: Apply ForwardAuth Middleware in longhorn-system
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/traefik-forward-auth-middleware-longhorn-system.yml
      register: longhorn_middleware_result
      changed_when: >-
        'created' in longhorn_middleware_result.stdout or
        'configured' in longhorn_middleware_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up longhorn-system ForwardAuth Middleware manifest
      ansible.builtin.file:
        path: /tmp/traefik-forward-auth-middleware-longhorn-system.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # UI Exposure
    # Exposes the Longhorn UI over the LAN via an HTTPRoute attached to the
    # traefik-gateway. HTTPS traffic matching the Longhorn hostname is routed
    # to the longhorn-frontend service. HTTP traffic is redirected to HTTPS by
    # the Traefik entrypoint redirect. ExternalDNS will register the Longhorn
    # hostname in Bind9 once the HTTPRoute is accepted by the Gateway. The
    # route is gated by ForwardAuth and only becomes accessible once Authentik
    # is installed by cluster/authentication.yml.
    # -------------------------------------------------------------------------
    - name: Write Longhorn HTTPRoute manifest
      ansible.builtin.template:
        src: httproute.yml.j2
        dest: /tmp/longhorn-httproute.yml
        mode: "0644"
      vars:
        httproute_name: longhorn-ui
        httproute_namespace: "{{ longhorn_namespace }}"
        httproute_hostname: "{{ longhorn_hostname }}"
        httproute_backend_name: longhorn-frontend
        httproute_backend_namespace: "{{ longhorn_namespace }}"
        httproute_backend_port: 80
        with_forward_auth: true
      when: bootstrap_node | default(false)

    - name: Apply Longhorn HTTPRoute
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/longhorn-httproute.yml
      register: longhorn_httproute_result
      changed_when: >-
        'created' in longhorn_httproute_result.stdout or
        'configured' in longhorn_httproute_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up Longhorn HTTPRoute manifest
      ansible.builtin.file:
        path: /tmp/longhorn-httproute.yml
        state: absent
      when: bootstrap_node | default(false)

  handlers:
    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true
