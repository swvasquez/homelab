---
# ==============================================================================
# Playbook: Install Authentik Authentication
# ==============================================================================
# This playbook deploys Authentik, an open-source Identity Provider, to the
# Kubernetes cluster via Helm. Authentik provides SSO, OAuth2/OIDC, SAML, and
# LDAP authentication for homelab services.
#
# Authentik uses CloudNativePG for PostgreSQL and Redis as a subchart for
# caching. Three of the four startup credentials — secret_key,
# postgresql.password, and bootstrap_token — are auto-generated on first run
# and stored in a Kubernetes Secret named authentik-credentials. The fourth,
# AUTHENTIK_BOOTSTRAP_PASSWORD, is generated on first run and written to
# OpenBao at secret/authentik/bootstrap_password by this playbook; ESO
# materializes it into a separate Kubernetes Secret named
# authentik-eso-bootstrap, which the chart consumes via global.envFrom. This
# requires cluster/secrets.yml to have run first (OpenBao + ESO +
# ClusterSecretStore must be in place).
#
# The Authentik UI is exposed over HTTPS via a Gateway API HTTPRoute attached
# to the traefik-gateway. Authentik itself is not protected by ForwardAuth —
# it is the identity provider.
#
# A single domain-level Forward Auth proxy provider (homelab-forward-auth) is
# created in Authentik covering the entire DNS zone (*.{{ dns_zone }}). With
# this single provider in place, any service in any namespace can opt into
# ForwardAuth by deploying its own Traefik Middleware (authentik-forward-auth)
# and HTTPRoute referencing that Middleware. This playbook does NOT deploy the
# per-namespace Middlewares or service HTTPRoutes itself — each cluster
# component (network.yml, storage.yml, observability.yml, security.yml) and
# each service playbook in playbooks/service/ is responsible for applying its
# own Middleware and HTTPRoute. Adding a new service therefore does NOT
# require re-running this playbook.
#
# The OpenBao web UI is the one exception. cluster/secrets.yml exposes
# OpenBao's API at /v1/* but leaves /ui/* unrouted because exposing the UI
# requires Authentik ForwardAuth — and Authentik itself depends on this
# playbook. After Authentik is installed, the tail of this playbook applies
# an authentik-forward-auth Middleware in the openbao namespace and a
# / -prefix HTTPRoute that gates the OpenBao UI behind SSO. The result is
# that openbao.<dns_zone>/v1/* stays unauthenticated (token-based; ESO and
# the bao CLI use this) while openbao.<dns_zone>/ui/* requires Authentik
# login first, then OpenBao's own login form.
#
# Variables:
#   bootstrap_node:              Boolean indicating if the host is the control
#                                plane bootstrap node where Helm commands run.
#                                Read from inventory host vars.
#   dns_zone:                    DNS zone (e.g. homelab.internal). Read from
#                                group_vars.
#   authentik_namespace:         Kubernetes namespace for Authentik
#                                (default: authentik).
#   authentik_chart_version:     Helm chart version of Authentik to install
#                                (default: 2026.2.1).
#   authentik_hostname:          FQDN for the Authentik UI, derived from
#                                dns_zone (default: authentik.<dns_zone>).
#   kubectl_config_path:         Full path to the kubectl config file
#                                (default: /home/<ansible_user>/.kube/config).
#   authentik_bootstrap_token:   API token auto-generated on first run and
#                                stored in the authentik-credentials Secret.
#                                Used to configure Authentik via the REST API.
#   admin_email:                 Email address for the Authentik default admin
#                                account. Read from group_vars. Only applied on
#                                first Authentik startup — update via the UI
#                                after initial deployment.
#   authentik_bootstrap_secret_name:
#                                Name of the K8s Secret materialized by ESO
#                                from secret/authentik/bootstrap_password in
#                                OpenBao. Authentik server and worker pods
#                                envFrom this Secret to read
#                                AUTHENTIK_BOOTSTRAP_PASSWORD on first start
#                                (default: authentik-eso-bootstrap).
#   openbao_authentik_bootstrap_path:
#                                KV path in OpenBao that holds the random
#                                bootstrap password. Generated on first
#                                install; never rotated automatically by
#                                this playbook (default:
#                                secret/authentik/bootstrap_password).
#   openbao_hostname:            FQDN under which OpenBao is reachable from
#                                the Ansible host. Used by 'bao kv put' to
#                                write the bootstrap password
#                                (default: openbao.<dns_zone>).
#   homelab_keychain:            Filename of the dedicated macOS keychain
#                                on the Ansible host that holds cluster
#                                master credentials. Created by
#                                cluster/bootstrap.yml on first install,
#                                populated with OpenBao unseal keys +
#                                root token by cluster/secrets.yml, and
#                                read here for the root token used to
#                                write to OpenBao. Read from group_vars
#                                and derived from keychain_prefix.
#   keychain_prefix:             Prefix for the dedicated macOS keychain
#                                filename. Read from group_vars
#                                ('<keychain_prefix>.keychain' is the
#                                full filename).
#   keychain_service:            'service' field used to look up the OpenBao
#                                root token in the keychain (default:
#                                openbao).
#   authentik_db_name:           PostgreSQL database name for Authentik
#                                (default: authentik).
#   authentik_db_username:       PostgreSQL username for Authentik
#                                (default: authentik).
#   authentik_db_storage_size:   Storage size for the Authentik cnpg database
#                                PVC (default: 8Gi).
#   authentik_storage_class:     Kubernetes StorageClass for the database PVC
#                                (default: longhorn).
#   nonroot_uid:                 Shared non-root UID for the authentik server
#                                and worker pods. Read from group_vars.

- name: Install Authentik authentication
  hosts: homelab
  become: true
  become_exe: sudo.ws
  vars:
    authentik_namespace: authentik
    authentik_chart_version: 2026.2.1
    authentik_hostname: 'authentik.{{ dns_zone }}'
    authentik_db_name: authentik
    authentik_db_username: authentik
    authentik_db_storage_size: 8Gi
    authentik_storage_class: longhorn
    authentik_bootstrap_secret_name: authentik-eso-bootstrap
    openbao_hostname: 'openbao.{{ dns_zone }}'
    homelab_keychain: '{{ keychain_prefix }}.keychain'
    openbao_authentik_bootstrap_path: secret/authentik/bootstrap_password
    keychain_service: openbao
    kubectl_config_path: '/home/{{ ansible_user }}/.kube/config'

  tasks:
    # -------------------------------------------------------------------------
    # Namespace
    # Creates the Authentik namespace before any other resources so that the
    # credentials Secret can be stored there prior to the Helm install.
    # -------------------------------------------------------------------------
    - name: Create Authentik namespace
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          create namespace {{ authentik_namespace }}
      register: authentik_ns_result
      changed_when: "'created' in authentik_ns_result.stdout"
      failed_when:
        - authentik_ns_result.rc != 0
        - "'already exists' not in authentik_ns_result.stderr"
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Default ServiceAccount Hardening
    # Disables the default ServiceAccount token automount in this namespace so
    # ad-hoc pods that don't name a ServiceAccount cannot read a usable API
    # bearer credential. The named Authentik ServiceAccounts created by the
    # Helm chart are unaffected.
    # -------------------------------------------------------------------------
    - name: Disable default ServiceAccount token automount in Authentik namespace
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          patch serviceaccount default
          -n {{ authentik_namespace }}
          --type=merge
          -p '{"automountServiceAccountToken": false}'
      register: authentik_sa_automount_result
      changed_when: "'patched' in authentik_sa_automount_result.stdout"
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Credential Generation
    # Generates a cryptographic secret key, PostgreSQL password, and API
    # bootstrap token on first run, then persists all three in a Kubernetes
    # Secret named authentik-credentials. On subsequent runs the existing
    # Secret is reused so credentials remain stable across upgrades.
    #
    # The bootstrap token is passed to Authentik via AUTHENTIK_BOOTSTRAP_TOKEN,
    # which creates a persistent API token in the database on first startup.
    # This token is used later in the playbook to configure Authentik via the
    # REST API without requiring manual UI interaction.
    #
    # If the secret exists but predates the bootstrap token (upgrade path), the
    # token is generated and patched into the existing secret.
    # -------------------------------------------------------------------------
    - name: Check if Authentik credentials secret already exists
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get secret authentik-credentials -n {{ authentik_namespace }}
      register: existing_credentials_check
      changed_when: false
      failed_when: false
      when: bootstrap_node | default(false)

    - name: Generate Authentik secret key
      ansible.builtin.command:
        cmd: openssl rand -hex 32
      register: generated_secret_key
      changed_when: false
      when:
        - bootstrap_node | default(false)
        - existing_credentials_check.rc != 0

    - name: Generate Authentik PostgreSQL password
      ansible.builtin.command:
        cmd: openssl rand -base64 24
      register: generated_postgres_password
      changed_when: false
      when:
        - bootstrap_node | default(false)
        - existing_credentials_check.rc != 0

    - name: Generate Authentik bootstrap token
      ansible.builtin.command:
        cmd: openssl rand -hex 32
      register: generated_bootstrap_token
      changed_when: false
      when:
        - bootstrap_node | default(false)
        - existing_credentials_check.rc != 0

    - name: Create Authentik credentials Kubernetes secret
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          create secret generic authentik-credentials
          -n {{ authentik_namespace }}
          --from-literal=secret-key={{ generated_secret_key.stdout }}
          --from-literal=postgresql-password={{ generated_postgres_password.stdout }}
          --from-literal=bootstrap-token={{ generated_bootstrap_token.stdout }}
      when:
        - bootstrap_node | default(false)
        - existing_credentials_check.rc != 0
      changed_when: true

    - name: Check if bootstrap token exists in Authentik credentials secret
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get secret authentik-credentials -n {{ authentik_namespace }}
          -o jsonpath='{.data.bootstrap-token}'
      register: existing_bootstrap_token_check
      changed_when: false
      failed_when: false
      when:
        - bootstrap_node | default(false)
        - existing_credentials_check.rc == 0

    - name: Generate Authentik bootstrap token for existing secret
      ansible.builtin.command:
        cmd: openssl rand -hex 32
      register: generated_bootstrap_token_upgrade
      changed_when: false
      when:
        - bootstrap_node | default(false)
        - existing_credentials_check.rc == 0
        - existing_bootstrap_token_check.stdout == ''

    - name: Patch bootstrap token into existing Authentik credentials secret
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          patch secret authentik-credentials
          -n {{ authentik_namespace }}
          --type=json
          -p='[{"op":"add","path":"/data/bootstrap-token",
          "value":"{{ generated_bootstrap_token_upgrade.stdout | b64encode }}"}]'
      changed_when: true
      when:
        - bootstrap_node | default(false)
        - existing_credentials_check.rc == 0
        - existing_bootstrap_token_check.stdout == ''

    - name: Read Authentik secret key from Kubernetes secret
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get secret authentik-credentials -n {{ authentik_namespace }}
          -o jsonpath='{.data.secret-key}'
      register: authentik_secret_key_b64
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Read Authentik PostgreSQL password from Kubernetes secret
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get secret authentik-credentials -n {{ authentik_namespace }}
          -o jsonpath='{.data.postgresql-password}'
      register: authentik_postgres_password_b64
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Read Authentik bootstrap token from Kubernetes secret
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get secret authentik-credentials -n {{ authentik_namespace }}
          -o jsonpath='{.data.bootstrap-token}'
      register: authentik_bootstrap_token_b64
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Set Authentik credential facts
      ansible.builtin.set_fact:
        authentik_secret_key: '{{ authentik_secret_key_b64.stdout | b64decode }}'
        authentik_postgres_password: '{{ authentik_postgres_password_b64.stdout | b64decode }}'
        authentik_bootstrap_token: '{{ authentik_bootstrap_token_b64.stdout | b64decode }}'
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Database
    # Provisions a CloudNativePG Cluster for Authentik's PostgreSQL database.
    # A cnpg-formatted credentials secret (authentik-db-credentials) is created
    # from the postgresql-password in authentik-credentials. The Cluster
    # resource is applied idempotently via kubectl apply and the playbook waits
    # for it to reach a healthy state before proceeding with the Helm install.
    # -------------------------------------------------------------------------
    - name: Create Authentik cnpg database credentials secret
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          create secret generic authentik-db-credentials
          -n {{ authentik_namespace }}
          --from-literal=username={{ authentik_db_username }}
          --from-literal=password={{ authentik_postgres_password }}
      register: authentik_db_creds_result
      changed_when: "'created' in authentik_db_creds_result.stdout"
      failed_when:
        - authentik_db_creds_result.rc != 0
        - "'already exists' not in authentik_db_creds_result.stderr"
      no_log: true
      when: bootstrap_node | default(false)

    - name: Write Authentik cnpg Cluster manifest
      ansible.builtin.copy:
        dest: /tmp/authentik-db-cluster.yml
        mode: '0600'
        content: |
          apiVersion: postgresql.cnpg.io/v1
          kind: Cluster
          metadata:
            name: authentik-db
            namespace: '{{ authentik_namespace }}'
          spec:
            instances: 1
            imageName: ghcr.io/cloudnative-pg/postgresql:17
            storage:
              storageClass: '{{ authentik_storage_class }}'
              size: '{{ authentik_db_storage_size }}'
            bootstrap:
              initdb:
                database: '{{ authentik_db_name }}'
                owner: '{{ authentik_db_username }}'
                secret:
                  name: authentik-db-credentials
      when: bootstrap_node | default(false)

    - name: Apply Authentik cnpg Cluster manifest
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/authentik-db-cluster.yml
      register: authentik_db_cluster_result
      changed_when: >-
        'created' in authentik_db_cluster_result.stdout or
        'configured' in authentik_db_cluster_result.stdout
      when: bootstrap_node | default(false)

    - name: Remove Authentik cnpg Cluster manifest temporary file
      ansible.builtin.file:
        path: /tmp/authentik-db-cluster.yml
        state: absent
      when: bootstrap_node | default(false)

    - name: Wait for Authentik cnpg Cluster to become healthy
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get cluster authentik-db -n {{ authentik_namespace }}
          -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: authentik_db_ready
      until: authentik_db_ready.stdout == 'True'
      retries: 30
      delay: 10
      changed_when: false
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Authentik Bootstrap Password Sourced From OpenBao via ESO
    # -------------------------------------------------------------------------
    # Generates a random bootstrap password on first install, writes it to
    # OpenBao at secret/authentik/bootstrap_password, applies an
    # ExternalSecret pointing at it, and waits for ESO to materialize the
    # K8s Secret 'authentik-eso-bootstrap'. The Authentik Helm values
    # consume that Secret via global.envFrom so the pods read
    # AUTHENTIK_BOOTSTRAP_PASSWORD from their environment at startup.
    #
    # Idempotency:
    #   The K8s Secret 'authentik-eso-bootstrap' is probed first. If it
    #   already exists, the entire OpenBao+ESO setup is skipped on this
    #   run — no keychain prompt, no bao writes, no ExternalSecret
    #   re-render. ESO continues syncing the value on its own
    #   refreshInterval. To rotate manually, run
    #   'just bao-shell; bao kv put secret/authentik/bootstrap_password
    #   value=<new>; exit'; ESO will pick up the change within the
    #   refreshInterval and Reloader (when installed) will roll the pods.
    #
    # Pre-conditions: cluster/secrets.yml must have run first so OpenBao,
    # ESO, and the 'openbao' ClusterSecretStore are in place. README's
    # cluster install order reflects this dependency.
    # -------------------------------------------------------------------------
    - name: Probe whether authentik-eso-bootstrap K8s Secret already exists
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get secret authentik-eso-bootstrap
          -n {{ authentik_namespace }}
      register: authentik_bootstrap_secret_probe
      changed_when: false
      failed_when: false
      when: bootstrap_node | default(false)

    - name: Set fact authentik_bootstrap_secret_present
      ansible.builtin.set_fact:
        authentik_bootstrap_secret_present: "{{ authentik_bootstrap_secret_probe.rc == 0 }}"
      when: bootstrap_node | default(false)

    - name: Prompt for homelab macOS keychain password
      ansible.builtin.pause:
        prompt: |
          Enter the password for the homelab macOS keychain.
          (Needed to write the Authentik bootstrap password to OpenBao.)
        echo: false
      register: authentik_keychain_password_input
      delegate_to: localhost
      no_log: true
      when:
        - bootstrap_node | default(false)
        - not authentik_bootstrap_secret_present | default(false)

    - name: Generate random Authentik bootstrap password and store in OpenBao
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail

          KEYCHAIN='{{ homelab_keychain }}'
          KEYCHAIN_PWD='{{ authentik_keychain_password_input.user_input }}'

          security lock-keychain "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          unset KEYCHAIN_PWD

          BAO_TOKEN="$(security find-generic-password \
            -a root-token -s '{{ keychain_service }}' -w "$KEYCHAIN")"
          export BAO_TOKEN
          export BAO_ADDR='https://{{ openbao_hostname }}'
          export BAO_SKIP_VERIFY=true

          # Idempotent: only write a new password if the path is empty.
          # Re-running the playbook never rotates the password by accident.
          if ! bao kv get -format=json '{{ openbao_authentik_bootstrap_path }}' \
              >/dev/null 2>&1; then
            VALUE="$(openssl rand -base64 24)"
            bao kv put '{{ openbao_authentik_bootstrap_path }}' value="$VALUE" \
              >/dev/null
            unset VALUE
            echo "wrote {{ openbao_authentik_bootstrap_path }} (new)"
          else
            echo "{{ openbao_authentik_bootstrap_path }} already set; reusing"
          fi

          unset BAO_TOKEN
        executable: /bin/sh
      delegate_to: localhost
      become: false
      changed_when: true
      no_log: true
      when:
        - bootstrap_node | default(false)
        - not authentik_bootstrap_secret_present | default(false)

    - name: Write Authentik bootstrap ExternalSecret manifest
      ansible.builtin.template:
        src: externalsecret.yml.j2
        dest: /tmp/authentik-bootstrap-externalsecret.yml
        mode: '0644'
      vars:
        es_name: authentik-bootstrap
        es_namespace: '{{ authentik_namespace }}'
        es_target_secret_name: '{{ authentik_bootstrap_secret_name }}'
        es_data:
          - secret_key: AUTHENTIK_BOOTSTRAP_PASSWORD
            remote_key: '{{ openbao_authentik_bootstrap_path | regex_replace("^secret/", "") }}'
            remote_property: value
      when:
        - bootstrap_node | default(false)
        - not authentik_bootstrap_secret_present | default(false)

    - name: Apply Authentik bootstrap ExternalSecret
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/authentik-bootstrap-externalsecret.yml
      register: authentik_bootstrap_es_apply_result
      changed_when: >-
        'created' in authentik_bootstrap_es_apply_result.stdout or
        'configured' in authentik_bootstrap_es_apply_result.stdout
      when:
        - bootstrap_node | default(false)
        - not authentik_bootstrap_secret_present | default(false)

    - name: Clean up Authentik bootstrap ExternalSecret manifest
      ansible.builtin.file:
        path: /tmp/authentik-bootstrap-externalsecret.yml
        state: absent
      when:
        - bootstrap_node | default(false)
        - not authentik_bootstrap_secret_present | default(false)

    - name: Wait for ESO to materialize authentik-eso-bootstrap Secret
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get secret {{ authentik_bootstrap_secret_name }}
          -n {{ authentik_namespace }}
      register: authentik_bootstrap_secret_wait
      changed_when: false
      retries: 30
      delay: 2
      until: authentik_bootstrap_secret_wait.rc == 0
      when:
        - bootstrap_node | default(false)
        - not authentik_bootstrap_secret_present | default(false)

    # -------------------------------------------------------------------------
    # Authentik Installation
    # -------------------------------------------------------------------------
    # Installs Authentik via the official goauthentik Helm chart. PostgreSQL
    # is supplied by the CloudNativePG cluster created above; the chart's
    # bundled postgresql subchart is disabled in authentik-values.yml.j2.
    # The Redis subchart stays enabled for caching. Credentials reach the
    # chart via two paths: the authentik-credentials Kubernetes Secret
    # (secret_key, postgresql.password, bootstrap_token) and the
    # authentik-eso-bootstrap Secret materialized by ESO above
    # (AUTHENTIK_BOOTSTRAP_PASSWORD). The values file is rendered from
    # those Secrets and removed after the helm upgrade completes.
    # -------------------------------------------------------------------------
    - name: Add Authentik Helm repository
      ansible.builtin.command:
        cmd: helm repo add authentik https://charts.goauthentik.io
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Update Helm repositories
      ansible.builtin.command:
        cmd: helm repo update
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Write Authentik values file
      ansible.builtin.template:
        src: authentik-values.yml.j2
        dest: /tmp/authentik-values.yml
        mode: '0600'
      when: bootstrap_node | default(false)

    - name: Install or upgrade Authentik via Helm
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install authentik authentik/authentik
          --namespace {{ authentik_namespace }}
          --kubeconfig {{ kubectl_config_path }}
          --values /tmp/authentik-values.yml
          --version {{ authentik_chart_version }}
      changed_when: true
      when: bootstrap_node | default(false)

    - name: Clean up Authentik values file
      ansible.builtin.file:
        path: /tmp/authentik-values.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Authentik API Configuration
    # Configures Authentik via its REST API using the bootstrap token. Creates
    # a single domain-level Forward Auth proxy provider covering the entire DNS
    # zone (*.{{ dns_zone }}). With domain-level mode, one provider and one
    # outpost configuration protect all services — no per-service Authentik
    # changes are needed when new services are added.
    #
    # The provider is linked to an application and assigned to the embedded
    # outpost. All tasks are idempotent: existing resources are detected before
    # creation and the outpost is only patched if the provider is not already
    # assigned.
    #
    # API calls are made directly to the Authentik server ClusterIP, which is
    # reachable from cluster nodes via Cilium's eBPF kube-proxy replacement.
    # -------------------------------------------------------------------------
    - name: Wait for Authentik server deployment to be ready
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          rollout status deployment authentik-server
          -n {{ authentik_namespace }}
          --timeout=300s
      when: bootstrap_node | default(false)
      changed_when: false

    - name: Get Authentik server ClusterIP
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get svc authentik-server -n {{ authentik_namespace }}
          -o jsonpath='{.spec.clusterIP}'
      register: authentik_server_clusterip
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Set Authentik API base URL
      ansible.builtin.set_fact:
        authentik_api_url: "http://{{ authentik_server_clusterip.stdout }}/api/v3"
      when: bootstrap_node | default(false)

    - name: Get default authorization flow UUID
      ansible.builtin.uri:
        url: "{{ authentik_api_url }}/flows/instances/?slug=default-provider-authorization-implicit-consent" # noqa: yaml[line-length]
        headers:
          Authorization: "Bearer {{ authentik_bootstrap_token }}"
      register: auth_flow_result
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Set authorization flow UUID fact
      ansible.builtin.set_fact:
        authentik_auth_flow_uuid: "{{ auth_flow_result.json.results[0].pk }}"
      when: bootstrap_node | default(false)

    - name: Get default invalidation flow UUID
      ansible.builtin.uri:
        url: "{{ authentik_api_url }}/flows/instances/?slug=default-provider-invalidation-flow" # noqa: yaml[line-length]
        headers:
          Authorization: "Bearer {{ authentik_bootstrap_token }}"
      register: invalidation_flow_result
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Set invalidation flow UUID fact
      ansible.builtin.set_fact:
        authentik_invalidation_flow_uuid: "{{ invalidation_flow_result.json.results[0].pk }}"
      when: bootstrap_node | default(false)

    - name: Check if Forward Auth proxy provider already exists
      ansible.builtin.uri:
        url: "{{ authentik_api_url }}/providers/proxy/?name=homelab-forward-auth"
        headers:
          Authorization: "Bearer {{ authentik_bootstrap_token }}"
      register: existing_provider_result
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Create domain-level Forward Auth proxy provider
      ansible.builtin.uri:
        url: "{{ authentik_api_url }}/providers/proxy/"
        method: POST
        headers:
          Authorization: "Bearer {{ authentik_bootstrap_token }}"
        body_format: json
        body:
          name: homelab-forward-auth
          authorization_flow: "{{ authentik_auth_flow_uuid }}"
          invalidation_flow: "{{ authentik_invalidation_flow_uuid }}"
          mode: forward_domain
          external_host: "https://{{ authentik_hostname }}"
          cookie_domain: "{{ dns_zone }}"
        status_code: 201
      register: create_provider_result
      changed_when: true
      when:
        - bootstrap_node | default(false)
        - existing_provider_result.json.pagination.count == 0

    - name: Set proxy provider ID fact from existing provider
      ansible.builtin.set_fact:
        authentik_provider_id: "{{ existing_provider_result.json.results[0].pk }}"
      when:
        - bootstrap_node | default(false)
        - existing_provider_result.json.pagination.count > 0

    - name: Set proxy provider ID fact from newly created provider
      ansible.builtin.set_fact:
        authentik_provider_id: "{{ create_provider_result.json.pk }}"
      when:
        - bootstrap_node | default(false)
        - existing_provider_result.json.pagination.count == 0

    - name: Check if Forward Auth application already exists
      ansible.builtin.uri:
        url: "{{ authentik_api_url }}/core/applications/?slug=homelab-forward-auth"
        headers:
          Authorization: "Bearer {{ authentik_bootstrap_token }}"
      register: existing_app_result
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Create Authentik application for Forward Auth
      ansible.builtin.uri:
        url: "{{ authentik_api_url }}/core/applications/"
        method: POST
        headers:
          Authorization: "Bearer {{ authentik_bootstrap_token }}"
        body_format: json
        body:
          name: Homelab Forward Auth
          slug: homelab-forward-auth
          provider: "{{ authentik_provider_id }}"
        status_code: 201
      changed_when: true
      when:
        - bootstrap_node | default(false)
        - existing_app_result.json.pagination.count == 0

    - name: Get Authentik embedded outpost details
      ansible.builtin.uri:
        url: "{{ authentik_api_url }}/outposts/instances/?managed=goauthentik.io%2Foutposts%2Fembedded" # noqa: yaml[line-length]
        headers:
          Authorization: "Bearer {{ authentik_bootstrap_token }}"
      register: outpost_result
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Set outpost ID and current providers facts
      ansible.builtin.set_fact:
        authentik_outpost_id: "{{ outpost_result.json.results[0].pk }}"
        authentik_outpost_providers: "{{ outpost_result.json.results[0].providers }}"
      when: bootstrap_node | default(false)

    - name: Assign Forward Auth provider to embedded outpost
      ansible.builtin.uri:
        url: "{{ authentik_api_url }}/outposts/instances/{{ authentik_outpost_id }}/"
        method: PATCH
        headers:
          Authorization: "Bearer {{ authentik_bootstrap_token }}"
        body_format: json
        body:
          providers: "{{ (authentik_outpost_providers + [authentik_provider_id]) | unique }}"
          config:
            authentik_host: "https://{{ authentik_hostname }}"
            authentik_host_insecure: false
        status_code: 200
      changed_when: true
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # UI Exposure
    # Exposes the Authentik UI over HTTPS via an HTTPRoute attached to the
    # traefik-gateway. Authentik itself is not protected by ForwardAuth.
    # ExternalDNS will register the Authentik hostname in Bind9 once the
    # HTTPRoute is accepted by the Gateway.
    # -------------------------------------------------------------------------
    - name: Write Authentik HTTPRoute manifest
      ansible.builtin.template:
        src: httproute.yml.j2
        dest: /tmp/authentik-httproute.yml
        mode: "0644"
      vars:
        httproute_name: authentik
        httproute_namespace: "{{ authentik_namespace }}"
        httproute_hostname: "{{ authentik_hostname }}"
        httproute_backend_name: authentik-server
        httproute_backend_namespace: "{{ authentik_namespace }}"
        httproute_backend_port: 80
      when: bootstrap_node | default(false)

    - name: Apply Authentik HTTPRoute
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/authentik-httproute.yml
      register: authentik_httproute_result
      changed_when: >-
        'created' in authentik_httproute_result.stdout or
        'configured' in authentik_httproute_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up Authentik HTTPRoute manifest
      ansible.builtin.file:
        path: /tmp/authentik-httproute.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # OpenBao UI Exposure Behind ForwardAuth
    # -------------------------------------------------------------------------
    # cluster/secrets.yml installs OpenBao with the UI process enabled in
    # the pod and applies an HTTPRoute that surfaces only the API
    # (/v1/*) — leaving /ui/* unrouted on Traefik until Authentik exists.
    # This block, run after Authentik is fully installed, finishes the
    # exposure: it deploys the authentik-forward-auth Middleware in the
    # openbao namespace and applies a / -prefix HTTPRoute that gates
    # everything else (the UI) behind Authentik SSO.
    #
    # The result is a hostname (openbao.<dns_zone>) where:
    #   - /v1/*  is the API, no auth (token in Authorization header).
    #   - /ui/*  and bare /  go through Authentik first, then OpenBao's
    #            own login form (the UI presents a token/userpass/OIDC
    #            picker).
    #
    # Both rules share the openbao backend; longest-prefix matching means
    # /v1/* requests still hit the no-auth secrets.yml HTTPRoute and never
    # see ForwardAuth.
    # -------------------------------------------------------------------------
    - name: Write ForwardAuth Middleware manifest for openbao
      ansible.builtin.template:
        src: traefik-forward-auth-middleware.yml.j2
        dest: /tmp/traefik-forward-auth-middleware-openbao.yml
        mode: '0644'
      vars:
        middleware_namespace: openbao
      when: bootstrap_node | default(false)

    - name: Apply ForwardAuth Middleware in openbao namespace
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/traefik-forward-auth-middleware-openbao.yml
      register: openbao_middleware_result
      changed_when: >-
        'created' in openbao_middleware_result.stdout or
        'configured' in openbao_middleware_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up openbao ForwardAuth Middleware manifest
      ansible.builtin.file:
        path: /tmp/traefik-forward-auth-middleware-openbao.yml
        state: absent
      when: bootstrap_node | default(false)

    - name: Write OpenBao UI HTTPRoute manifest (/, ForwardAuth-gated)
      ansible.builtin.template:
        src: httproute.yml.j2
        dest: /tmp/openbao-ui-httproute.yml
        mode: '0644'
      vars:
        httproute_name: openbao-ui
        httproute_namespace: openbao
        httproute_hostname: 'openbao.{{ dns_zone }}'
        httproute_backend_name: openbao
        httproute_backend_namespace: openbao
        httproute_backend_port: 8200
        httproute_path_prefix: /
        with_forward_auth: true
      when: bootstrap_node | default(false)

    - name: Apply OpenBao UI HTTPRoute
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/openbao-ui-httproute.yml
      register: openbao_ui_httproute_result
      changed_when: >-
        'created' in openbao_ui_httproute_result.stdout or
        'configured' in openbao_ui_httproute_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up OpenBao UI HTTPRoute manifest
      ansible.builtin.file:
        path: /tmp/openbao-ui-httproute.yml
        state: absent
      when: bootstrap_node | default(false)
