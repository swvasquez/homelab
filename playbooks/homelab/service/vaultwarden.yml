---
# ==============================================================================
# Playbook: Deploy Vaultwarden via ArgoCD GitOps
# ==============================================================================
# This playbook configures and deploys Vaultwarden, a lightweight self-hosted
# Bitwarden-compatible password manager, to the Kubernetes cluster via ArgoCD
# GitOps using native Kubernetes manifests stored in the Gitea gitops
# repository.
#
# PostgreSQL is managed by the CloudNativePG operator using a cnpg Cluster
# resource provisioned in the vaultwarden namespace before ArgoCD first syncs
# the manifests.
#
# A Kubernetes NetworkPolicy restricts egress from the Vaultwarden app pod to
# intra-namespace traffic (PostgreSQL), kube-dns (UDP/TCP 53), the Authentik
# namespace, and the Traefik namespace (port 8443 only). The policy is scoped
# to the app pod only — cnpg database pods are left unrestricted so they can
# reach the Kubernetes API server as required by the cnpg operator. The
# CoreDNS hosts override that resolves authentik.homelab.internal to Traefik's
# ClusterIP is managed by playbooks/cluster/network.yml.
#
# Every Vaultwarden runtime credential is sourced from OpenBao via ESO and
# rolled into the running pod by Stakater Reloader. Three K8s Secrets are
# materialized in the vaultwarden namespace:
#
#   vaultwarden-credentials       admin-token
#   vaultwarden-db-credentials    username, password, url (CNPG-format
#                                 keys plus a templated DSN for the
#                                 Vaultwarden DATABASE_URL env var)
#   vaultwarden-oidc              SSO_CLIENT_ID, SSO_CLIENT_SECRET
#
# Each ExternalSecret references a path under secret/vaultwarden/* in
# OpenBao. Rotating any value is 'just bao-shell; bao kv put
# secret/vaultwarden/<name> value=<new>; exit'. ESO syncs within
# refreshInterval, the K8s Secret updates, and Reloader (annotated via
# reloader.stakater.com/auto on the Vaultwarden Deployment) rolls the
# pod so the new env arrives. For the DB password, the cnpg Cluster's
# managed.roles entry additionally runs ALTER USER on the postgres role
# so the database itself accepts the new value.
#
# An OAuth2/OIDC provider and application are created in Authentik via
# the REST API, enabling users to log in to the Vaultwarden web vault
# using their Authentik credentials. Authentik generates the client ID
# and client secret; the playbook writes those values into OpenBao on
# first install, then ESO materializes them into the vaultwarden-oidc
# Secret. New user registrations are disabled
# (SIGNUPS_ALLOWED=false): a Vaultwarden account must already exist for
# SSO to land in a vault — the first-time SSO auto-provision flow
# (SSO_SIGNUPS_MATCH_EMAIL / org-invite) is not configured here.
#
# Because Authentik also stores the OIDC client_secret (and client_id),
# ESO alone cannot keep the two sides aligned: ESO can pull values out of
# OpenBao but cannot push them into Authentik. A small CronJob
# ('vaultwarden-oidc-reconciler') deployed by this playbook closes that
# loop on a 5-minute schedule — see the OpenBao -> Authentik OIDC
# Reconciler section below and
# service/templates/openbao-authentik-oidc-reconciler.yml.j2.
#
# The cnpg Cluster's managed.roles entry binds the postgres user's
# password to the vaultwarden-db-credentials Secret; the matching
# ExternalSecret labels that Secret with 'cnpg.io/reload: "true"' so the
# CNPG operator's Secret-watch predicate fires and an ALTER USER runs on
# every rotation. Without that label CNPG silently ignores Secret data
# changes.
#
# Access to the web vault is additionally gated by Traefik ForwardAuth backed
# by Authentik, requiring an active Authentik session before the request
# reaches Vaultwarden. Note that native Bitwarden clients (desktop, mobile,
# browser extension) communicate with the Vaultwarden API and do not go through
# the browser ForwardAuth flow. To support native clients, remove the
# with_forward_auth flag from the Vaultwarden HTTPRoute task below or create a
# separate API-only HTTPRoute without the filter. The HTTPRoute and ForwardAuth
# Middleware are applied by this playbook itself in the Vaultwarden namespace.
#
# Run order:
#   1. cluster/secrets.yml (OpenBao, ESO, Reloader — required for every
#      ExternalSecret in this playbook to materialize)
#   2. cluster/authentication.yml (Authentik, Traefik, cert-manager)
#   3. cluster/git.yml
#   4. cluster/gitops.yml
#   5. service/vaultwarden.yml (this playbook)
#
# Input Variables:
#   bootstrap_node:               Boolean indicating if the host is the control
#                                 plane bootstrap node. Read from inventory.
#   vaultwarden_namespace:        Kubernetes namespace for Vaultwarden
#                                 (default: vaultwarden).
#   vaultwarden_image:            Container image for Vaultwarden
#                                 (default: vaultwarden/server).
#   vaultwarden_image_tag:        Container image tag for Vaultwarden
#                                 (default: 1.35.7).
#   vaultwarden_storage_size:     Storage size for the Vaultwarden data PVC
#                                 (default: 5Gi).
#   vaultwarden_storage_class:    Kubernetes StorageClass for the data and
#                                 database PVCs (default: longhorn).
#   vaultwarden_db_storage_size:  Storage size for the cnpg database PVC
#                                 (default: 5Gi).
#   vaultwarden_db_name:          PostgreSQL database name
#                                 (default: vaultwarden).
#   vaultwarden_db_username:      PostgreSQL username (default: vaultwarden).
#   vaultwarden_db_image:         Container image for the cnpg Cluster
#                                 (default: ghcr.io/cloudnative-pg/postgresql:17).
#   vaultwarden_gitops_path:      Path within the gitops repository where
#                                 Vaultwarden manifests are stored
#                                 (default: apps/vaultwarden).
#   authentik_namespace:          Kubernetes namespace where Authentik is
#                                 deployed (default: authentik).
#   kubectl_config_path:          Full path to the kubectl config file
#                                 (default: /home/<ansible_user>/.kube/config).
#   gitea_namespace:              Kubernetes namespace where Gitea is deployed
#                                 (default: gitea).
#   gitea_admin_username:         Username of the Gitea admin account used to
#                                 push to the gitops repository
#                                 (default: gitea_admin).
#   gitea_gitops_repo:            Name of the Gitea gitops repository
#                                 (default: gitops).
#   argocd_namespace:             Kubernetes namespace where ArgoCD is deployed
#                                 (default: argocd).
#   homelab_ca_cert:              PEM-encoded CA certificate for homelab TLS.
#                                 Read at runtime from the wildcard-tls Secret
#                                 in the kube-system namespace. Mounted into the
#                                 Vaultwarden pod so its TLS client (reqwest/
#                                 OpenSSL) trusts the self-signed wildcard cert
#                                 used by Authentik and other internal services.
#   traefik_namespace:            Kubernetes namespace where Traefik is deployed
#                                 (default: traefik). Used in the egress
#                                 NetworkPolicy to allow traffic to Traefik
#                                 pods for OIDC discovery proxying.
#   dns_zone:                     Internal DNS zone for homelab services.
#                                 Read from group_vars. Used to construct
#                                 the Authentik SSO authority URL.
#   nonroot_uid:                  Shared non-root UID/GID for the Vaultwarden pod
#                                 and container securityContext. Read from
#                                 group_vars (default: 65532).
#   openbao_hostname:             FQDN under which OpenBao is reachable from
#                                 the Ansible host. Used by 'bao kv put' to
#                                 seed credentials
#                                 (default: openbao.<dns_zone>).
#   homelab_keychain:             Filename of the dedicated macOS keychain
#                                 holding cluster master credentials. Read
#                                 from group_vars and derived from
#                                 keychain_prefix.
#   keychain_service:             'service' field used to look up the OpenBao
#                                 root token in the keychain (default:
#                                 openbao).
#   vaultwarden_admin_token_kv_path:
#                                 OpenBao KV path holding the Vaultwarden
#                                 admin token (default:
#                                 secret/vaultwarden/admin_token).
#   vaultwarden_db_password_kv_path:
#                                 OpenBao KV path holding the Postgres
#                                 password used by the cnpg Cluster's
#                                 managed.roles entry (default:
#                                 secret/vaultwarden/db_password).
#   vaultwarden_oidc_client_id_kv_path:
#                                 OpenBao KV path holding the Authentik OIDC
#                                 client_id (default:
#                                 secret/vaultwarden/oidc_client_id).
#   vaultwarden_oidc_client_secret_kv_path:
#                                 OpenBao KV path holding the Authentik OIDC
#                                 client_secret (default:
#                                 secret/vaultwarden/oidc_client_secret).
#   vaultwarden_oidc_reconciler_name:
#                                 Resource name prefix for the
#                                 OpenBao->Authentik reconciler ServiceAccount,
#                                 ConfigMap, and CronJob in the vaultwarden
#                                 namespace, plus the Role+RoleBinding the
#                                 reconciler uses to read the Authentik
#                                 bootstrap-token Secret (default:
#                                 vaultwarden-oidc-reconciler).
#   vaultwarden_oidc_reconciler_role:
#                                 OpenBao kubernetes auth-method role name
#                                 the reconciler logs in with. Bound to the
#                                 reconciler ServiceAccount and granted the
#                                 reconciler policy (default:
#                                 vaultwarden-oidc-reconciler).
#   vaultwarden_oidc_reconciler_policy:
#                                 OpenBao policy attached to the reconciler
#                                 role. Grants read on the OIDC client_id and
#                                 client_secret KV paths only — nothing else
#                                 in OpenBao is reachable from this role
#                                 (default: vaultwarden-oidc-reconciler).
#   vaultwarden_oidc_reconciler_schedule:
#                                 CronJob schedule expression for the
#                                 reconciler. Drift between an OpenBao 'bao
#                                 kv put' and Authentik resolves within one
#                                 tick (default: '*/5 * * * *').
#   vaultwarden_oidc_reconciler_fields:
#                                 List of dicts, each with keys
#                                 'openbao_path' (KV-v2 API path including
#                                 the '/data/' segment) and 'authentik_field'
#                                 (JSON field on the Authentik OAuth2
#                                 provider resource). The reconciler reads
#                                 each path on every tick and PATCHes
#                                 Authentik with everything that has drifted
#                                 in a single API call. Default reconciles
#                                 client_id and client_secret on the
#                                 vaultwarden-sso provider.

- name: Deploy Vaultwarden via ArgoCD GitOps
  hosts: homelab
  become: true
  become_exe: sudo.ws
  vars:
    vaultwarden_namespace: vaultwarden
    vaultwarden_hostname: 'vault.{{ dns_zone }}'
    vaultwarden_image: vaultwarden/server
    vaultwarden_image_tag: '1.35.7'
    vaultwarden_storage_size: '5Gi'
    vaultwarden_storage_class: longhorn
    vaultwarden_db_name: vaultwarden
    vaultwarden_db_username: vaultwarden
    vaultwarden_db_image: 'ghcr.io/cloudnative-pg/postgresql:17'
    vaultwarden_db_storage_size: '5Gi'
    vaultwarden_gitops_path: apps/vaultwarden
    kubectl_config_path: '/home/{{ ansible_user }}/.kube/config'
    authentik_namespace: authentik
    traefik_namespace: traefik
    gitea_namespace: gitea
    gitea_admin_username: gitea_admin
    gitea_gitops_repo: gitops
    argocd_namespace: argocd
    openbao_hostname: 'openbao.{{ dns_zone }}'
    homelab_keychain: '{{ keychain_prefix }}.keychain'
    keychain_service: openbao
    vaultwarden_admin_token_kv_path: secret/vaultwarden/admin_token
    vaultwarden_db_password_kv_path: secret/vaultwarden/db_password
    vaultwarden_oidc_client_id_kv_path: secret/vaultwarden/oidc_client_id
    vaultwarden_oidc_client_secret_kv_path: secret/vaultwarden/oidc_client_secret
    vaultwarden_oidc_reconciler_name: vaultwarden-oidc-reconciler
    vaultwarden_oidc_reconciler_role: vaultwarden-oidc-reconciler
    vaultwarden_oidc_reconciler_policy: vaultwarden-oidc-reconciler
    vaultwarden_oidc_reconciler_schedule: '*/5 * * * *'
    # Each entry maps an OpenBao KV-v2 path to a JSON field on Authentik's
    # vaultwarden-sso OAuth2 provider resource. The reconciler reconciles
    # every entry on each tick.
    vaultwarden_oidc_reconciler_fields:
      - openbao_path: >-
          {{ vaultwarden_oidc_client_id_kv_path | regex_replace("^secret/", "secret/data/") }}
        authentik_field: client_id
      - openbao_path: >-
          {{ vaultwarden_oidc_client_secret_kv_path | regex_replace("^secret/", "secret/data/") }}
        authentik_field: client_secret

  tasks:
    # -------------------------------------------------------------------------
    # Namespace
    # -------------------------------------------------------------------------
    # Creates the vaultwarden namespace before any other resources so that
    # Secrets can be stored there before ArgoCD first syncs the manifests.
    # -------------------------------------------------------------------------
    - name: Create Vaultwarden namespace
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          create namespace {{ vaultwarden_namespace }}
      register: vaultwarden_ns_result
      changed_when: "'created' in vaultwarden_ns_result.stdout"
      failed_when:
        - vaultwarden_ns_result.rc != 0
        - "'already exists' not in vaultwarden_ns_result.stderr"
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Default ServiceAccount Hardening
    # -------------------------------------------------------------------------
    # Disables the default ServiceAccount token automount in this namespace so
    # ad-hoc pods that don't name a ServiceAccount cannot read a usable API
    # bearer credential.
    # -------------------------------------------------------------------------
    - name: Disable default ServiceAccount token automount in Vaultwarden namespace
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          patch serviceaccount default
          -n {{ vaultwarden_namespace }}
          --type=merge
          -p '{"automountServiceAccountToken": false}'
      register: vaultwarden_sa_automount_result
      changed_when: "'patched' in vaultwarden_sa_automount_result.stdout"
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # ForwardAuth Middleware and HTTPRoute
    # -------------------------------------------------------------------------
    # Deploys the Traefik ForwardAuth Middleware in the Vaultwarden namespace
    # and exposes the Vaultwarden web vault over HTTPS via an HTTPRoute
    # attached to the traefik-gateway. Authentik gates browser access on top
    # of Vaultwarden's own login. Native Bitwarden clients (desktop, mobile,
    # browser extension) call the API directly and bypass the ForwardAuth
    # browser flow. Authentik must already be installed
    # (cluster/authentication.yml) for the gate to function.
    # -------------------------------------------------------------------------
    - name: Write ForwardAuth Middleware manifest for Vaultwarden
      ansible.builtin.template:
        src: ../cluster/templates/traefik-forward-auth-middleware.yml.j2
        dest: /tmp/traefik-forward-auth-middleware-vaultwarden.yml
        mode: '0644'
      vars:
        middleware_namespace: '{{ vaultwarden_namespace }}'
      when: bootstrap_node | default(false)

    - name: Apply ForwardAuth Middleware in Vaultwarden namespace
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/traefik-forward-auth-middleware-vaultwarden.yml
      register: vaultwarden_middleware_result
      changed_when: >-
        'created' in vaultwarden_middleware_result.stdout or
        'configured' in vaultwarden_middleware_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up Vaultwarden ForwardAuth Middleware manifest
      ansible.builtin.file:
        path: /tmp/traefik-forward-auth-middleware-vaultwarden.yml
        state: absent
      when: bootstrap_node | default(false)

    - name: Write Vaultwarden HTTPRoute manifest
      ansible.builtin.template:
        src: ../cluster/templates/httproute.yml.j2
        dest: /tmp/vaultwarden-httproute.yml
        mode: '0644'
      vars:
        httproute_name: vaultwarden
        httproute_namespace: '{{ vaultwarden_namespace }}'
        httproute_hostname: '{{ vaultwarden_hostname }}'
        httproute_backend_name: vaultwarden
        httproute_backend_namespace: '{{ vaultwarden_namespace }}'
        httproute_backend_port: 80
        with_forward_auth: true
      when: bootstrap_node | default(false)

    - name: Apply Vaultwarden HTTPRoute
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/vaultwarden-httproute.yml
      register: vaultwarden_httproute_result
      changed_when: >-
        'created' in vaultwarden_httproute_result.stdout or
        'configured' in vaultwarden_httproute_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up Vaultwarden HTTPRoute manifest
      ansible.builtin.file:
        path: /tmp/vaultwarden-httproute.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Credentials Sourced From OpenBao via ESO
    # -------------------------------------------------------------------------
    # Vaultwarden's runtime credentials live in OpenBao under
    # secret/vaultwarden/*. ESO materializes the values into Kubernetes
    # Secrets in the vaultwarden namespace; Reloader (cluster/secrets.yml)
    # rolls the Vaultwarden Deployment whenever those Secrets change so
    # rotation is end-to-end with a single 'bao kv put'. The DB password
    # is additionally bound to a CNPG managed.roles entry on the
    # vaultwarden-db Cluster so the postgres user's stored hash also gets
    # ALTER USER'd on rotation (see the Database section below).
    #
    # Two K8s Secrets are produced here:
    #
    #   vaultwarden-credentials      keys: admin-token
    #     consumed by:               Vaultwarden Deployment env ADMIN_TOKEN
    #     OpenBao path:              secret/vaultwarden/admin_token
    #
    #   vaultwarden-db-credentials   keys: username, password, url
    #     consumed by:               CNPG Cluster (username, password)
    #                                Vaultwarden Deployment env DATABASE_URL
    #     OpenBao path:              secret/vaultwarden/db_password
    #     username:                  literal '{{ vaultwarden_db_username }}'
    #                                via ESO target.template
    #     url:                       'postgresql://<user>:<pw>@host/<db>'
    #                                via ESO target.template referencing
    #                                {{ .password }} from data[]
    #
    # Three states the seed shell block handles idempotently:
    #
    #   1. OpenBao path empty + K8s Secret missing  -> fresh install:
    #      generate random, write to OpenBao, ESO materializes Secret.
    #   2. OpenBao path empty + K8s Secret exists   -> migration from a
    #      pre-OpenBao install: read the existing kubectl-created K8s
    #      Secret value, write it verbatim to OpenBao, ExternalSecret
    #      adopts the Secret without changing its value.
    #   3. OpenBao path set                         -> normal re-run:
    #      no-op; ESO continues syncing on its refreshInterval.
    # -------------------------------------------------------------------------
    - name: Probe vaultwarden-credentials Secret for migration
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get secret vaultwarden-credentials -n {{ vaultwarden_namespace }}
          -o jsonpath={.data.admin-token}
      register: vaultwarden_existing_admin_token_b64
      changed_when: false
      failed_when: false
      no_log: true
      when: bootstrap_node | default(false)

    - name: Probe vaultwarden-db-credentials Secret for migration
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get secret vaultwarden-db-credentials -n {{ vaultwarden_namespace }}
          -o jsonpath={.data.password}
      register: vaultwarden_existing_db_password_b64
      changed_when: false
      failed_when: false
      no_log: true
      when: bootstrap_node | default(false)

    - name: Prompt for homelab macOS keychain password
      ansible.builtin.pause:
        prompt: |
          Enter the password for the homelab macOS keychain.
          (Needed to seed Vaultwarden credentials in OpenBao.)
        echo: false
      register: vaultwarden_keychain_password_input
      delegate_to: localhost
      no_log: true
      when: bootstrap_node | default(false)

    - name: Seed Vaultwarden credentials in OpenBao
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail

          KEYCHAIN='{{ homelab_keychain }}'
          KEYCHAIN_PWD='{{ vaultwarden_keychain_password_input.user_input }}'

          security lock-keychain "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          unset KEYCHAIN_PWD

          BAO_TOKEN="$(security find-generic-password \
            -a root-token -s '{{ keychain_service }}' -w "$KEYCHAIN")"
          export BAO_TOKEN
          export BAO_ADDR='https://{{ openbao_hostname }}'
          export BAO_SKIP_VERIFY=true

          # admin_token: write only if missing in OpenBao. Migration path
          # decodes the existing K8s Secret value if present.
          if ! bao kv get -format=json '{{ vaultwarden_admin_token_kv_path }}' \
              >/dev/null 2>&1; then
            EXISTING_B64='{{ vaultwarden_existing_admin_token_b64.stdout | default("") }}'
            if [ -n "$EXISTING_B64" ]; then
              VALUE="$(printf '%s' "$EXISTING_B64" | base64 -d)"
            else
              VALUE="$(openssl rand -base64 48)"
            fi
            bao kv put '{{ vaultwarden_admin_token_kv_path }}' value="$VALUE" >/dev/null
            unset VALUE EXISTING_B64
          fi

          # db_password: same pattern.
          if ! bao kv get -format=json '{{ vaultwarden_db_password_kv_path }}' \
              >/dev/null 2>&1; then
            EXISTING_B64='{{ vaultwarden_existing_db_password_b64.stdout | default("") }}'
            if [ -n "$EXISTING_B64" ]; then
              VALUE="$(printf '%s' "$EXISTING_B64" | base64 -d)"
            else
              VALUE="$(openssl rand -hex 32)"
            fi
            bao kv put '{{ vaultwarden_db_password_kv_path }}' value="$VALUE" >/dev/null
            unset VALUE EXISTING_B64
          fi

          unset BAO_TOKEN
        executable: /bin/sh
      delegate_to: localhost
      become: false
      changed_when: true
      no_log: true
      when: bootstrap_node | default(false)

    - name: Write vaultwarden-credentials ExternalSecret manifest
      ansible.builtin.template:
        src: ../cluster/templates/externalsecret.yml.j2
        dest: /tmp/vaultwarden-credentials-externalsecret.yml
        mode: '0644'
      vars:
        es_name: vaultwarden-credentials
        es_namespace: '{{ vaultwarden_namespace }}'
        es_target_secret_name: vaultwarden-credentials
        es_data:
          - secret_key: admin-token
            remote_key: '{{ vaultwarden_admin_token_kv_path | regex_replace("^secret/", "") }}'
            remote_property: value
      when: bootstrap_node | default(false)

    - name: Apply vaultwarden-credentials ExternalSecret
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/vaultwarden-credentials-externalsecret.yml
      register: vaultwarden_credentials_es_result
      changed_when: >-
        'created' in vaultwarden_credentials_es_result.stdout or
        'configured' in vaultwarden_credentials_es_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up vaultwarden-credentials ExternalSecret manifest
      ansible.builtin.file:
        path: /tmp/vaultwarden-credentials-externalsecret.yml
        state: absent
      when: bootstrap_node | default(false)

    - name: Write vaultwarden-db-credentials ExternalSecret manifest
      ansible.builtin.template:
        src: ../cluster/templates/externalsecret.yml.j2
        dest: /tmp/vaultwarden-db-credentials-externalsecret.yml
        mode: '0644'
      vars:
        es_name: vaultwarden-db-credentials
        es_namespace: '{{ vaultwarden_namespace }}'
        es_target_secret_name: vaultwarden-db-credentials
        es_data:
          - secret_key: password
            remote_key: '{{ vaultwarden_db_password_kv_path | regex_replace("^secret/", "") }}'
            remote_property: value
        es_target_template:
          username: '{{ vaultwarden_db_username }}'
          password: '{% raw %}{{ .password }}{% endraw %}'
          url: >-
            postgresql://{{ vaultwarden_db_username }}:{% raw %}{{ .password }}{% endraw
            %}@vaultwarden-db-rw.{{ vaultwarden_namespace }}.svc:5432/{{ vaultwarden_db_name }}
        # Opt the materialized Secret into CloudNativePG's Secret-watch
        # predicate so that managed.roles reconciles + runs ALTER USER on
        # password rotation without manual intervention. Without this
        # label CNPG silently ignores Secret data changes.
        es_target_labels:
          cnpg.io/reload: 'true'
      when: bootstrap_node | default(false)

    - name: Apply vaultwarden-db-credentials ExternalSecret
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/vaultwarden-db-credentials-externalsecret.yml
      register: vaultwarden_db_credentials_es_result
      changed_when: >-
        'created' in vaultwarden_db_credentials_es_result.stdout or
        'configured' in vaultwarden_db_credentials_es_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up vaultwarden-db-credentials ExternalSecret manifest
      ansible.builtin.file:
        path: /tmp/vaultwarden-db-credentials-externalsecret.yml
        state: absent
      when: bootstrap_node | default(false)

    - name: Wait for vaultwarden-credentials Secret to be materialized by ESO
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get secret vaultwarden-credentials -n {{ vaultwarden_namespace }}
      register: vaultwarden_credentials_wait
      changed_when: false
      retries: 30
      delay: 2
      until: vaultwarden_credentials_wait.rc == 0
      when: bootstrap_node | default(false)

    - name: Wait for vaultwarden-db-credentials Secret to be materialized by ESO
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get secret vaultwarden-db-credentials -n {{ vaultwarden_namespace }}
          -o jsonpath={.data.url}
      register: vaultwarden_db_credentials_wait
      changed_when: false
      retries: 30
      delay: 2
      until: vaultwarden_db_credentials_wait.stdout | length > 0
      when: bootstrap_node | default(false)

    - name: Remove orphaned vaultwarden-db-url Secret (folded into vaultwarden-db-credentials)
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          delete secret vaultwarden-db-url -n {{ vaultwarden_namespace }}
          --ignore-not-found
      register: vaultwarden_db_url_delete_result
      changed_when: "'deleted' in vaultwarden_db_url_delete_result.stdout"
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Database
    # -------------------------------------------------------------------------
    # Provisions a CloudNativePG Cluster for Vaultwarden's PostgreSQL database.
    # The Cluster is provisioned before ArgoCD first syncs the manifests so
    # that the database is available when the Vaultwarden pod starts.
    # -------------------------------------------------------------------------
    - name: Write Vaultwarden cnpg Cluster manifest
      ansible.builtin.copy:
        dest: /tmp/vaultwarden-db-cluster.yml
        mode: '0600'
        content: |
          apiVersion: postgresql.cnpg.io/v1
          kind: Cluster
          metadata:
            name: vaultwarden-db
            namespace: '{{ vaultwarden_namespace }}'
          spec:
            instances: 1
            imageName: '{{ vaultwarden_db_image }}'
            storage:
              storageClass: '{{ vaultwarden_storage_class }}'
              size: '{{ vaultwarden_db_storage_size }}'
            bootstrap:
              initdb:
                database: '{{ vaultwarden_db_name }}'
                owner: '{{ vaultwarden_db_username }}'
                secret:
                  name: vaultwarden-db-credentials
            # managed.roles tells the cnpg operator to keep the named
            # postgres role in sync with the referenced Secret. When ESO
            # rewrites vaultwarden-db-credentials.password (e.g. after a
            # 'bao kv put secret/vaultwarden/db_password value=<new>'),
            # the operator runs ALTER USER vaultwarden WITH PASSWORD ... so
            # the database itself accepts the new value. Pair with the
            # reloader.stakater.com/auto annotation on the Vaultwarden
            # Deployment for end-to-end rotation.
            managed:
              roles:
                - name: '{{ vaultwarden_db_username }}'
                  ensure: present
                  login: true
                  passwordSecret:
                    name: vaultwarden-db-credentials
      when: bootstrap_node | default(false)

    - name: Apply Vaultwarden cnpg Cluster manifest
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/vaultwarden-db-cluster.yml
      register: vaultwarden_db_cluster_result
      changed_when: >-
        'created' in vaultwarden_db_cluster_result.stdout or
        'configured' in vaultwarden_db_cluster_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up Vaultwarden cnpg Cluster manifest
      ansible.builtin.file:
        path: /tmp/vaultwarden-db-cluster.yml
        state: absent
      when: bootstrap_node | default(false)

    - name: Wait for Vaultwarden cnpg Cluster to become healthy
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get cluster vaultwarden-db -n {{ vaultwarden_namespace }}
          -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: vaultwarden_db_ready
      until: vaultwarden_db_ready.stdout == 'True'
      retries: 30
      delay: 10
      changed_when: false
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Authentik OIDC Configuration
    # -------------------------------------------------------------------------
    # Creates an OAuth2/OIDC provider and application in Authentik for
    # Vaultwarden SSO. The provider is configured as a confidential client with
    # the Vaultwarden web vault redirect URI and the openid, email, and profile
    # scopes. The Authentik-generated client ID and client secret are stored in
    # the vaultwarden-oidc Kubernetes Secret so that the Deployment can load
    # them via secretKeyRef without committing credentials to the gitops
    # repository.
    #
    # All tasks are idempotent: the OIDC provider and application are created
    # only if they do not already exist. The vaultwarden-oidc Secret is created
    # only if it does not already exist, preserving credentials across
    # subsequent playbook runs.
    #
    # API calls are made directly to the Authentik server ClusterIP, which is
    # reachable from cluster nodes via Cilium's eBPF kube-proxy replacement.
    # -------------------------------------------------------------------------
    - name: Read Authentik bootstrap token from Kubernetes Secret
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get secret authentik-credentials -n {{ authentik_namespace }}
          -o jsonpath='{.data.bootstrap-token}'
      register: authentik_bootstrap_token_b64
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Set Authentik bootstrap token fact
      ansible.builtin.set_fact:
        authentik_bootstrap_token: '{{ authentik_bootstrap_token_b64.stdout | b64decode }}'
      no_log: true
      when: bootstrap_node | default(false)

    - name: Get Authentik server ClusterIP
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get svc authentik-server -n {{ authentik_namespace }}
          -o jsonpath='{.spec.clusterIP}'
      register: authentik_server_clusterip
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Set Authentik API base URL
      ansible.builtin.set_fact:
        authentik_api_url: 'http://{{ authentik_server_clusterip.stdout }}/api/v3'
      when: bootstrap_node | default(false)

    - name: Get default authorization flow UUID
      ansible.builtin.uri:
        url: >-
          {{ authentik_api_url }}/flows/instances/?slug=default-provider-authorization-implicit-consent
        headers:
          Authorization: 'Bearer {{ authentik_bootstrap_token }}'
      register: vaultwarden_auth_flow_result
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Set authorization flow UUID fact
      ansible.builtin.set_fact:
        vaultwarden_auth_flow_uuid: '{{ vaultwarden_auth_flow_result.json.results[0].pk }}'
      when: bootstrap_node | default(false)

    - name: Get default invalidation flow UUID
      ansible.builtin.uri:
        url: '{{ authentik_api_url }}/flows/instances/?slug=default-provider-invalidation-flow'
        headers:
          Authorization: 'Bearer {{ authentik_bootstrap_token }}'
      register: vaultwarden_invalidation_flow_result
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Set invalidation flow UUID fact
      ansible.builtin.set_fact:
        vaultwarden_invalidation_flow_uuid: >-
          {{ vaultwarden_invalidation_flow_result.json.results[0].pk }}
      when: bootstrap_node | default(false)

    - name: Get JWT signing key UUID
      ansible.builtin.uri:
        url: '{{ authentik_api_url }}/crypto/certificatekeypairs/?has_key=true'
        headers:
          Authorization: 'Bearer {{ authentik_bootstrap_token }}'
      register: vaultwarden_signing_key_result
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Set signing key UUID fact
      ansible.builtin.set_fact:
        vaultwarden_signing_key_uuid: '{{ vaultwarden_signing_key_result.json.results[0].pk }}'
      when: bootstrap_node | default(false)

    - name: Get openid scope property mapping UUID
      ansible.builtin.uri:
        url: >-
          {{ authentik_api_url }}/propertymappings/provider/scope/?managed=goauthentik.io%2Fproviders%2Foauth2%2Fscope-openid
        headers:
          Authorization: 'Bearer {{ authentik_bootstrap_token }}'
      register: vaultwarden_scope_openid_result
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Check if custom email scope property mapping already exists
      ansible.builtin.uri:
        url: '{{ authentik_api_url }}/propertymappings/provider/scope/?name=vaultwarden+email+scope'
        headers:
          Authorization: 'Bearer {{ authentik_bootstrap_token }}'
      register: vaultwarden_scope_email_check
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Create custom email scope property mapping with email_verified true
      ansible.builtin.uri:
        url: '{{ authentik_api_url }}/propertymappings/provider/scope/'
        method: POST
        headers:
          Authorization: 'Bearer {{ authentik_bootstrap_token }}'
        body_format: json
        body:
          name: 'vaultwarden email scope'
          scope_name: email
          expression: "return {\n    \"email\": request.user.email,\n    \"email_verified\": True\n}"
        status_code: 201
      register: vaultwarden_scope_email_create_result
      changed_when: true
      when:
        - bootstrap_node | default(false)
        - vaultwarden_scope_email_check.json.pagination.count == 0

    - name: Set email scope property mapping UUID fact
      ansible.builtin.set_fact:
        vaultwarden_scope_email_uuid: >-
          {{
            vaultwarden_scope_email_check.json.results[0].pk
            if vaultwarden_scope_email_check.json.pagination.count > 0
            else vaultwarden_scope_email_create_result.json.pk
          }}
      when: bootstrap_node | default(false)

    - name: Get profile scope property mapping UUID
      ansible.builtin.uri:
        url: >-
          {{ authentik_api_url }}/propertymappings/provider/scope/?managed=goauthentik.io%2Fproviders%2Foauth2%2Fscope-profile
        headers:
          Authorization: 'Bearer {{ authentik_bootstrap_token }}'
      register: vaultwarden_scope_profile_result
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Set scope property mapping UUID facts
      ansible.builtin.set_fact:
        vaultwarden_scope_uuids:
          - '{{ vaultwarden_scope_openid_result.json.results[0].pk }}'
          - '{{ vaultwarden_scope_email_uuid }}'
          - '{{ vaultwarden_scope_profile_result.json.results[0].pk }}'
      when: bootstrap_node | default(false)

    - name: Check if Vaultwarden OIDC provider already exists in Authentik
      ansible.builtin.uri:
        url: '{{ authentik_api_url }}/providers/oauth2/?name=vaultwarden-sso'
        headers:
          Authorization: 'Bearer {{ authentik_bootstrap_token }}'
      register: vaultwarden_provider_check
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Create Vaultwarden OAuth2/OIDC provider in Authentik
      ansible.builtin.uri:
        url: '{{ authentik_api_url }}/providers/oauth2/'
        method: POST
        headers:
          Authorization: 'Bearer {{ authentik_bootstrap_token }}'
        body_format: json
        body:
          name: vaultwarden-sso
          authorization_flow: '{{ vaultwarden_auth_flow_uuid }}'
          invalidation_flow: '{{ vaultwarden_invalidation_flow_uuid }}'
          client_type: confidential
          redirect_uris:
            - matching_mode: strict
              url: 'https://vault.{{ dns_zone }}/identity/connect/oidc-signin'
          signing_key: '{{ vaultwarden_signing_key_uuid }}'
          sub_mode: user_id
          property_mappings: '{{ vaultwarden_scope_uuids }}'
          include_claims_in_id_token: true
        status_code: 201
      register: vaultwarden_provider_create_result
      changed_when: true
      when:
        - bootstrap_node | default(false)
        - vaultwarden_provider_check.json.pagination.count == 0

    - name: Set OIDC provider facts from existing provider
      ansible.builtin.set_fact:
        vaultwarden_provider_id: '{{ vaultwarden_provider_check.json.results[0].pk }}'
        vaultwarden_oidc_client_id: '{{ vaultwarden_provider_check.json.results[0].client_id }}'
        vaultwarden_oidc_client_secret: >-
          {{ vaultwarden_provider_check.json.results[0].client_secret }}
      no_log: true
      when:
        - bootstrap_node | default(false)
        - vaultwarden_provider_check.json.pagination.count > 0

    - name: Set OIDC provider facts from newly created provider
      ansible.builtin.set_fact:
        vaultwarden_provider_id: '{{ vaultwarden_provider_create_result.json.pk }}'
        vaultwarden_oidc_client_id: '{{ vaultwarden_provider_create_result.json.client_id }}'
        vaultwarden_oidc_client_secret: >-
          {{ vaultwarden_provider_create_result.json.client_secret }}
      no_log: true
      when:
        - bootstrap_node | default(false)
        - vaultwarden_provider_check.json.pagination.count == 0

    - name: Check if Vaultwarden application already exists in Authentik
      ansible.builtin.uri:
        url: '{{ authentik_api_url }}/core/applications/vaultwarden-sso/'
        headers:
          Authorization: 'Bearer {{ authentik_bootstrap_token }}'
        status_code: [200, 404]
      register: vaultwarden_app_check
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Create Authentik application for Vaultwarden SSO
      ansible.builtin.uri:
        url: '{{ authentik_api_url }}/core/applications/'
        method: POST
        headers:
          Authorization: 'Bearer {{ authentik_bootstrap_token }}'
        body_format: json
        body:
          name: Vaultwarden
          slug: vaultwarden-sso
          provider: '{{ vaultwarden_provider_id }}'
        status_code: 201
      changed_when: true
      when:
        - bootstrap_node | default(false)
        - vaultwarden_app_check.status == 404

    - name: Ensure Authentik application is linked to the OIDC provider
      ansible.builtin.uri:
        url: '{{ authentik_api_url }}/core/applications/vaultwarden-sso/'
        method: PATCH
        headers:
          Authorization: 'Bearer {{ authentik_bootstrap_token }}'
        body_format: json
        body:
          provider: '{{ vaultwarden_provider_id }}'
        status_code: 200
      register: vaultwarden_app_link_result
      changed_when: >-
        vaultwarden_app_link_result.json.provider | string != vaultwarden_provider_id | string
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # OIDC Credentials Sourced From OpenBao via ESO
    # -------------------------------------------------------------------------
    # Authentik generates the OIDC client_id and client_secret when the
    # provider is created above. This block writes those values to OpenBao
    # under secret/vaultwarden/oidc_client_{id,secret}, applies an
    # ExternalSecret pointing at them, and waits for ESO to materialize
    # the vaultwarden-oidc K8s Secret. Reloader rolls Vaultwarden when the
    # Secret changes, so rotating the OIDC client_secret is:
    #
    #   1. In Authentik UI/API: regenerate the client_secret on the
    #      vaultwarden-sso provider and copy the new value.
    #   2. Locally: 'just bao-shell; bao kv put
    #      secret/vaultwarden/oidc_client_secret value=<new>; exit'.
    #   3. ESO syncs within refreshInterval; Reloader rolls Vaultwarden.
    #
    # Migration from a pre-OpenBao install: if the vaultwarden-oidc Secret
    # already exists, its current values are read and seeded into OpenBao
    # before the ExternalSecret takes ownership.
    # -------------------------------------------------------------------------
    - name: Probe vaultwarden-oidc Secret for migration
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get secret vaultwarden-oidc -n {{ vaultwarden_namespace }}
          -o jsonpath={.data.SSO_CLIENT_ID}
      register: vaultwarden_existing_oidc_client_id_b64
      changed_when: false
      failed_when: false
      no_log: true
      when: bootstrap_node | default(false)

    - name: Seed Vaultwarden OIDC credentials in OpenBao
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail

          KEYCHAIN='{{ homelab_keychain }}'
          KEYCHAIN_PWD='{{ vaultwarden_keychain_password_input.user_input }}'

          # The keychain may have re-locked since the earlier seed step
          # (idle timeout very short, etc.). Lock-then-unlock so the
          # password is validated and the keychain is open.
          security lock-keychain "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          unset KEYCHAIN_PWD

          BAO_TOKEN="$(security find-generic-password \
            -a root-token -s '{{ keychain_service }}' -w "$KEYCHAIN")"
          export BAO_TOKEN
          export BAO_ADDR='https://{{ openbao_hostname }}'
          export BAO_SKIP_VERIFY=true

          # client_id: write only if missing in OpenBao. We always have a
          # candidate value from the Authentik provider create/lookup
          # above (vaultwarden_oidc_client_id), so the migration path and
          # fresh-install path collapse to the same write.
          if ! bao kv get -format=json '{{ vaultwarden_oidc_client_id_kv_path }}' \
              >/dev/null 2>&1; then
            bao kv put '{{ vaultwarden_oidc_client_id_kv_path }}' \
              value='{{ vaultwarden_oidc_client_id }}' >/dev/null
          fi

          if ! bao kv get -format=json '{{ vaultwarden_oidc_client_secret_kv_path }}' \
              >/dev/null 2>&1; then
            bao kv put '{{ vaultwarden_oidc_client_secret_kv_path }}' \
              value='{{ vaultwarden_oidc_client_secret }}' >/dev/null
          fi

          unset BAO_TOKEN
        executable: /bin/sh
      delegate_to: localhost
      become: false
      changed_when: true
      no_log: true
      when: bootstrap_node | default(false)

    - name: Write vaultwarden-oidc ExternalSecret manifest
      ansible.builtin.template:
        src: ../cluster/templates/externalsecret.yml.j2
        dest: /tmp/vaultwarden-oidc-externalsecret.yml
        mode: '0644'
      vars:
        es_name: vaultwarden-oidc
        es_namespace: '{{ vaultwarden_namespace }}'
        es_target_secret_name: vaultwarden-oidc
        es_data:
          - secret_key: SSO_CLIENT_ID
            remote_key: '{{ vaultwarden_oidc_client_id_kv_path | regex_replace("^secret/", "") }}'
            remote_property: value
          - secret_key: SSO_CLIENT_SECRET
            remote_key: '{{ vaultwarden_oidc_client_secret_kv_path | regex_replace("^secret/", "") }}'
            remote_property: value
      when: bootstrap_node | default(false)

    - name: Apply vaultwarden-oidc ExternalSecret
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/vaultwarden-oidc-externalsecret.yml
      register: vaultwarden_oidc_es_result
      changed_when: >-
        'created' in vaultwarden_oidc_es_result.stdout or
        'configured' in vaultwarden_oidc_es_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up vaultwarden-oidc ExternalSecret manifest
      ansible.builtin.file:
        path: /tmp/vaultwarden-oidc-externalsecret.yml
        state: absent
      when: bootstrap_node | default(false)

    - name: Wait for vaultwarden-oidc Secret to be materialized by ESO
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get secret vaultwarden-oidc -n {{ vaultwarden_namespace }}
      register: vaultwarden_oidc_wait
      changed_when: false
      retries: 30
      delay: 2
      until: vaultwarden_oidc_wait.rc == 0
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # OpenBao -> Authentik OIDC client_secret Reconciler
    # -------------------------------------------------------------------------
    # The OIDC client_secret is special among Vaultwarden's credentials
    # because Authentik also stores it (in its postgres DB) and the
    # Vaultwarden side and the Authentik side must match for OIDC to work.
    # ESO can pull values OUT of OpenBao but cannot push them INTO
    # Authentik, so by default a 'bao kv put secret/vaultwarden/
    # oidc_client_secret value=<new>' updates Vaultwarden's view but
    # leaves Authentik's stored secret stale, breaking SSO.
    #
    # This block deploys a CronJob that periodically reads the OpenBao
    # value, compares it to Authentik's current client_secret on the
    # vaultwarden-sso provider, and PATCHes Authentik when they differ.
    # End result: rotation by 'bao kv put' alone is sufficient — the
    # reconciler closes the loop within a few minutes.
    #
    # The OpenBao policy + auth role provisioned here grant the
    # reconciler SA read-only access to ONLY this one KV path. The Role +
    # RoleBinding emitted in the manifest template grant the reconciler
    # SA read access to ONLY the Authentik bootstrap-token Secret in the
    # authentik namespace. Both scopes are the minimum the reconciler
    # needs.
    #
    # The pattern (template + this OpenBao policy/role pair) is reusable
    # for any (OpenBao path, Authentik OAuth2 provider) tuple — see
    # service/templates/openbao-authentik-oidc-reconciler.yml.j2.
    # -------------------------------------------------------------------------
    - name: Configure OpenBao policy and auth role for the OIDC reconciler
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail

          KEYCHAIN='{{ homelab_keychain }}'
          KEYCHAIN_PWD='{{ vaultwarden_keychain_password_input.user_input }}'

          security lock-keychain "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          unset KEYCHAIN_PWD

          BAO_TOKEN="$(security find-generic-password \
            -a root-token -s '{{ keychain_service }}' -w "$KEYCHAIN")"
          export BAO_TOKEN
          export BAO_ADDR='https://{{ openbao_hostname }}'
          export BAO_SKIP_VERIFY=true

          bao policy write {{ vaultwarden_oidc_reconciler_policy }} - <<'POLICY' >/dev/null
          {% for field in vaultwarden_oidc_reconciler_fields %}{# noqa #}
          path "{{ field.openbao_path | trim }}" {
            capabilities = ["read"]
          }
          {% endfor %}{# noqa #}
          POLICY

          bao write auth/kubernetes/role/{{ vaultwarden_oidc_reconciler_role }} \
            bound_service_account_names={{ vaultwarden_oidc_reconciler_name }} \
            bound_service_account_namespaces={{ vaultwarden_namespace }} \
            policies={{ vaultwarden_oidc_reconciler_policy }} \
            ttl=10m >/dev/null

          unset BAO_TOKEN
        executable: /bin/sh
      delegate_to: localhost
      become: false
      changed_when: true
      no_log: true
      when: bootstrap_node | default(false)

    - name: Write OIDC reconciler manifest
      ansible.builtin.template:
        src: templates/openbao-authentik-oidc-reconciler.yml.j2
        dest: /tmp/vaultwarden-oidc-reconciler.yml
        mode: '0644'
      vars:
        reconciler_name: '{{ vaultwarden_oidc_reconciler_name }}'
        reconciler_namespace: '{{ vaultwarden_namespace }}'
        reconciler_schedule: '{{ vaultwarden_oidc_reconciler_schedule }}'
        openbao_kubernetes_role: '{{ vaultwarden_oidc_reconciler_role }}'
        reconciler_fields: '{{ vaultwarden_oidc_reconciler_fields }}'
        authentik_provider_name: vaultwarden-sso
      when: bootstrap_node | default(false)

    - name: Apply OIDC reconciler manifest
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/vaultwarden-oidc-reconciler.yml
      register: vaultwarden_oidc_reconciler_apply
      changed_when: >-
        'created' in vaultwarden_oidc_reconciler_apply.stdout or
        'configured' in vaultwarden_oidc_reconciler_apply.stdout
      when: bootstrap_node | default(false)

    - name: Clean up OIDC reconciler manifest
      ansible.builtin.file:
        path: /tmp/vaultwarden-oidc-reconciler.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Homelab CA Certificate
    # -------------------------------------------------------------------------
    # Reads the self-signed wildcard TLS certificate from the wildcard-tls
    # Secret in kube-system and stores it as a fact. The certificate is rendered
    # into a ConfigMap via the Jinja2 manifest template and mounted into the
    # Vaultwarden pod at /etc/ssl/certs/homelab-ca.crt. The SSL_CERT_FILE
    # environment variable points to this path so that Vaultwarden's TLS client
    # (reqwest/OpenSSL) trusts the certificate when connecting to Authentik for
    # OIDC discovery.
    # -------------------------------------------------------------------------
    - name: Read homelab CA certificate from wildcard-tls Secret
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get secret -n kube-system wildcard-tls
          -o jsonpath='{.data.tls\.crt}'
      register: homelab_ca_cert_b64
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Set homelab CA certificate fact
      ansible.builtin.set_fact:
        homelab_ca_cert: '{{ homelab_ca_cert_b64.stdout | b64decode }}'
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Network Policy
    # -------------------------------------------------------------------------
    # Applies an egress NetworkPolicy scoped to the Vaultwarden app pod only
    # (not the cnpg database pods). The cnpg database pods are intentionally
    # left unrestricted so they can reach the Kubernetes API server to manage
    # the cluster — a requirement of the cnpg operator that cannot be satisfied
    # with a simple ipBlock rule under Cilium due to DNAT evaluation order.
    #
    # The Vaultwarden app pod is restricted to four egress targets:
    # intra-namespace traffic (PostgreSQL via cnpg), kube-dns (UDP/TCP 53),
    # the Authentik namespace (direct service access), and the Traefik namespace
    # (required because authentik.homelab.internal resolves to Traefik's
    # ClusterIP via the CoreDNS override, which then proxies to Authentik).
    # All other external egress from the app pod is blocked.
    # -------------------------------------------------------------------------
    - name: Write Vaultwarden egress NetworkPolicy manifest
      ansible.builtin.copy:
        dest: /tmp/vaultwarden-netpol.yml
        mode: '0600'
        content: |
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: vaultwarden-egress-restrict
            namespace: '{{ vaultwarden_namespace }}'
          spec:
            podSelector:
              matchLabels:
                app.kubernetes.io/name: vaultwarden
            policyTypes:
              - Egress
            egress:
              - ports:
                  - port: 53
                    protocol: UDP
                  - port: 53
                    protocol: TCP
              - to:
                  - podSelector: {}
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: '{{ authentik_namespace }}'
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: '{{ traefik_namespace }}'
                ports:
                  - port: 8443
                    protocol: TCP
      when: bootstrap_node | default(false)

    - name: Apply Vaultwarden egress NetworkPolicy
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/vaultwarden-netpol.yml
      register: vaultwarden_netpol_result
      changed_when: >-
        'created' in vaultwarden_netpol_result.stdout or
        'configured' in vaultwarden_netpol_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up Vaultwarden egress NetworkPolicy manifest
      ansible.builtin.file:
        path: /tmp/vaultwarden-netpol.yml
        state: absent
      when: bootstrap_node | default(false)


    # -------------------------------------------------------------------------
    # GitOps - Manifest Management
    # -------------------------------------------------------------------------
    # Renders the Vaultwarden Kubernetes manifests from a Jinja2 template and
    # commits them to the Gitea gitops repository. ArgoCD watches this path and
    # automatically syncs the manifests to the cluster.
    # -------------------------------------------------------------------------
    - name: Ensure git is installed
      ansible.builtin.apt:
        name: git
        state: present
      when: bootstrap_node | default(false)

    - name: Get Gitea pod IP
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get pod -n {{ gitea_namespace }}
          -l app.kubernetes.io/name=gitea,app.kubernetes.io/instance=gitea
          -o jsonpath='{.items[0].status.podIP}'
      register: gitea_pod_ip
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Read Gitea admin password from Kubernetes Secret
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get secret gitea-credentials -n {{ gitea_namespace }}
          -o jsonpath='{.data.admin-password}'
      register: gitea_admin_password_b64
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Set Gitea admin password fact
      ansible.builtin.set_fact:
        gitea_admin_password: '{{ gitea_admin_password_b64.stdout | b64decode }}'
      no_log: true
      when: bootstrap_node | default(false)

    - name: Set Gitea authenticated repository URL fact
      ansible.builtin.set_fact:
        gitea_repo_url: >-
          http://{{ gitea_admin_username }}:{{ gitea_admin_password
          }}@{{ gitea_pod_ip.stdout }}:3000/{{ gitea_admin_username }}/{{ gitea_gitops_repo }}
      no_log: true
      when: bootstrap_node | default(false)

    - name: Clone or update gitops repository in temporary directory
      ansible.builtin.git:
        repo: '{{ gitea_repo_url }}'
        dest: /tmp/gitops-vaultwarden
        version: main
        update: true
      no_log: true
      when: bootstrap_node | default(false)

    - name: Create Vaultwarden directory in gitops repository
      ansible.builtin.file:
        path: '/tmp/gitops-vaultwarden/{{ vaultwarden_gitops_path }}'
        state: directory
        mode: '0755'
      when: bootstrap_node | default(false)

    - name: Write Vaultwarden manifests to gitops repository
      ansible.builtin.template:
        src: templates/vaultwarden-manifests.yml.j2
        dest: '/tmp/gitops-vaultwarden/{{ vaultwarden_gitops_path }}/manifests.yml'
        mode: '0644'
      when: bootstrap_node | default(false)

    - name: Configure git user email for commit  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: >-
          git -C /tmp/gitops-vaultwarden config user.email
          'ansible@{{ dns_zone }}'
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Configure git user name for commit  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git -C /tmp/gitops-vaultwarden config user.name Ansible
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Set gitops repository remote URL with credentials for push  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git -C /tmp/gitops-vaultwarden remote set-url origin {{ gitea_repo_url }}
      no_log: true
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Stage Vaultwarden manifests in gitops repository  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: >-
          git -C /tmp/gitops-vaultwarden add
          {{ vaultwarden_gitops_path }}/manifests.yml
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Check for staged changes in gitops repository  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git -C /tmp/gitops-vaultwarden diff --cached --exit-code
      register: gitops_diff_result
      changed_when: false
      failed_when: false
      when: bootstrap_node | default(false)

    - name: Commit Vaultwarden manifests to gitops repository  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: >-
          git -C /tmp/gitops-vaultwarden commit
          -m 'chore: update vaultwarden manifests'
      changed_when: true
      when:
        - bootstrap_node | default(false)
        - gitops_diff_result.rc != 0

    - name: Push Vaultwarden manifests commit to Gitea  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git -C /tmp/gitops-vaultwarden push origin main
      changed_when: true
      when:
        - bootstrap_node | default(false)
        - gitops_diff_result.rc != 0

    - name: Clean up gitops temporary directory
      ansible.builtin.file:
        path: /tmp/gitops-vaultwarden
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # ArgoCD Application
    # -------------------------------------------------------------------------
    # Applies the ArgoCD Application manifest that tracks the Gitea repository
    # path containing the Vaultwarden Kubernetes manifests. This initiates the
    # deployment of all Vaultwarden resources to the cluster.
    # -------------------------------------------------------------------------
    - name: Write ArgoCD Application manifest for Vaultwarden
      ansible.builtin.template:
        src: templates/vaultwarden-app.yml.j2
        dest: /tmp/vaultwarden-app.yml
        mode: '0600'
      when: bootstrap_node | default(false)

    - name: Apply ArgoCD Application manifest for Vaultwarden
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/vaultwarden-app.yml
      register: argocd_app_result
      changed_when: >-
        'configured' in argocd_app_result.stdout or
        'created' in argocd_app_result.stdout
      when: bootstrap_node | default(false)

    - name: Clean up ArgoCD Application manifest for Vaultwarden
      ansible.builtin.file:
        path: /tmp/vaultwarden-app.yml
        state: absent
      when: bootstrap_node | default(false)

    - name: Trigger ArgoCD hard refresh to detect new gitops commit
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          patch application vaultwarden -n {{ argocd_namespace }}
          --type merge
          -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}'
      changed_when: true
      when: bootstrap_node | default(false)

    - name: Wait for ArgoCD to sync and deploy Vaultwarden
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get application vaultwarden -n {{ argocd_namespace }}
          -o jsonpath='{.status.sync.status},{.status.health.status}'
      register: argocd_status
      until: argocd_status.stdout == 'Synced,Healthy'
      retries: 30
      delay: 10
      changed_when: false
      when: bootstrap_node | default(false)
