---
# ==============================================================================
# Playbook: Deploy Firefly III via ArgoCD GitOps
# ==============================================================================
# This playbook configures and deploys Firefly III, a self-hosted personal
# finance manager, to the Kubernetes cluster via ArgoCD GitOps. The Firefly III
# Helm chart is deployed by ArgoCD from the official firefly-iii/kubernetes
# repository, with per-environment configuration stored as a Helm values file
# in the Gitea gitops repository.
#
# PostgreSQL is managed by the CloudNativePG operator using a cnpg Cluster
# resource provisioned in the firefly-iii namespace before ArgoCD first syncs
# the Helm release. The bundled Bitnami postgresql subchart is disabled.
#
# A Kubernetes NetworkPolicy is applied to restrict egress from all pods in the
# firefly-iii namespace. Only intra-namespace traffic and kube-dns (UDP/TCP 53)
# are permitted. All external egress is blocked, including live currency
# exchange rate fetching. The Firefly III cron job will log an error for the
# exchange rate task but all other scheduled tasks will run normally. To
# re-enable exchange rate fetching, remove the NetworkPolicy or add an explicit
# egress rule for the upstream exchange rate endpoint.
#
# The Laravel APP_KEY, database password, and database credentials are generated
# on first run and stored in Kubernetes Secrets. The Helm values file references
# these Secrets so that credentials are never committed to the gitops repository.
#
# Firefly III uses its own built-in authentication (email and password). Access
# to the service is additionally gated by Traefik ForwardAuth backed by
# Authentik, requiring users to authenticate with Authentik before reaching the
# Firefly III login page. Run cluster/authentication.yml after this playbook to
# apply the HTTPRoute and ForwardAuth middleware.
#
# Run order:
#   1. cluster/authentication.yml (Authentik, Traefik, cert-manager)
#   2. services/gitea.yml
#   3. services/argocd.yml
#   4. services/firefly.yml (this playbook)
#   5. cluster/authentication.yml (re-run to apply HTTPRoute and ForwardAuth)
#
# Input Variables:
#   bootstrap_node:           Boolean indicating if the host is the control
#                             plane bootstrap node. Read from inventory.
#   dns_zone:                 DNS zone (e.g. homelab.internal). Read from
#                             group_vars.
#   firefly_namespace:        Kubernetes namespace for Firefly III
#                             (default: firefly-iii).
#   firefly_chart_version:    Helm chart version for Firefly III
#                             (default: 1.9.12).
#   firefly_storage_size:     Storage size for the Firefly III uploads PVC
#                             (default: 2Gi).
#   firefly_db_storage_size:  Storage size for the cnpg database PVC
#                             (default: 5Gi).
#   firefly_storage_class:    Kubernetes StorageClass for the uploads and
#                             database PVCs (default: longhorn).
#   firefly_db_name:          PostgreSQL database name (default: fireflyiii).
#   firefly_db_username:      PostgreSQL username (default: fireflyiii).
#   firefly_db_image:         Container image for the cnpg Cluster
#                             (default: ghcr.io/cloudnative-pg/postgresql:17).
#   firefly_gitops_path:      Path within the gitops repository where Firefly
#                             III values are stored (default: apps/firefly-iii).
#   kubectl_config_path:      Full path to the kubectl config file
#                             (default: /home/<ansible_user>/.kube/config).
#   gitea_namespace:          Kubernetes namespace where Gitea is deployed
#                             (default: gitea).
#   gitea_admin_username:     Username of the Gitea admin account used to push
#                             to the gitops repository (default: gitea_admin).
#   gitea_gitops_repo:        Name of the Gitea gitops repository
#                             (default: gitops).
#   argocd_namespace:         Kubernetes namespace where ArgoCD is deployed
#                             (default: argocd).

- name: Deploy Firefly III via ArgoCD GitOps
  hosts: homelab
  become: true
  become_exe: sudo.ws
  vars:
    firefly_namespace: firefly-iii
    firefly_chart_version: '1.9.12'
    firefly_storage_size: 2Gi
    firefly_db_storage_size: 5Gi
    firefly_storage_class: longhorn
    firefly_db_name: fireflyiii
    firefly_db_username: fireflyiii
    firefly_db_image: ghcr.io/cloudnative-pg/postgresql:17
    firefly_gitops_path: apps/firefly-iii
    kubectl_config_path: '/home/{{ ansible_user }}/.kube/config'
    gitea_namespace: gitea
    gitea_admin_username: gitea_admin
    gitea_gitops_repo: gitops
    argocd_namespace: argocd

  tasks:
    # -------------------------------------------------------------------------
    # Namespace
    # -------------------------------------------------------------------------
    # Creates the firefly-iii namespace before any other resources so that
    # Secrets can be stored there before ArgoCD first syncs the Helm release.
    # -------------------------------------------------------------------------
    - name: Create Firefly III namespace
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          create namespace {{ firefly_namespace }}
      register: firefly_ns_result
      changed_when: "'created' in firefly_ns_result.stdout"
      failed_when:
        - firefly_ns_result.rc != 0
        - "'already exists' not in firefly_ns_result.stderr"
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Credentials
    # -------------------------------------------------------------------------
    # Generates a Laravel APP_KEY and a database password on first run and
    # stores them in a Kubernetes Secret named firefly-credentials with keys
    # APP_KEY and DB_PASSWORD. These names match the env var names the chart
    # loads via config.existingSecret. A separate cnpg-formatted Secret
    # (firefly-db-credentials) is created for the CloudNativePG operator.
    # On subsequent runs the existing Secrets are reused so credentials remain
    # stable across upgrades.
    # -------------------------------------------------------------------------
    - name: Check if Firefly III credentials Secret exists
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get secret firefly-credentials -n {{ firefly_namespace }}
      register: firefly_secret_check
      changed_when: false
      failed_when: false
      when: bootstrap_node | default(false)

    - name: Generate Firefly III Laravel application key
      ansible.builtin.command:
        cmd: openssl rand -base64 32
      register: firefly_app_key_raw
      changed_when: false
      when:
        - bootstrap_node | default(false)
        - firefly_secret_check.rc != 0

    - name: Set Firefly III application key fact
      ansible.builtin.set_fact:
        firefly_app_key: 'base64:{{ firefly_app_key_raw.stdout }}'
      no_log: true
      when:
        - bootstrap_node | default(false)
        - firefly_secret_check.rc != 0

    - name: Generate Firefly III database password
      ansible.builtin.command:
        cmd: openssl rand -base64 24
      register: firefly_db_password_gen
      changed_when: false
      when:
        - bootstrap_node | default(false)
        - firefly_secret_check.rc != 0

    - name: Create Firefly III credentials Secret
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          create secret generic firefly-credentials
          -n {{ firefly_namespace }}
          --from-literal=APP_KEY={{ firefly_app_key }}
          --from-literal=DB_PASSWORD={{ firefly_db_password_gen.stdout }}
      register: firefly_secret_result
      changed_when: "'created' in firefly_secret_result.stdout"
      when:
        - bootstrap_node | default(false)
        - firefly_secret_check.rc != 0
      no_log: true

    - name: Read Firefly III database password from credentials Secret
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get secret firefly-credentials -n {{ firefly_namespace }}
          -o jsonpath='{.data.DB_PASSWORD}'
      register: firefly_db_password_b64
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Create Firefly III cnpg database credentials Secret
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          create secret generic firefly-db-credentials
          -n {{ firefly_namespace }}
          --from-literal=username={{ firefly_db_username }}
          --from-literal=password={{ firefly_db_password_b64.stdout | b64decode }}
      register: firefly_db_creds_result
      changed_when: "'created' in firefly_db_creds_result.stdout"
      failed_when:
        - firefly_db_creds_result.rc != 0
        - "'already exists' not in firefly_db_creds_result.stderr"
      when: bootstrap_node | default(false)
      no_log: true

    # -------------------------------------------------------------------------
    # Database
    # -------------------------------------------------------------------------
    # Provisions a CloudNativePG Cluster for Firefly III's PostgreSQL database.
    # The Cluster is provisioned before ArgoCD first syncs the Helm release so
    # that the database is available when the Firefly III pod starts. Standard
    # PostgreSQL 17 is used; Firefly III requires no additional extensions.
    # -------------------------------------------------------------------------
    - name: Write Firefly III cnpg Cluster manifest
      ansible.builtin.copy:
        dest: /tmp/firefly-db-cluster.yml
        mode: '0600'
        content: |
          apiVersion: postgresql.cnpg.io/v1
          kind: Cluster
          metadata:
            name: firefly-db
            namespace: '{{ firefly_namespace }}'
          spec:
            instances: 1
            imageName: '{{ firefly_db_image }}'
            storage:
              storageClass: '{{ firefly_storage_class }}'
              size: '{{ firefly_db_storage_size }}'
            bootstrap:
              initdb:
                database: '{{ firefly_db_name }}'
                owner: '{{ firefly_db_username }}'
                secret:
                  name: firefly-db-credentials
      when: bootstrap_node | default(false)

    - name: Apply Firefly III cnpg Cluster manifest
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/firefly-db-cluster.yml
      register: firefly_db_cluster_result
      changed_when: >-
        'created' in firefly_db_cluster_result.stdout or
        'configured' in firefly_db_cluster_result.stdout
      when: bootstrap_node | default(false)

    - name: Remove Firefly III cnpg Cluster manifest temporary file
      ansible.builtin.file:
        path: /tmp/firefly-db-cluster.yml
        state: absent
      when: bootstrap_node | default(false)

    - name: Wait for Firefly III cnpg Cluster to become healthy
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get cluster firefly-db -n {{ firefly_namespace }}
          -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: firefly_db_ready
      until: firefly_db_ready.stdout == 'True'
      retries: 30
      delay: 10
      changed_when: false
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # Network Policy
    # -------------------------------------------------------------------------
    # Applies an egress NetworkPolicy that restricts all pods in the firefly-iii
    # namespace to intra-namespace traffic and kube-dns only. This blocks all
    # external internet access, including live currency exchange rate fetching.
    # The cron job will log an error for the exchange rate task but all other
    # scheduled tasks will continue to run. To re-enable exchange rate fetching,
    # remove this NetworkPolicy or add an explicit egress rule for the upstream
    # exchange rate endpoint.
    # -------------------------------------------------------------------------
    - name: Write Firefly III egress NetworkPolicy manifest
      ansible.builtin.copy:
        dest: /tmp/firefly-netpol.yml
        mode: '0600'
        content: |
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: firefly-egress-restrict
            namespace: '{{ firefly_namespace }}'
          spec:
            podSelector: {}
            policyTypes:
              - Egress
            egress:
              - ports:
                  - port: 53
                    protocol: UDP
                  - port: 53
                    protocol: TCP
              - to:
                  - podSelector: {}
      when: bootstrap_node | default(false)

    - name: Apply Firefly III egress NetworkPolicy
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/firefly-netpol.yml
      register: firefly_netpol_result
      changed_when: >-
        'created' in firefly_netpol_result.stdout or
        'configured' in firefly_netpol_result.stdout
      when: bootstrap_node | default(false)

    - name: Remove Firefly III egress NetworkPolicy manifest temporary file
      ansible.builtin.file:
        path: /tmp/firefly-netpol.yml
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # GitOps - Helm Values Management
    # -------------------------------------------------------------------------
    # Renders the Firefly III Helm values from a Jinja2 template and commits
    # them to the Gitea gitops repository. ArgoCD watches this path and
    # automatically syncs the Helm release to the cluster.
    # -------------------------------------------------------------------------
    - name: Ensure git is installed
      ansible.builtin.apt:
        name: git
        state: present
      when: bootstrap_node | default(false)

    - name: Get Gitea pod IP
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get pod -n {{ gitea_namespace }}
          -l app.kubernetes.io/name=gitea,app.kubernetes.io/instance=gitea
          -o jsonpath='{.items[0].status.podIP}'
      register: gitea_pod_ip
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Read Gitea admin password from Kubernetes Secret
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get secret gitea-credentials -n {{ gitea_namespace }}
          -o jsonpath='{.data.admin-password}'
      register: gitea_admin_password_b64
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Set Gitea admin password fact
      ansible.builtin.set_fact:
        gitea_admin_password: '{{ gitea_admin_password_b64.stdout | b64decode }}'
      no_log: true
      when: bootstrap_node | default(false)

    - name: Clone or update gitops repository in temporary directory
      ansible.builtin.git:
        repo: >-
          http://{{ gitea_admin_username }}:{{ gitea_admin_password }}@{{ gitea_pod_ip.stdout }}:3000/{{ gitea_admin_username }}/{{ gitea_gitops_repo }}
        dest: /tmp/gitops-firefly
        version: main
        update: true
      no_log: true
      when: bootstrap_node | default(false)

    - name: Create Firefly III directory in gitops repository
      ansible.builtin.file:
        path: '/tmp/gitops-firefly/{{ firefly_gitops_path }}'
        state: directory
        mode: '0755'
      when: bootstrap_node | default(false)

    - name: Write Firefly III Helm values to gitops repository
      ansible.builtin.template:
        src: templates/firefly-values.yml.j2
        dest: '/tmp/gitops-firefly/{{ firefly_gitops_path }}/values.yml'
        mode: '0644'
      when: bootstrap_node | default(false)

    - name: Configure git user email for commit  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: >-
          git -C /tmp/gitops-firefly config user.email
          'ansible@{{ dns_zone }}'
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Configure git user name for commit  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git -C /tmp/gitops-firefly config user.name Ansible
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Set gitops repository remote URL with credentials for push  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: >-
          git -C /tmp/gitops-firefly remote set-url origin
          http://{{ gitea_admin_username }}:{{ gitea_admin_password }}@{{ gitea_pod_ip.stdout }}:3000/{{ gitea_admin_username }}/{{ gitea_gitops_repo }}
      no_log: true
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Stage Firefly III values in gitops repository  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: >-
          git -C /tmp/gitops-firefly add
          {{ firefly_gitops_path }}/values.yml
      changed_when: false
      when: bootstrap_node | default(false)

    - name: Check for staged changes in gitops repository  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git -C /tmp/gitops-firefly diff --cached --exit-code
      register: gitops_diff_result
      changed_when: false
      failed_when: false
      when: bootstrap_node | default(false)

    - name: Commit Firefly III values to gitops repository  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: >-
          git -C /tmp/gitops-firefly commit
          -m 'chore: update firefly-iii values'
      changed_when: true
      when:
        - bootstrap_node | default(false)
        - gitops_diff_result.rc != 0

    - name: Push Firefly III values commit to Gitea  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git -C /tmp/gitops-firefly push origin main
      changed_when: true
      when:
        - bootstrap_node | default(false)
        - gitops_diff_result.rc != 0

    - name: Remove gitops temporary directory
      ansible.builtin.file:
        path: /tmp/gitops-firefly
        state: absent
      when: bootstrap_node | default(false)

    # -------------------------------------------------------------------------
    # ArgoCD Application
    # -------------------------------------------------------------------------
    # Applies the ArgoCD Application manifest that tracks the Gitea repository
    # and the upstream Firefly III Helm chart. This initiates the deployment of
    # all Firefly III resources to the cluster.
    # -------------------------------------------------------------------------
    - name: Write ArgoCD Application manifest for Firefly III
      ansible.builtin.template:
        src: templates/firefly-app.yml.j2
        dest: /tmp/firefly-app.yml
        mode: '0600'
      when: bootstrap_node | default(false)

    - name: Apply ArgoCD Application manifest for Firefly III
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          apply -f /tmp/firefly-app.yml
      register: argocd_app_result
      changed_when: >-
        'configured' in argocd_app_result.stdout or
        'created' in argocd_app_result.stdout
      when: bootstrap_node | default(false)

    - name: Remove ArgoCD Application manifest temporary file
      ansible.builtin.file:
        path: /tmp/firefly-app.yml
        state: absent
      when: bootstrap_node | default(false)

    - name: Trigger ArgoCD hard refresh to detect new gitops commit
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          patch application firefly-iii -n {{ argocd_namespace }}
          --type merge
          -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}'
      changed_when: true
      when: bootstrap_node | default(false)

    - name: Wait for ArgoCD to sync and deploy Firefly III
      ansible.builtin.command:
        cmd: >-
          kubectl --kubeconfig={{ kubectl_config_path }}
          get application firefly-iii -n {{ argocd_namespace }}
          -o jsonpath='{.status.sync.status},{.status.health.status}'
      register: argocd_status
      until: argocd_status.stdout == 'Synced,Healthy'
      retries: 30
      delay: 10
      changed_when: false
      when: bootstrap_node | default(false)
