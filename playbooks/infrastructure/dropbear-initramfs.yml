---
# ==============================================================================
# Playbook: Configure Dropbear Initramfs
# ==============================================================================
# Configures remote unlocking of LUKS-encrypted drives using Dropbear SSH
# within the initramfs environment.
#
# This setup involves two parts:
#   1. On localhost: Generates a dedicated Dropbear SSH keypair.
#   2. On target hosts:
#      - Installs the 'dropbear-initramfs' package.
#      - Authorizes the generated public key for initramfs login.
#      - Configures Dropbear server options (port, command).
#      - Sets a static IP address for the initramfs environment.
#      - Rebuilds the initramfs to apply all changes.
#
# Variables (set in inventory.yml per host):
#   private_ip:        The static IP address assigned to this host in the
#                      initramfs environment (e.g., 192.168.1.100).
#   network_interface: The network interface name to configure in initramfs
#                      (e.g., eth0).
#
# Variables (set in group_vars/homelab.yml):
#   router_private_ip: The gateway IP address for the initramfs environment
#                      (e.g., 192.168.1.1).
#   dropbear_port:     The SSH port Dropbear will listen on in initramfs.
#                      Derived from ufw_allowed_ports.dropbear.port.

- name: Generate Dropbear SSH key on localhost
  hosts: localhost
  connection: local
  tasks:
    # -------------------------------------------------------------------------
    # Local Key Generation
    # Generates a dedicated ED25519 SSH keypair on the Ansible control machine.
    # The public key is authorized in the initramfs on each target host, and the
    # private key is used to connect and unlock the LUKS volume remotely.
    # -------------------------------------------------------------------------
    - name: Generate Dropbear ED25519 keypair locally
      ansible.builtin.command:
        cmd: "ssh-keygen -t ed25519 -f ~/.ssh/dropbear -N ''"
        creates: ~/.ssh/dropbear

- name: Install and configure Dropbear for initramfs
  hosts: homelab
  become: true
  become_exe: sudo.ws
  vars:
    dropbear_port: '{{ ufw_allowed_ports.dropbear.port }}'

  tasks:
    # -------------------------------------------------------------------------
    # Installation
    # Installs the dropbear-initramfs package, which embeds a minimal SSH server
    # into the initramfs so the host can be unlocked remotely before the root
    # filesystem mounts.
    # -------------------------------------------------------------------------
    - name: Install dropbear-initramfs package
      ansible.builtin.apt:
        name: dropbear-initramfs
        state: present
        update_cache: true

    # -------------------------------------------------------------------------
    # Configuration
    # Authorizes the locally generated public key, configures Dropbear server
    # options, and sets a static IP so the host is reachable during early boot.
    # The initramfs is then rebuilt to apply all changes.
    # -------------------------------------------------------------------------
    - name: Authorize Dropbear public key for initramfs
      ansible.builtin.lineinfile:
        path: /etc/dropbear/initramfs/authorized_keys
        line: "{{ lookup('file', '~/.ssh/dropbear.pub') }}"
        create: true
        mode: '0644'

    - name: Configure Dropbear server options for initramfs
      ansible.builtin.lineinfile:
        path: /etc/dropbear/initramfs/dropbear.conf
        line: 'DROPBEAR_OPTIONS="-I 180 -j -k -p {{ dropbear_port }} -s -c cryptroot-unlock"'
        state: present
        create: true
        mode: '0644'

    - name: Configure static IP for initramfs
      ansible.builtin.lineinfile:
        path: /etc/initramfs-tools/initramfs.conf
        regexp: '^IP='
        line: >-
          IP={{ private_ip }}::{{ router_private_ip }}:255.255.255.0:{{ ansible_host }}:{{ network_interface }}
        state: present
        create: true
        mode: '0644'

    - name: Rebuild initramfs to apply changes
      ansible.builtin.command:
        cmd: update-initramfs -u -k all
      register: update_initramfs_result
      changed_when: update_initramfs_result.stdout != ''
