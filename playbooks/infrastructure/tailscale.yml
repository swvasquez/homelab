---
# ==============================================================================
# Playbook: Install and Configure Tailscale
# ==============================================================================
# Installs and configures the Tailscale mesh VPN client.
#
# This playbook performs the following actions:
#   - Enables IP forwarding to allow the host to act as a subnet router or
#     exit node.
#   - Adds the official Tailscale GPG key and APT repository.
#   - Installs the Tailscale package.
#   - Attempts to connect the machine to the Tailscale network using
#     'tailscale up'.
#
# Note: The 'tailscale up' command may require interactive browser-based
# authentication. For a non-interactive setup, an auth key must be provided
# as a command-line argument.
#
# Variables:
#   tailscale_packages:  List of APT packages to install for Tailscale
#                        (default: [tailscale]).
#   tailscale_port:      UDP port the tailscaled daemon binds for WireGuard peer
#                        connections. Written to /etc/default/tailscaled as
#                        FLAGS="--port=<value>". Derived from
#                        ufw_allowed_ports.tailscale.port.

- name: Install and configure Tailscale
  hosts: homelab
  become: true
  become_exe: sudo.ws
  vars:
    tailscale_packages:
      - tailscale
    tailscale_port: '{{ ufw_allowed_ports.tailscale.port }}'

  tasks:
    # -------------------------------------------------------------------------
    # System Configuration
    # Enables IPv4 and IPv6 forwarding so this host can act as a Tailscale
    # subnet router or exit node.
    # -------------------------------------------------------------------------
    - name: Enable IP forwarding for subnet routing or exit node
      ansible.posix.sysctl:
        name: "{{ item }}"
        value: "1"
        state: present
        sysctl_set: true
        reload: true
      loop:
        - net.ipv4.ip_forward
        - net.ipv6.conf.all.forwarding

    # -------------------------------------------------------------------------
    # Repository Configuration
    # Adds Tailscale's official GPG key and APT repository so the package can
    # be installed and updated from the official Tailscale channel.
    # -------------------------------------------------------------------------
    - name: Check for Tailscale's official GPG key
      ansible.builtin.stat:
        path: /usr/share/keyrings/tailscale-archive-keyring.gpg
      register: tailscale_keyring_stat

    - name: Add Tailscale's official GPG key
      ansible.builtin.get_url:
        url: "https://pkgs.tailscale.com/stable/ubuntu/{{ ansible_distribution_release }}.noarmor.gpg"
        dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
        mode: "0644"
      when: not tailscale_keyring_stat.stat.exists

    - name: Add Tailscale APT repository
      ansible.builtin.apt_repository:
        repo: >
          deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg]
          https://pkgs.tailscale.com/stable/ubuntu
          {{ ansible_distribution_release }} main
        state: present
        filename: tailscale
        update_cache: true

    # -------------------------------------------------------------------------
    # Installation and Network Connection
    # Installs the Tailscale package and connects the host to the Tailscale
    # network. The 'tailscale up' step may require interactive authentication.
    # -------------------------------------------------------------------------
    - name: Install Tailscale package
      ansible.builtin.apt:
        name: "{{ tailscale_packages }}"
        state: present

    - name: Set Tailscale WireGuard listen port in daemon configuration
      ansible.builtin.lineinfile:
        path: /etc/default/tailscaled
        regexp: '^FLAGS='
        line: 'FLAGS="--port={{ tailscale_port }}"'
        create: true
        mode: '0644'
      notify: Restart tailscaled

    - name: Connect to Tailscale network
      ansible.builtin.command:
        cmd: tailscale up
      changed_when: false
      # This may require interactive authentication.
      # For non-interactive setup, pass '--authkey' and other flags.

  handlers:
    - name: Restart tailscaled
      ansible.builtin.service:
        name: tailscaled
        state: restarted
