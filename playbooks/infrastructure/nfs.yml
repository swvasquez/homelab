---
# ==============================================================================
# Playbook: Install and Configure NFS
# ==============================================================================
# Installs and configures an NFS server and client mount.
#
# This playbook performs the following actions:
#
#   Group play (all hosts):
#     - Creates the nfs_users group with a consistent GID across all nodes.
#     - Adds the ansible user to the nfs_users group.
#
#   Server play (host where nfs_server: true in inventory):
#     - Installs nfs-kernel-server.
#     - Mounts the LVM Logical Volume to the NFS export directory.
#     - Optionally creates and formats a new Logical Volume if nfs_create_lvm is true.
#     - Creates the export directory owned by root:nfs_users with mode 2775 (SGID).
#       The SGID bit ensures new files and subdirectories inherit the group of the parent
#       directory rather than the creating user's primary group, and subdirectories also
#       inherit the SGID bit — keeping group ownership consistent throughout the tree.
#     - Creates the Kubernetes NFS subdirectory (nfs_k8s_path) with the same
#       ownership and permissions, providing a dedicated area for Kubernetes
#       workload volumes separate from other NFS consumers.
#     - Explicitly enables NFSv3 and NFSv4 in /etc/nfs.conf.
#       Both versions are served simultaneously. Linux clients default to NFSv4;
#       macOS clients should mount with nfsvers=3 for better compatibility.
#     - Adds the export to /etc/exports.
#     - Starts and enables the NFS server service.
#
#   Client play (all hosts, including the NFS server node):
#     - Installs nfs-common.
#     - Creates the mount point directory.
#     - Mounts the NFS share and adds it to /etc/fstab for persistence.
#     - The server address is resolved dynamically from hostvars.
#     - On client nodes: mounts the NFS share via fstab with x-systemd.automount and
#       writes a drop-in ordering the automount after network-online.target.
#     - On the server node: deploys explicit .mount and .automount unit files instead
#       of fstab. fstab-generator incorrectly places automount units in local-fs.target
#       even when _netdev is set (systemd bugs #17657, #34164), creating a boot-time
#       dependency cycle that prevents nfs-server from starting. Explicit unit files
#       with DefaultDependencies=no and WantedBy=remote-fs.target bypass this entirely.
#     - Writes a systemd drop-in on all nodes to order kubelet.service after the NFS
#       mount unit. kubelet restores previously active NFS PersistentVolumes at startup
#       by mounting them directly; if the server is unreachable, kubelet hangs in
#       uninterruptible D state. Ordering after the NFS mount unit ensures the share is
#       actually mounted before kubelet attempts to re-attach volumes. If the NFS server
#       is unavailable, kubelet will not start.
#     - Masks nfs-blkmap.service on all nodes. It implements pNFS block layout support,
#       which requires the kernel pNFS interface to be initialized by an active NFS
#       session. With automount, no session exists at boot so nfs-blkmap hangs
#       indefinitely. pNFS block layouts are not used in this environment, so it is
#       masked consistently across all nodes.
#     - Writes a systemd drop-in on all nodes to ensure the automount unit starts
#       after network-online.target, preventing premature mount attempts before
#       the network is reachable.
#     - Writes a systemd drop-in on the server node to order rpc-statd-notify
#       after nfs-kernel-server.service, preventing it from notifying peers
#       before exports are ready.
#
# Inventory variables:
#   nfs_server:       Boolean, set to true on the node that should run the NFS server.
#
# Playbook variables:
#   nfs_group:        Group name for NFS access. Read from group_vars.
#   nfs_group_gid:    GID for the NFS group, must be consistent across nodes.
#                     Read from group_vars.
#   nfs_k8s_path:     Path for Kubernetes workload volumes on the NFS server.
#                     Read from group_vars.
#   nfs_export_path:  Directory to export from the server (e.g. /srv/nfs/data).
#   nfs_export_opts:  Export options (default: "*(rw,sync,no_subtree_check)").
#   nfs_mount_point:  Local directory to mount the NFS share on clients (e.g. /mnt/nfs).
#   nfs_mount_opts:   Mount options for clients. Defaults to a resilient set of options that
#                     prevent the client node from hanging at boot when the NFS server is unreachable
#                     and allow automatic reconnection once the server comes back up:
#
#                       _netdev
#                         Marks this as a network-dependent mount. systemd will defer the mount
#                         until after the network is online, preventing early-boot failures.
#
#                       nofail
#                         Allows boot to complete even if the mount cannot be established. Without
#                         this, a missing NFS server causes the boot sequence to stall indefinitely
#                         waiting for the mount to succeed.
#
#                       soft
#                         Instructs the kernel to return EIO to the calling process after the
#                         timeout expires, rather than retrying indefinitely. Prevents processes
#                         from hanging in uninterruptible D state if the NFS server is unreachable,
#                         allowing the node to boot in any order and recover automatically once
#                         the server comes up. Only unacknowledged in-flight writes at the moment
#                         of server failure are at risk — typically kilobytes representing a
#                         fraction of a second of writes.
#
#                       timeo=600
#                         Initial RPC timeout in tenths of a second (60 seconds) before returning
#                         EIO to the calling process under soft mount semantics.
#
#                       nfsvers=4
#                         Pins the mount to NFSv4, skipping version negotiation. The server
#                         is already configured to serve NFSv4 and all clients are Linux, so
#                         negotiation adds overhead without benefit.
#
#                       x-systemd.automount
#                         Creates a systemd automount unit instead of a plain mount unit. The share
#                         is not mounted at boot; instead it is mounted on first access. If the
#                         server was down at boot, the next access after the server recovers will
#                         trigger a fresh mount attempt automatically.
#
#                       x-systemd.mount-timeout=15
#                         Limits how long systemd waits for the mount process to complete before
#                         giving up and marking the unit as failed. Without this, systemd uses a
#                         90-second default. This applies both to the boot-time mount (which kubelet
#                         depends on) and to automount-triggered attempts at runtime.
#
#                         Note: Ubuntu 25.10 introduced a bug (LP: #2130843) where MOTD scripts
#                         (91-release-upgrade, 98-fsck-at-reboot) trigger automounts during SSH
#                         login via the rust-coreutils stat implementation. This timeout ensures
#                         any such accidental trigger fails fast rather than blocking login for
#                         the full 90-second default.
#
#   nfs_lvm_vg_name:  The name of the LVM Volume Group to use (required).
#   nfs_lvm_lv_name:  The name of the LVM Logical Volume to mount for the export (required).
#   nfs_create_lvm:   Boolean, whether to create and format a new LV (default: false).
#                     Set to false when the LV already exists and only needs to be mounted.
#   nfs_lvm_lv_size:  Size of the new Logical Volume, required when nfs_create_lvm is true (e.g., "50g").
#

# ------------------------------------------------------------------------------
# GROUP PLAY: NFS Users Group Configuration
# ------------------------------------------------------------------------------
- name: Create NFS user group on all nodes
  hosts: homelab
  become: true
  become_exe: sudo.ws
  tasks:
    - name: Create NFS group with consistent GID
      ansible.builtin.group:
        name: '{{ nfs_group }}'
        gid: '{{ nfs_group_gid }}'
        state: present

    - name: Add ansible user to NFS group
      ansible.builtin.user:
        name: '{{ ansible_user }}'
        groups: '{{ nfs_group }}'
        append: true

# ------------------------------------------------------------------------------
# SERVER PLAY: NFS Server Configuration
# ------------------------------------------------------------------------------
- name: Configure NFS server
  hosts: homelab
  become: true
  become_exe: sudo.ws
  vars:
    nfs_export_path: /srv/nfs/data
    nfs_export_opts: '*(rw,sync,no_subtree_check)'
    nfs_lvm_vg_name: ubuntu-vg
    nfs_lvm_lv_name: nfs_lv
    nfs_create_lvm: false
    nfs_lvm_lv_size: 50g
  tasks:
    - name: Install nfs-kernel-server
      ansible.builtin.apt:
        name: nfs-kernel-server
        state: present
        update_cache: true
      when: nfs_server | default(false)

    - name: Ensure LVM packages are installed
      ansible.builtin.apt:
        name: lvm2
        state: present
        update_cache: true
      when:
        - nfs_server | default(false)
        - nfs_create_lvm | default(false)

    - name: Check if Logical Volume already exists
      ansible.builtin.command:
        cmd: 'lvs /dev/{{ nfs_lvm_vg_name }}/{{ nfs_lvm_lv_name }}'
      register: lv_check
      failed_when: false
      changed_when: false
      when:
        - nfs_server | default(false)
        - nfs_create_lvm | default(false)

    - name: Assert enough unallocated space in Volume Group
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail &&
          vgs "{{ nfs_lvm_vg_name }}" -o vg_free --units g --noheadings --nosuffix |
          awk -v need="{{ nfs_lvm_lv_size | regex_replace('[^0-9.]', '') }}"
              '{ if ($1 < need) { print "Need "need"g, only "$1"g free in VG {{ nfs_lvm_vg_name }}"; exit 1 } }'
        executable: /bin/bash
      changed_when: false
      when:
        - nfs_server | default(false)
        - nfs_create_lvm | default(false)
        - lv_check.rc != 0

    - name: Create Logical Volume for NFS
      community.general.lvol:
        vg: '{{ nfs_lvm_vg_name }}'
        lv: '{{ nfs_lvm_lv_name }}'
        size: '{{ nfs_lvm_lv_size }}'
        state: present
      when:
        - nfs_server | default(false)
        - nfs_create_lvm | default(false)

    - name: Format the Logical Volume with ext4
      community.general.filesystem:
        fstype: ext4
        dev: '/dev/{{ nfs_lvm_vg_name }}/{{ nfs_lvm_lv_name }}'
      when:
        - nfs_server | default(false)
        - nfs_create_lvm | default(false)

    - name: Mount the Logical Volume to the NFS export directory
      ansible.posix.mount:
        path: '{{ nfs_export_path }}'
        src: '/dev/{{ nfs_lvm_vg_name }}/{{ nfs_lvm_lv_name }}'
        fstype: ext4
        opts: defaults
        state: mounted
      when: nfs_server | default(false)

    - name: Create NFS export directory
      ansible.builtin.file:
        path: '{{ nfs_export_path }}'
        state: directory
        owner: root
        group: '{{ nfs_group }}'
        mode: '2775'
      when: nfs_server | default(false)

    - name: Create Kubernetes NFS directory
      ansible.builtin.file:
        path: '{{ nfs_k8s_path }}'
        state: directory
        owner: root
        group: '{{ nfs_group }}'
        mode: '2775'
      when: nfs_server | default(false)

    - name: Enable NFSv3 in /etc/nfs.conf
      community.general.ini_file:
        path: /etc/nfs.conf
        section: nfsd
        option: vers3
        value: 'y'
        mode: '0644'
        state: present
      when: nfs_server | default(false)
      notify: Restart NFS server

    - name: Enable NFSv4 in /etc/nfs.conf
      community.general.ini_file:
        path: /etc/nfs.conf
        section: nfsd
        option: vers4
        value: 'y'
        mode: '0644'
        state: present
      when: nfs_server | default(false)
      notify: Restart NFS server

    - name: Add export to /etc/exports
      ansible.builtin.lineinfile:
        path: /etc/exports
        line: '{{ nfs_export_path }} {{ nfs_export_opts }}'
        state: present
      when: nfs_server | default(false)
      notify: Re-export NFS shares

    - name: Start and enable NFS server
      ansible.builtin.systemd:
        name: nfs-kernel-server
        state: started
        enabled: true
      when: nfs_server | default(false)

  handlers:
    - name: Restart NFS server
      ansible.builtin.systemd:
        name: nfs-kernel-server
        state: restarted

    - name: Re-export NFS shares
      ansible.builtin.command:
        cmd: exportfs -ra
      changed_when: true

# ------------------------------------------------------------------------------
# CLIENT PLAY: NFS Client Mount Configuration
# ------------------------------------------------------------------------------
- name: Configure NFS client mount
  hosts: homelab
  become: true
  become_exe: sudo.ws
  vars:
    nfs_export_path: /srv/nfs/data
    nfs_mount_point: /mnt/nfs
    nfs_mount_opts: '_netdev,nofail,soft,timeo=600,nfsvers=4,x-systemd.automount,x-systemd.mount-timeout=15'
    _nfs_server_host: >-
      {{ hostvars | dict2items
         | selectattr('value.nfs_server', 'defined')
         | selectattr('value.nfs_server', 'equalto', true)
         | map(attribute='value.private_ip')
         | first }}
  tasks:
    - name: Install nfs-common
      ansible.builtin.apt:
        name: nfs-common
        state: present
        update_cache: true

    - name: Create NFS mount point  # noqa: risky-file-permissions
      ansible.builtin.file:
        path: '{{ nfs_mount_point }}'
        state: directory
        # mode is intentionally omitted: chmod on a live mount point returns
        # EPERM, and mount point permissions are superseded by the server anyway.

    # -------------------------------------------------------------------------
    # Boot Ordering — Server Node
    # The server node mounts its own NFS export at {{ nfs_mount_point }}, which
    # creates a dependency cycle when using fstab + x-systemd.automount:
    #
    #   nfs-server → nfs-mountd → local-fs.target → mnt-nfs.automount → nfs-server
    #
    # The root cause is a known systemd bug (#17657, #34164): fstab-generator
    # places automount units in local-fs.target even when _netdev is set, which
    # should move them to remote-fs.target. The bug is unfixed upstream.
    #
    # The fix is to bypass fstab-generator entirely on the server node by
    # deploying explicit .mount and .automount unit files with
    # DefaultDependencies=no and WantedBy=remote-fs.target. This prevents the
    # automount from being pulled into local-fs.target, breaking the cycle.
    # With the cycle gone, After=nfs-kernel-server.service can be added to the
    # mount unit so the server is guaranteed to be running before the mount fires.
    #
    # Any existing fstab entry and automount drop-in from previous runs are
    # removed to prevent conflicts with the explicit unit files.
    # -------------------------------------------------------------------------
    - name: Unmount NFS share on server node
      ansible.posix.mount:
        path: '{{ nfs_mount_point }}'
        state: unmounted
      when: nfs_server | default(false)

    - name: Remove NFS fstab entry on server node
      ansible.posix.mount:
        path: '{{ nfs_mount_point }}'
        state: absent_from_fstab
      when: nfs_server | default(false)
      notify: Reload systemd daemon

    - name: Remove NFS automount drop-in directory on server node
      ansible.builtin.file:
        path: '/etc/systemd/system/{{ nfs_mount_point | regex_replace("^/", "") | replace("/", "-") }}.automount.d'
        state: absent
      when: nfs_server | default(false)
      notify: Reload systemd daemon

    - name: Deploy explicit NFS mount unit on server node
      ansible.builtin.template:
        src: mnt-nfs.mount.j2
        dest: '/etc/systemd/system/{{ nfs_mount_point | regex_replace("^/", "") | replace("/", "-") }}.mount'
        mode: '0644'
        owner: root
        group: root
      when: nfs_server | default(false)
      notify: Reload systemd daemon

    - name: Deploy explicit NFS automount unit on server node
      ansible.builtin.template:
        src: mnt-nfs.automount.j2
        dest: '/etc/systemd/system/{{ nfs_mount_point | regex_replace("^/", "") | replace("/", "-") }}.automount'
        mode: '0644'
        owner: root
        group: root
      when: nfs_server | default(false)
      notify: Enable and start NFS automount on server node

    # -------------------------------------------------------------------------
    # Boot Ordering — Client Nodes
    # Client nodes use fstab + x-systemd.automount as normal. The dependency
    # cycle only exists on the server node (because only the server runs
    # nfs-mountd), so the fstab approach is safe on pure client nodes.
    #
    # A drop-in orders the automount after network-online.target to prevent
    # premature mount attempts before the network is reachable.
    # -------------------------------------------------------------------------
    - name: Mount NFS share and add to fstab
      ansible.posix.mount:
        path: '{{ nfs_mount_point }}'
        src: '{{ _nfs_server_host }}:{{ nfs_export_path }}'
        fstype: nfs
        opts: '{{ nfs_mount_opts }}'
        state: present
      when: not (nfs_server | default(false))
      notify: Reload systemd daemon

    - name: Create systemd drop-in directory for NFS automount ordering
      ansible.builtin.file:
        path: '/etc/systemd/system/{{ nfs_mount_point | regex_replace("^/", "") | replace("/", "-") }}.automount.d'
        state: directory
        mode: '0755'
      when: not (nfs_server | default(false))

    - name: Write systemd drop-in to order automount after network
      ansible.builtin.copy:
        dest: '/etc/systemd/system/{{ nfs_mount_point | regex_replace("^/", "") | replace("/", "-") }}.automount.d/ordering.conf'
        mode: '0644'
        content: |
          [Unit]
          After=network-online.target
      when: not (nfs_server | default(false))
      notify: Reload systemd daemon

    - name: Create systemd drop-in directory for rpc-statd-notify ordering
      ansible.builtin.file:
        path: /etc/systemd/system/rpc-statd-notify.service.d
        state: directory
        mode: '0755'
      when: nfs_server | default(false)

    - name: Write systemd drop-in to order rpc-statd-notify after NFS server
      ansible.builtin.copy:
        dest: /etc/systemd/system/rpc-statd-notify.service.d/after-nfs-server.conf
        mode: '0644'
        content: |
          [Unit]
          After=nfs-kernel-server.service
      notify: Reload systemd daemon
      when: nfs_server | default(false)

    # -------------------------------------------------------------------------
    # Kubelet Boot Ordering
    # kubelet restores previously active NFS PersistentVolumes at startup by
    # mounting them directly from the NFS server. If the server is unreachable
    # at boot, kubelet hangs in uninterruptible D state indefinitely.
    #
    # A drop-in orders kubelet after the NFS mount unit and requires it, so
    # kubelet only starts once the NFS share is actually mounted and will not
    # start at all if the mount fails. This ensures the NFS server is reachable
    # before kubelet attempts to re-attach volumes.
    # -------------------------------------------------------------------------
    - name: Create systemd drop-in directory for kubelet boot ordering
      ansible.builtin.file:
        path: /etc/systemd/system/kubelet.service.d
        state: directory
        mode: '0755'

    - name: Remove old kubelet drop-ins
      ansible.builtin.file:
        path: '{{ item }}'
        state: absent
      loop:
        - /etc/systemd/system/kubelet.service.d/after-nfs-automount.conf
        - /etc/systemd/system/kubelet.service.d/after-multi-user.conf
      notify: Reload systemd daemon

    - name: Write systemd drop-in to order kubelet after NFS mount
      ansible.builtin.copy:
        dest: /etc/systemd/system/kubelet.service.d/after-nfs-mount.conf
        mode: '0644'
        content: |
          [Unit]
          After={{ nfs_mount_point | regex_replace("^/", "") | replace("/", "-") }}.mount
          Wants={{ nfs_mount_point | regex_replace("^/", "") | replace("/", "-") }}.mount
      notify: Reload systemd daemon

    - name: Mask nfs-blkmap service to prevent boot hang
      ansible.builtin.systemd:
        name: nfs-blkmap
        masked: true


  handlers:
    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start NFS automount on server node
      ansible.builtin.systemd:
        name: '{{ nfs_mount_point | regex_replace("^/", "") | replace("/", "-") }}.automount'
        enabled: true
        state: started
        daemon_reload: true
