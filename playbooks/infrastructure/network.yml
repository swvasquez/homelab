---
# ==============================================================================
# Playbook: Configure Host Firewall
# ==============================================================================
# Installs UFW and enforces a default-deny inbound policy on every homelab host.
# Outbound traffic is allowed by default. Loopback traffic is explicitly
# permitted.
#
# This playbook performs the following actions:
#   - Installs the UFW package.
#   - Sets the default inbound policy to deny and outbound policy to allow.
#   - Allows all loopback interface traffic.
#   - Opens inbound ports for each service listed in ufw_allowed_ports. Entries
#     marked node_only: true are restricted to source IPs of other homelab
#     nodes derived from inventory private_ip host variables.
#   - Enables UFW.
#
# Variables:
#   ufw_packages:      List of APT packages to install for UFW
#                      (default: [ufw]).
#   ufw_allowed_ports: Dictionary mapping service name to port, protocol, and
#                      an optional node_only flag. When node_only is true the
#                      rule is created once per homelab node IP rather than
#                      being open to all sources. Read from group_vars.

- name: Configure host firewall
  hosts: homelab
  become: true
  become_exe: sudo.ws
  vars:
    ufw_packages:
      - ufw

  tasks:
    # -------------------------------------------------------------------------
    # Installation
    # Installs the UFW package from the OS package manager.
    # -------------------------------------------------------------------------
    - name: Install UFW package
      ansible.builtin.apt:
        name: '{{ ufw_packages }}'
        state: present
        update_cache: true

    # -------------------------------------------------------------------------
    # Default Policies
    # Denies all inbound connections and allows all outbound connections by
    # default. Loopback traffic is explicitly permitted so local services can
    # communicate with each other.
    # -------------------------------------------------------------------------
    - name: Set UFW default policy to deny incoming traffic
      community.general.ufw:
        default: deny
        direction: incoming

    - name: Set UFW default policy to allow outgoing traffic
      community.general.ufw:
        default: allow
        direction: outgoing

    - name: Allow loopback interface inbound traffic
      community.general.ufw:
        rule: allow
        interface: lo
        direction: in

    # -------------------------------------------------------------------------
    # Firewall Rules
    # Opens inbound ports for services defined in ufw_allowed_ports. Ports
    # without node_only are opened to all sources. Ports with node_only: true
    # are opened only for the private IPs of other homelab nodes, restricting
    # access to intra-cluster traffic.
    # -------------------------------------------------------------------------
    - name: Collect homelab node IPs for intra-node firewall rules
      ansible.builtin.set_fact:
        node_ips: '{{ groups["homelab"] | map("extract", hostvars, "private_ip") | list }}'

    - name: 'Allow inbound port: {{ item.key }}'
      community.general.ufw:
        rule: allow
        port: '{{ item.value.port | string }}'
        proto: '{{ item.value.protocol }}'
      loop: '{{ ufw_allowed_ports | dict2items }}'
      when: not (item.value.node_only | default(false))
      loop_control:
        label: '{{ item.key }}'

    - name: 'Allow node-only inbound port: {{ item.0.key }}'
      community.general.ufw:
        rule: allow
        port: '{{ item.0.value.port | string }}'
        proto: '{{ item.0.value.protocol }}'
        from_ip: '{{ item.1 }}'
      loop: >-
        {{ (ufw_allowed_ports | dict2items
            | selectattr("value.node_only", "defined")
            | selectattr("value.node_only", "equalto", true) | list)
           | product(node_ips) | list }}
      loop_control:
        label: '{{ item.0.key }} from {{ item.1 }}'

    # -------------------------------------------------------------------------
    # Enable
    # Activates UFW with the configured rules. Any inbound connections not
    # explicitly allowed above will be dropped.
    # -------------------------------------------------------------------------
    - name: Enable UFW
      community.general.ufw:
        state: enabled
