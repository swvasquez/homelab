---
# ==============================================================================
# Playbook: Configure System Cron Jobs
# ==============================================================================
# Configures system-wide cron jobs for system maintenance and automation.
#
# Current tasks:
#   - Scheduled System Shutdown: Shuts down the system at a configured time
#     using '/usr/sbin/shutdown -h now'.
#
# Variables:
#   shutdown_schedule:  Cron schedule string for system shutdown in standard
#                       5-field notation (e.g., '0 4 * * *'). Set in
#                       group_vars/homelab.yml.

- name: Configure system cron jobs
  hosts: homelab
  become: true
  become_exe: sudo.ws
  vars:
    shutdown_schedule: '0 4 * * *'

  tasks:
    # -------------------------------------------------------------------------
    # Scheduled Shutdown
    # Creates a cron job that shuts down the system at the time defined by the
    # shutdown_schedule variable. The schedule is sourced from group_vars to
    # allow per-group customization without modifying this playbook.
    # -------------------------------------------------------------------------
    - name: Create scheduled shutdown cron job
      ansible.builtin.cron:
        name: Scheduled System Shutdown
        minute: "{{ shutdown_schedule.split(' ')[0] }}"
        hour: "{{ shutdown_schedule.split(' ')[1] }}"
        day: "{{ shutdown_schedule.split(' ')[2] }}"
        month: "{{ shutdown_schedule.split(' ')[3] }}"
        weekday: "{{ shutdown_schedule.split(' ')[4] }}"
        job: /usr/sbin/shutdown -h now
